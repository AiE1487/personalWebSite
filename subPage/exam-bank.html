<!DOCTYPE html>
<html lang="zh-cn">
<head>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; font-size: 16px; color-scheme: dark; scroll-behavior: smooth; }
body {
  background: #141414; color: #c4c2c2;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  width: 100%; min-height: 100vh; overflow-x: hidden; line-height: 1.7;
}
#page-content { opacity: 0; transition: opacity 0.5s ease; }
#page-content.visible { opacity: 1; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: #141414; }
::-webkit-scrollbar-thumb { background: #18d1ff; border-radius: 2px; }

/* ========== LOADER ========== */
#loader { position: fixed; inset: 0; z-index: 99999; background: #2a2a2a; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease, visibility 0.8s ease; }
#loader.done { opacity: 0; visibility: hidden; pointer-events: none; }
@keyframes slideUpIn { from { transform: translateY(100vh); } to { transform: translateY(0); } }
#loader.from-index { animation: slideUpIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
.loader-logo { text-align: center; }
.loader-icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; opacity: 0.85; }
.loader-icon img { width: 100%; height: 100%; object-fit: contain; }
.loader-logo .zh { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.25em; color: #c4c2c2; line-height: 1.2; }
.loader-logo .en { font-size: 0.5rem; letter-spacing: 0.5em; color: #666; margin-top: 0.5rem; text-transform: uppercase; }
.loader-logo .line { width: 4rem; height: 1px; background: #555; margin: 0.8rem auto; }
.loader-track { position: absolute; bottom: 4.5rem; left: 50%; transform: translateX(-50%); width: 55%; max-width: 520px; }
.loader-bar { width: 100%; height: 3px; background: #444; }
.loader-fill { height: 100%; background: #18d1ff; width: 0%; transition: width 0.05s linear; }
.loader-info { display: flex; justify-content: space-between; margin-top: 0.6rem; font-size: 0.55rem; letter-spacing: 0.08em; color: #777; }
.loader-info .cyan { color: #18d1ff; }
.loader-copy { position: absolute; bottom: 1.5rem; left: 2rem; font-size: 0.55rem; letter-spacing: 0.12em; color: #555; }

/* ========== NAV ========== */
#nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; height: 60px; transition: background 0.4s ease; }
#nav.scrolled { background: rgba(20,20,20,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.04); }
.nav-left { display: flex; align-items: center; gap: 0.5rem; }
.nav-brand-icon { width: 24px; height: 24px; }
.nav-brand-icon img { width: 100%; height: 100%; object-fit: contain; }
.nav-brand { text-decoration: none; display: flex; align-items: center; }
.nav-brand-text { font-size: 1rem; font-weight: 700; letter-spacing: 0.2em; color: #fff; }
.nav-right { display: flex; align-items: center; }
.nav-back { font-size: 0.55rem; letter-spacing: 0.12em; color: #18d1ff; text-decoration: none; text-transform: uppercase; border: 1px solid rgba(24,209,255,0.25); padding: 0.3rem 0.8rem; transition: background 0.3s ease; }
.nav-back:hover { background: rgba(24,209,255,0.1); }

/* ========== HEADER STATS ========== */
#stats-bar {
  display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: center;
  padding: 0 0 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 1.5rem;
}
.stat-chip {
  font-size: 0.75rem; font-weight: 600; color: #18d1ff;
  background: rgba(24,209,255,0.08); padding: 0.3rem 0.9rem;
  letter-spacing: 0.04em; border: 1px solid rgba(24,209,255,0.15);
}
.stat-chip strong { color: #fff; margin: 0 0.15rem; }

/* ========== TOOLBAR ========== */
#toolbar {
  display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: center; margin-bottom: 2rem;
}
.toolbar-btn {
  font-size: 0.72rem; font-weight: 500; letter-spacing: 0.06em;
  padding: 0.4rem 1.1rem; cursor: pointer;
  background: transparent; color: #888; border: 1px solid rgba(255,255,255,0.12);
  transition: all 0.3s ease; font-family: inherit;
}
.toolbar-btn:hover { color: #18d1ff; border-color: rgba(24,209,255,0.4); background: rgba(24,209,255,0.05); }

/* exam mode */
.exam-mode .stat-chip { opacity: 0.4; pointer-events: auto; }
.exam-mode .stat-chip.active { opacity: 1; }
.exam-mode .ans-area { display: none !important; }
.exam-mode .q-card.correct { border-color: rgba(0,255,100,0.4) !important; background: rgba(0,255,100,0.04) !important; }
.exam-mode .q-card.wrong { border-color: rgba(255,80,80,0.4) !important; background: rgba(255,80,80,0.04) !important; }
/* review mode: show only wrong + fill cards */
.review-wrong .q-card.correct { display: none !important; }
.review-wrong .q-card:not(.correct):not(.wrong) { } /* fill cards stay */
#exam-submit {
  display: none; width: 100%; max-width: 860px; margin: 0 auto 3rem; padding: 0 2rem;
}
#exam-submit button {
  width: 100%; padding: 0.8rem; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.12em;
  cursor: pointer; background: transparent; color: #18d1ff; border: 1px solid rgba(24,209,255,0.3);
  transition: all 0.3s ease; font-family: inherit;
}
#exam-submit button:hover { background: #18d1ff; color: #141414; }
.exam-mode #exam-submit { display: block; }
#exam-score { text-align: center; font-size: 1rem; color: #18d1ff; margin-top: 1rem; display: none; }
#exam-score button { margin-top: 0.6rem; margin-left: 0.5rem; }
.stat-chip { cursor: pointer; user-select: none; }
.stat-chip.active { background: rgba(24,209,255,0.2); border-color: #18d1ff; color: #fff; }

/* exam progress sidebar */
#exam-progress {
  position: fixed; left: 0; top: 50%; transform: translateY(-50%);
  z-index: 900; display: none; flex-direction: column; align-items: center; gap: 0.4rem;
  padding: 0.8rem 0.5rem; background: #1a1c1e; border: 1px solid rgba(255,255,255,0.06);
  border-left: none;
}
.exam-mode #exam-progress { display: flex; }
#exam-progress .prog-label { font-size: 0.45rem; color: #666; letter-spacing: 0.1em; writing-mode: vertical-rl; }
#exam-progress .prog-done { font-size: 0.8rem; font-weight: 700; color: #18d1ff; }
#exam-progress .prog-divider { width: 12px; height: 1px; background: rgba(255,255,255,0.1); }
#exam-progress .prog-left { font-size: 0.7rem; color: #888; }
@media (max-width: 768px) {
  #exam-progress { left: 2px; padding: 0.4rem 0.3rem; gap: 0.2rem; }
  #exam-progress .prog-done { font-size: 0.65rem; }
  #exam-progress .prog-left { font-size: 0.55rem; }
}

/* ========== MAIN ========== */
#main { max-width: 860px; margin: 0 auto; padding: 100px 2rem 4rem; }

#main h1 {
  font-size: 1.5rem; font-weight: 800; color: #fff; letter-spacing: 0.08em;
  text-align: center; margin-bottom: 1.2rem;
}

/* ========== SECTION TITLE ========== */
.section-title {
  margin: 2.5rem 0 1rem; padding-bottom: 0.6rem;
  border-bottom: 2px solid #18d1ff; display: flex; align-items: baseline; gap: 0.8rem;
}
.section-title h2 { font-size: 1.15rem; font-weight: 700; color: #eee; letter-spacing: 0.06em; }
.section-title .count { font-size: 0.72rem; color: #18d1ff; background: rgba(24,209,255,0.08); padding: 0.2rem 0.7rem; border: 1px solid rgba(24,209,255,0.15); }

/* ========== QUESTION CARD ========== */
.q-card {
  background: #1a1c1e; border: 1px solid rgba(255,255,255,0.08);
  padding: 1.2rem 1.4rem; margin-bottom: 0.8rem;
  transition: border-color 0.3s ease, background 0.3s ease;
}
.q-card:hover { border-color: rgba(24,209,255,0.2); background: #1c1e20; }

.q-header { display: flex; align-items: flex-start; gap: 0.8rem; margin-bottom: 0.8rem; }
.q-num {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 26px; height: 26px; border-radius: 6px;
  background: #18d1ff; color: #141414; font-size: 0.7rem; font-weight: 700; flex-shrink: 0;
}
.q-text { font-weight: 500; font-size: 0.92rem; color: #d0d0d0; padding-top: 2px; line-height: 1.6; }

/* Options */
.opts-group { margin-left: 2.1rem; }
.opts-group label {
  display: block; padding: 0.35rem 0.6rem; margin: 0.15rem 0; border-radius: 6px;
  cursor: pointer; font-size: 0.85rem; color: #bfbfbf;
  transition: background 0.15s; border: 1px solid transparent;
}
.opts-group label:hover { background: rgba(24,209,255,0.06); }
.opts-group input[type="radio"] { margin-right: 0.5rem; accent-color: #18d1ff; }

.tf-opts { display: flex; gap: 1.5rem; margin-left: 2.1rem; }
.tf-opts label { cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; color: #bfbfbf; }
.tf-opts input[type="radio"] { accent-color: #18d1ff; }

.fill-inp {
  width: calc(100% - 2.1rem); margin-left: 2.1rem; padding: 0.55rem 0.8rem;
  border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: #141414;
  font-size: 0.85rem; color: #c4c2c2; transition: border-color 0.3s ease; font-family: inherit;
}
.fill-inp:focus { outline: none; border-color: #18d1ff; }

/* Answer toggle */
.ans-area { margin-left: 2.1rem; margin-top: 0.5rem; }
.ans-toggle {
  font-size: 0.72rem; font-weight: 500; color: #18d1ff; cursor: pointer; user-select: none;
}
.ans-toggle:hover { text-decoration: underline; }
.ans-content {
  display: none; margin-top: 0.4rem; padding: 0.5rem 0.8rem; border-radius: 6px;
  background: rgba(24,209,255,0.06); font-size: 0.8rem; font-weight: 500;
  border-left: 3px solid #18d1ff; color: #18d1ff;
}
.ans-content.show { display: block; }

/* Back to top */
.back-top {
  position: fixed; bottom: 1.5rem; right: 1.5rem; width: 36px; height: 36px;
  background: #1a1c1e; color: #18d1ff;
  border: 1px solid rgba(24,209,255,0.2); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center; z-index: 200;
  transition: all 0.3s ease;
}
.back-top:hover { background: #18d1ff; color: #141414; }
.back-bottom {
  position: fixed; bottom: 4.2rem; right: 1.5rem; width: 36px; height: 36px;
  background: #1a1c1e; color: #18d1ff;
  border: 1px solid rgba(24,209,255,0.2); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center; z-index: 200;
  transition: all 0.3s ease;
}
.back-bottom:hover { background: #18d1ff; color: #141414; }

/* ========== FOOTER ========== */
#footer { border-top: 1px solid rgba(255,255,255,0.06); padding: 1.5rem 2rem; max-width: 860px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; font-size: 0.55rem; letter-spacing: 0.08em; color: #555; }
.footer-links { display: flex; gap: 1.5rem; }
.footer-links a { color: #555; text-decoration: none; transition: color 0.3s ease; }
.footer-links a:hover { color: #18d1ff; }

@media (max-width: 768px) {
  #nav { padding: 0 1.5rem; }
  #main { padding: 80px 1rem 3rem; }
  .q-card { padding: 0.9rem 0.8rem; }
  .opts-group, .tf-opts, .fill-inp, .ans-area { margin-left: 1.2rem; }
  .fill-inp { width: calc(100% - 1.2rem); }
  .section-title h2 { font-size: 1rem; }
}
</style>
</head>

<script>
const choiceQuestions = [
    { text: "在Linux中，使用命令______可以查看当前路由表，使用命令______可以添加默认网关。", options: ["A. route、route add default gw", "B. ip route、route add", "C. route -n、route add", "D. 以上都是"], answer: "A. route、route add default gw" },
    { text: "制定了商业建筑电信布线系统规范EIA/TIA-568的组织是______。", options: ["A. IEEE", "B. IANA", "C. EIA/TIA", "D. IETF"], answer: "C. EIA/TIA" },
    { text: "公有IP地址的分配和管理由______负责。", options: ["A. IEEE", "B. IANA", "C. ISO", "D. W3C"], answer: "B. IANA" },
    { text: "在OSI参考模型中，路由器通常工作在______。", options: ["A. 物理层", "B. 数据链路层", "C. 网络层", "D. 传输层"], answer: "C. 网络层" },
    { text: "Linux中，chmod命令可以使用数字形式设置权限，例如chmod 755 file，其中7表示所有者权限（rwx），5表示组用户权限（r-x），另一个5表示其他用户权限______。", options: ["A. r-x", "B. rw-", "C. --x", "D. r--"], answer: "A. r-x" },
    { text: "下列哪个IP地址是回环测试地址？", options: ["A. 0.0.0.0", "B. 255.255.255.255", "C. 127.0.0.1", "D. 192.168.1.1"], answer: "C. 127.0.0.1" },
    { text: "将数字信号转化为模拟信号的过程称为______。", options: ["A. 解调", "B. 编码", "C. 调制", "D. 解码"], answer: "C. 调制" },
    { text: "将数字信号转换为模拟信号的过程称为______，将模拟信号转换为数字信号的过程称为______。", options: ["A. 调制、解调", "B. 解调、调制", "C. 编码、解码", "D. 解码、编码"], answer: "A. 调制、解调" },
    { text: "中国于______年正式全功能接入Internet。", options: ["A. 1987", "B. 1994", "C. 1997", "D. 2000"], answer: "B. 1994" },
    { text: "中国正式全功能接入Internet的时间是______。", options: ["A. 1987年", "B. 1994年", "C. 2000年", "D. 2010年"], answer: "B. 1994年" },
    { text: "微博是一种______媒体，用户可以通过它发布短消息、图片和视频，与他人互动。", options: ["A. 社交", "B. 新闻", "C. 直播", "D. 教育"], answer: "A. 社交" },
    { text: "以下哪个协议用于远程登录？", options: ["A. HTTP", "B. FTP", "C. Telnet", "D. SMTP"], answer: "C. Telnet" },
    { text: "统计时分多路复用技术相比于传统时分多路复用的改进之处在于______。", options: ["A. 固定分配时间片", "B. 动态分配时间片", "C. 增加信道带宽", "D. 减少用户数量"], answer: "B. 动态分配时间片" },
    { text: "光纤收发器的主要功能是______。", options: ["A. 将电信号转换为光信号或将光信号转换为电信号", "B. 放大信号", "C. 路由选择", "D. 数据过滤"], answer: "A. 将电信号转换为光信号或将光信号转换为电信号" },
    { text: "IP数据报首部固定长度为______字节，可变部分长度不定。", options: ["A. 20", "B. 32", "C. 64", "D. 128"], answer: "A. 20" },
    { text: "直通线（平行线）适用于以下哪种设备连接？", options: ["A. 计算机与计算机", "B. 交换机普通口与另一交换机普通口", "C. 计算机与交换机普通口", "D. 交换机级联口与另一交换机级联口"], answer: "C. 计算机与交换机普通口" },
    { text: "IPv6地址的长度为______位。", options: ["A. 32", "B. 64", "C. 128", "D. 256"], answer: "C. 128" },
    { text: "IP地址中，主机位全\"0\"表示______。", options: ["A. 广播地址", "B. 网络地址", "C. 回环地址", "D. 全网地址"], answer: "B. 网络地址" },
    { text: "下列哪个是私有IP地址？", options: ["A. 8.8.8.8", "B. 114.114.114.114", "C. 172.31.100.1", "D. 192.169.1.1"], answer: "C. 172.31.100.1" },
    { text: "在光纤宽带接入中，用户端需要安装的设备是______。", options: ["A. ADSL Modem", "B. Cable Modem", "C. 光猫（ONU）", "D. 路由器"], answer: "C. 光猫（ONU）" },
    { text: "以下哪个是全文搜索引擎？", options: ["A. hao123", "B. 百度", "C. 新浪", "D. 网易"], answer: "B. 百度" },
    { text: "无盘工作站的特点是______。", options: ["A. 没有CPU和内存", "B. 没有软盘驱动器和硬盘驱动器", "C. 不能独立工作", "D. 必须连接Internet"], answer: "B. 没有软盘驱动器和硬盘驱动器" },
    { text: "在异步传输中，每个字符用一个起始位引导（编码为0），用一个停止位结束（编码为1），这种方式的优点是______。", options: ["A. 传输效率高", "B. 不需要时钟同步", "C. 适合高速传输", "D. 硬件简单"], answer: "B. 不需要时钟同步" },
    { text: "数据通信中，允许信息同时沿两个方向传输的方式是______。", options: ["A. 单工通信", "B. 半双工通信", "C. 双工通信", "D. 异步通信"], answer: "C. 双工通信" },
    { text: "数据通信中，允许数据同时双向传输的方式称为______通信。", options: ["A. 单工", "B. 半双工", "C. 双工", "D. 异步"], answer: "C. 双工" },
    { text: "在Windows系统中启用\"Internet连接共享\"功能后，内网网卡的IP地址会自动设置为______。", options: ["A. 192.168.0.1", "B. 192.168.1.1", "C. 192.168.137.1", "D. 10.0.0.1"], answer: "C. 192.168.137.1" },
    { text: "计算机网络是______相结合的产物。", options: ["A. 计算机技术和多媒体技术", "B. 计算机技术和通信技术", "C. 通信技术和自动化技术", "D. 计算机技术和电子技术"], answer: "B. 计算机技术和通信技术" },
    { text: "IPv6地址中，双冒号\"::\"只能使用______次，用以代表连续的多个0。", options: ["A. 一", "B. 二", "C. 三", "D. 任意"], answer: "A. 一" },
    { text: "下列哪项不是局域网的特征？", options: ["A. 网络所覆盖的地理范围比较小", "B. 网络的经营权和管理权属于某个单位", "C. 传输质量好，误码率低", "D. 支持传输介质单一"], answer: "D. 支持传输介质单一" },
    { text: "FTP协议用于控制连接的端口号是______。", options: ["A. 20", "B. 21", "C. 22", "D. 23"], answer: "B. 21" },
    { text: "以下哪个不是搜索引擎的分类？", options: ["A. 全文搜索引擎", "B. 目录索引类搜索引擎", "C. 元搜索引擎", "D. 关系型搜索引擎"], answer: "D. 关系型搜索引擎" },
    { text: "在Windows系统中，将网络打印机设置为默认打印机的方法是______。", options: ["A. 右击打印机图标选择\"设置为默认打印机\"", "B. 在打印机属性中勾选\"默认\"", "C. 在控制面板中设置", "D. 无法设置"], answer: "A. 右击打印机图标选择\"设置为默认打印机\"" },
    { text: "Internet上的资源类型不包括以下哪项？", options: ["A. 文本", "B. 图片", "C. 硬件设备", "D. 视频"], answer: "C. 硬件设备" },
    { text: "使用搜索引擎的filetype:pdf功能可以______。", options: ["A. 搜索PDF格式的文件", "B. 搜索包含PDF关键词的网页", "C. 搜索PDF软件", "D. 搜索PDF阅读器"], answer: "A. 搜索PDF格式的文件" },
    { text: "以下哪个属于Internet提供的常用服务？", options: ["A. 文件传输", "B. 数据库管理", "C. 操作系统更新", "D. 硬件驱动下载"], answer: "A. 文件传输" },
    { text: "按分布距离分类，覆盖范围在10~100km之间的网络是______。", options: ["A. 局域网", "B. 城域网", "C. 广域网", "D. 互联网"], answer: "B. 城域网" },
    { text: "在EIA/TIA568B标准中，双绞线线序的第1脚颜色是______。", options: ["A. 白绿", "B. 白橙", "C. 橙", "D. 绿"], answer: "B. 白橙" },
    { text: "在Windows系统中，安装网络打印机时，需要指定打印机的______。", options: ["A. IP地址或主机名", "B. 驱动程序路径", "C. 端口号", "D. 打印队列名称"], answer: "A. IP地址或主机名" },
    { text: "光纤调制解调器（光猫）是______接入网络的关键设备。", options: ["A. ADSL", "B. 光纤", "C. 电缆", "D. 卫星"], answer: "B. 光纤" },
    { text: "ADSL技术中，\"非对称\"指的是______。", options: ["A. 上行速率与下行速率不同", "B. 上行速率与下行速率相同", "C. 传输距离不对称", "D. 信号频率不对称"], answer: "A. 上行速率与下行速率不同" },
    { text: "百度网盘的______功能可以实现本地文件夹与云端文件夹的实时同步，方便多设备使用。", options: ["A. 同步", "B. 分享", "C. 备份", "D. 压缩"], answer: "A. 同步" },
    { text: "P2P文件共享技术中，每个节点既是客户端也是服务器，典型的应用有BT和______。", options: ["A. eMule", "B. FTP", "C. HTTP", "D. SMTP"], answer: "A. eMule" },
    { text: "打印队列的作用是______。", options: ["A. 将打印作业直接发送到打印机", "B. 暂时存放等待打印的作业", "C. 管理打印机的硬件", "D. 转换打印数据格式"], answer: "B. 暂时存放等待打印的作业" },
    { text: "TCP/IP协议簇中，提供端到端可靠数据传输的协议是______。", options: ["A. IP", "B. ARP", "C. TCP", "D. UDP"], answer: "C. TCP" },
    { text: "下列IPv6地址简写正确的是______。", options: ["A. 2001:0db8:0000:0000:0000:ff00:0042:8329", "B. 2001:db8::ff00:42:8329", "C. 2001:db8:0:0:0:ff00:42:8329", "D. 2001:db8:0:0:0:ff00:0042:8329"], answer: "B. 2001:db8::ff00:42:8329" },
    { text: "如果一个主机无法从DHCP服务器获取IP地址，它可能会自动配置一个从______范围内的IP地址。", options: ["A. 10.0.0.0/8", "B. 172.16.0.0/12", "C. 192.168.0.0/16", "D. 169.254.0.0/16"], answer: "D. 169.254.0.0/16" },
    { text: "Linux文件权限用数字表示时，7对应rwx，6对应rw-，5对应r-x，4对应r--，0对应---。那么权限754表示______。", options: ["A. rwxr-xr--", "B. rwxrw-r--", "C. rwxr-xrwx", "D. rwxr-xr-x"], answer: "A. rwxr-xr--" },
    { text: "端口号的范围是______，其中0~1023称为知名端口。", options: ["A. 0-1024", "B. 0-65535", "C. 1-1024", "D. 1-65535"], answer: "B. 0-65535" },
    { text: "UDP协议是______的传输层协议。", options: ["A. 面向连接、可靠", "B. 面向连接、不可靠", "C. 无连接、可靠", "D. 无连接、不可靠"], answer: "D. 无连接、不可靠" },
    { text: "在星型拓扑结构中，中心设备通常使用______。", options: ["A. 集线器或交换机", "B. 路由器", "C. 网桥", "D. 中继器"], answer: "A. 集线器或交换机" },
    { text: "IEEE802.3标准定义了______网络，IEEE802.5定义了______网络。", options: ["A. 以太网、令牌环", "B. 令牌环、以太网", "C. 无线局域网、以太网", "D. 城域网、令牌环"], answer: "A. 以太网、令牌环" },
    { text: "在对等式网络中，计算机的角色是______。", options: ["A. 有专门的服务器", "B. 地位平等，既可是服务器也可是工作站", "C. 只能作为工作站", "D. 只能作为服务器"], answer: "B. 地位平等，既可是服务器也可是工作站" },
    { text: "宽带路由器的WAN口连接ISP（如光猫），LAN口连接内部网络设备，通常LAN口IP地址默认为______或192.168.0.1。", options: ["A. 192.168.1.1", "B. 10.0.0.1", "C. 172.16.0.1", "D. 169.254.0.1"], answer: "A. 192.168.1.1" },
    { text: "下列设备中，属于DTE的是______。", options: ["A. 调制解调器", "B. 计算机", "C. 光纤收发器", "D. ISDN适配器"], answer: "B. 计算机" },
    { text: "TCP协议首部中用于保证数据可靠传输的关键机制包括______。", options: ["A. 源端口号", "B. 序列号和确认号", "C. 目的IP地址", "D. 数据长度"], answer: "B. 序列号和确认号" },
    { text: "将线路用于传输的时间划分成若干个时间片，每个用户得到一个时间片，这种复用技术是______。", options: ["A. 频分多路复用", "B. 时分多路复用", "C. 波分多路复用", "D. 码分多路复用"], answer: "B. 时分多路复用" },
    { text: "开发了OSI参考模型和OSI协议簇的国际标准化组织是______。", options: ["A. IEEE", "B. IANA", "C. ISO", "D. IETF"], answer: "C. ISO" },
    { text: "以下哪个命令用于显示Linux系统的路由表？", options: ["A. ifconfig", "B. route", "C. ping", "D. netstat -a"], answer: "B. route" },
    { text: "下列哪种有线传输介质的安装成本最高？", options: ["A. 粗同轴电缆", "B. 细同轴电缆", "C. 非屏蔽双绞线", "D. 光纤"], answer: "D. 光纤" },
    { text: "ISO成立于______年，中国是其常任理事国。", options: ["A. 1946", "B. 1947", "C. 1984", "D. 1963"], answer: "B. 1947" },
    { text: "以下哪项不属于网络共享打印系统的组成部分？", options: ["A. 打印队列", "B. 打印服务器", "C. 网络打印机", "D. 扫描仪"], answer: "D. 扫描仪" },
    { text: "无盘工作站网络对服务器的______要求较高。", options: ["A. 存储容量", "B. 并发处理能力", "C. 图形处理能力", "D. 散热性能"], answer: "B. 并发处理能力" },
    { text: "以下哪种接入方式属于光纤接入？", options: ["A. ADSL", "B. FTTH", "C. Cable Modem", "D. 5G"], answer: "B. FTTH" },
    { text: "以下哪个工具常用于下载Internet资源？", options: ["A. Word", "B. Excel", "C. 迅雷", "D. PowerPoint"], answer: "C. 迅雷" },
    { text: "传统的电话通信信道无法直接传输计算机的数字信号，因此需要使用______设备。", options: ["A. 中继器", "B. 交换机", "C. 调制解调器", "D. 路由器"], answer: "C. 调制解调器" },
    { text: "下列哪个网络被认为是互联网的前身，并最早采用了分组交换技术？", options: ["A. ARPANET", "B. NSFNET", "C. WWW", "D. Ethernet"], answer: "A. ARPANET" },
    { text: "目录索引类搜索引擎（如hao123）主要通过______查找信息。", options: ["A. 关键词", "B. 分类目录", "C. 人工智能", "D. 语音输入"], answer: "B. 分类目录" },
    { text: "远程登录服务中，Telnet是明文传输，而______提供了加密的安全连接。", options: ["A. SSH", "B. RDP", "C. VNC", "D. FTP"], answer: "A. SSH" },
    { text: "下列哪项是对等式网络的优点？", options: ["A. 具备网络管理功能", "B. 安全性高", "C. 成本低", "D. 适合大型网络"], answer: "C. 成本低" },
    { text: "使用ping命令测试本机TCP/IP协议是否正常工作，应ping的地址是______。", options: ["A. 本机IP地址", "B. 默认网关", "C. 127.0.0.1", "D. 对方主机IP"], answer: "C. 127.0.0.1" },
    { text: "A类IP地址的第一个字节范围是1~126，其中127.0.0.0/8保留用于______测试。", options: ["A. 回环", "B. 广播", "C. 组播", "D. 私有"], answer: "A. 回环" },
    { text: "在Linux系统中，改变文件拥有者的命令是______。", options: ["A. chmod", "B. chown", "C. chgrp", "D. usermod"], answer: "B. chown" },
    { text: "下列哪种传输介质的抗干扰能力最强？", options: ["A. 双绞线", "B. 同轴电缆", "C. 光纤", "D. 无线电磁波"], answer: "C. 光纤" },
    { text: "局域网中，通信处理一般由______完成。", options: ["A. 路由器", "B. 交换机", "C. 网卡", "D. 服务器"], answer: "C. 网卡" },
    { text: "W3C制定的标准包括HTML、CSS和______等。", options: ["A. TCP/IP", "B. XML", "C. FTP", "D. HTTP"], answer: "B. XML" },
    { text: "使用搜索引擎时，将关键词用双引号括起来可以实现______匹配，提高搜索准确性。", options: ["A. 精确", "B. 模糊", "C. 同义词", "D. 拼音"], answer: "A. 精确" },
    { text: "GPON技术中，最大分光比可达______。", options: ["A. 1:32", "B. 1:64", "C. 1:128", "D. 1:256"], answer: "C. 1:128" },
    { text: "以下哪个是访问Internet资源的工具？", options: ["A. 浏览器", "B. 编译器和C. 文本编辑器", "D. 数据库管理系统"], answer: "A. 浏览器" },
    { text: "配置计算机TCP/IP协议时，如果不需要访问本网络以外的网络，可以不配置______。", options: ["A. IP地址", "B. 子网掩码", "C. 默认网关", "D. DNS服务器"], answer: "C. 默认网关" },
    { text: "在无盘工作站网络中，工作站的启动依赖于______。", options: ["A. 本地硬盘中的操作系统", "B. 网卡上的自启动芯片和服务器", "C. U盘启动", "D. 光盘启动"], answer: "B. 网卡上的自启动芯片和服务器" },
    { text: "虚拟桌面技术的整体架构中，负责将桌面虚拟机在数据中心进行托管并统一管理的层是______。", options: ["A. 终端接入层", "B. 桌面管理层", "C. 资源池层", "D. 接入网络层"], answer: "B. 桌面管理层" },
    { text: "以太网帧中，用于差错控制的字段位于______。", options: ["A. 帧头", "B. 数据部分", "C. 帧尾", "D. 前导码"], answer: "C. 帧尾" },
    { text: "IM（即时通信）软件除了文字聊天外，通常还支持语音通话、视频通话和______传输等功能。", options: ["A. 文件", "B. 数据库", "C. 程序", "D. 系统"], answer: "A. 文件" },
    { text: "当需要直接连接两台计算机时，应使用______双绞线。", options: ["A. 直通线", "B. 交叉线", "C. 反线", "D. 屏蔽线"], answer: "B. 交叉线" },
    { text: "以下哪种拓扑结构可靠性最高，但布线成本也最高？", options: ["A. 总线型", "B. 星型", "C. 环型", "D. 网状"], answer: "D. 网状" },
    { text: "计算机网络发展第一阶段的主要特征是______。", options: ["A. 分组交换", "B. 以单台计算机为中心的联机终端系统", "C. 标准化网络体系结构", "D. 互联网普及"], answer: "B. 以单台计算机为中心的联机终端系统" },
    { text: "制作双绞线RJ-45接头时，剥线长度一般为______。", options: ["A. 1cm", "B. 1.5cm", "C. 2.5cm", "D. 3.5cm"], answer: "B. 1.5cm" },
    { text: "工作站/服务器网络常用于______的局域网络。", options: ["A. 小型", "B. 大型、中型", "C. 家庭", "D. 对等"], answer: "B. 大型、中型" },
    { text: "IEEE802.3标准是关于______的标准。", options: ["A. 无线局域网", "B. 令牌环网", "C. 以太网", "D. 城域网"], answer: "C. 以太网" },
    { text: "在Windows系统中，查看详细网络配置（包括MAC地址、IP地址、DNS等）的命令是______。", options: ["A. ipconfig", "B. ipconfig/all", "C. ifconfig", "D. winipcfg"], answer: "B. ipconfig/all" },
    { text: "代理服务器的主要功能不包括以下哪项？", options: ["A. 设置用户验证和记账", "B. 增加缓冲器提高访问速度", "C. 充当防火墙", "D. 路由选择"], answer: "D. 路由选择" },
    { text: "IP地址10.0.0.1属于______类私有地址。", options: ["A. A", "B. B", "C. C", "D. D"], answer: "A. A" },
    { text: "动态IP地址通常由______服务器自动分配，适用于普通客户端。", options: ["A. DNS", "B. DHCP", "C. HTTP", "D. FTP"], answer: "B. DHCP" },
    { text: "在Windows系统中，设置文件夹共享后，默认的共享权限是______。", options: ["A. 完全控制", "B. 更改", "C. 读取", "D. 写入"], answer: "C. 读取" },
    { text: "在OSI参考模型中，负责数据格式变换、数据加密与解密、数据压缩与恢复的层是______。", options: ["A. 会话层", "B. 表示层", "C. 应用层", "D. 传输层"], answer: "B. 表示层" },
    { text: "IEEE802委员会的主要任务是制定______标准。", options: ["A. 互联网域名", "B. 局域网和城域网", "C. 网络安全", "D. 万维网"], answer: "B. 局域网和城域网" },
    { text: "10Base-T标准使用的传输介质是______，最大传输距离为100米。", options: ["A. 粗同轴电缆", "B. 细同轴电缆", "C. 非屏蔽双绞线", "D. 光纤"], answer: "C. 非屏蔽双绞线" },
    { text: "使用迅雷等P2P下载工具时，下载同一文件的人越多，下载速度通常越______，因为用户之间也在互相上传数据。", options: ["A. 快", "B. 慢", "C. 不变", "D. 不确定"], answer: "A. 快" },
    { text: "在总线型拓扑结构中，如果总线两端不安装终端电阻，会导致______。", options: ["A. 信号反射，网络通信异常", "B. 网络速度变慢", "C. 网络完全无法通信", "D. 增加可连接设备数"], answer: "A. 信号反射，网络通信异常" },
    { text: "通信系统中，将消息转化为原始电信号的设备是______，接收端恢复信息的设备是______。", options: ["A. 信源、信宿", "B. 发送设备、接收设备", "C. 信道、信源", "D. 信宿、信源"], answer: "A. 信源、信宿" },
    { text: "路由器的最基本功能是______。", options: ["A. 信号放大", "B. 数据包转发", "C. 协议转换", "D. 地址学习"], answer: "B. 数据包转发" },
    { text: "以下哪个不是Internet提供的常见服务？", options: ["A. WWW", "B. 电子邮件", "C. 文件传输", "D. 数据库管理"], answer: "D. 数据库管理" },
    { text: "网盘（云存储）的核心功能包括数据存储、备份、共享和______。", options: ["A. 协同编辑", "B. 杀毒", "C. 加密", "D. 压缩"], answer: "A. 协同编辑" },
    { text: "局域网中，工作站与服务器的区别在于______。", options: ["A. 工作站没有CPU", "B. 服务器没有CPU", "C. 工作站可以独立工作，服务器提供共享资源", "D. 两者功能完全相同"], answer: "C. 工作站可以独立工作，服务器提供共享资源" },
    { text: "在打印服务器上，可以取消所有打印作业的操作是______。", options: ["A. 选择\"打印机\"→\"暂停打印\"", "B. 选择\"打印机\"→\"取消所有文档\"", "C. 右击每个文档选择\"取消\"", "D. 关闭打印机电源"], answer: "B. 选择\"打印机\"→\"取消所有文档\"" },
    { text: "局域网的地理范围通常在______。", options: ["A. 几米至10km", "B. 10~100km", "C. 100km以上", "D. 全球范围"], answer: "A. 几米至10km" },
    { text: "HTTPS协议默认使用的端口号是______。", options: ["A. 80", "B. 443", "C. 8080", "D. 8443"], answer: "B. 443" },
    { text: "电子邮件系统中，发送邮件的协议是SMTP，接收邮件的协议可以是POP3或______。", options: ["A. IMAP", "B. HTTP", "C. FTP", "D. Telnet"], answer: "A. IMAP" },
    { text: "微博属于Internet的哪一类服务？", options: ["A. 文件传输", "B. 即时通信", "C. 社交平台/信息共享", "D. 远程登录"], answer: "C. 社交平台/信息共享" },
    { text: "世界上最大的广域网是______。", options: ["A. 互联网（Internet）", "B. 城域网", "C. ARPANET", "D. NSFNET"], answer: "A. 互联网（Internet）" },
    { text: "私有IP地址也称为______。", options: ["A. 外网地址", "B. 公网地址", "C. 内网地址或局域网专用地址", "D. 全球唯一地址"], answer: "C. 内网地址或局域网专用地址" },
    { text: "模拟信号与数字信号的主要区别在于______。", options: ["A. 模拟信号连续，数字信号离散", "B. 模拟信号离散，数字信号连续", "C. 两者都连续", "D. 两者都离散"], answer: "A. 模拟信号连续，数字信号离散" },
    { text: "在Linux系统中，使用chmod命令修改文件权限，数字764对应的权限是______。", options: ["A. rwxrw-r--", "B. rw-rwxr--", "C. rwxrw-rw-", "D. rwxr-xr--"], answer: "A. rwxrw-r--" },
    { text: "P2P文件共享技术的特点是______。", options: ["A. 下载速度随下载人数增加而变慢", "B. 下载人数越多，上传人数也越多，速度越快", "C. 必须通过中心服务器", "D. 只能下载不能上传"], answer: "B. 下载人数越多，上传人数也越多，速度越快" },
    { text: "在EIA/TIA568A标准中，线序第1脚是白绿，第2脚是绿，第3脚是白橙，第4脚是蓝，第5脚是白蓝，第6脚是橙，第7脚是白棕，第8脚是棕。568B与568A的区别是______和______两组线对调。", options: ["A. 1-2与3-6", "B. 1-3与2-6", "C. 1-6与2-3", "D. 1-4与2-5"], answer: "A. 1-2与3-6" },
    { text: "局域网的典型传输速率范围为______。", options: ["A. 10Mbit/s~100Mbit/s", "B. 100Mbit/s~10Gbit/s", "C. 1Mbit/s~10Mbit/s", "D. 10Gbit/s~100Gbit/s"], answer: "B. 100Mbit/s~10Gbit/s" },
    { text: "在局域网中实现网络共享打印的第一步是______。", options: ["A. 安装网络打印机驱动程序", "B. 在服务器上安装本地打印机并共享", "C. 购买打印机", "D. 配置IP地址"], answer: "B. 在服务器上安装本地打印机并共享" },
    { text: "HTTP协议的默认端口号是______。", options: ["A. 21", "B. 80", "C. 443", "D. 25"], answer: "B. 80" },
    { text: "共享文件夹的权限中，\"更改\"权限不包括______。", options: ["A. 创建新文件夹", "B. 修改文件内容", "C. 删除文件和文件夹", "D. 获得文件的所有权"], answer: "D. 获得文件的所有权" },
    { text: "计算机网络最常见的分类方式是按______进行分类。", options: ["A. 传输介质", "B. 拓扑结构", "C. 分布距离", "D. 通信协议"], answer: "C. 分布距离" },
    { text: "通信系统中，信源的作用是______。", options: ["A. 对信号进行调制", "B. 把各类消息转化为原始电信号", "C. 对信号进行解调", "D. 传输信号"], answer: "B. 把各类消息转化为原始电信号" },
    { text: "关于局域网的说法，正确的是______。", options: ["A. 局域网必须使用双绞线", "B. 局域网只能采用星型拓扑", "C. 局域网误码率较低", "D. 局域网必须连接互联网"], answer: "C. 局域网误码率较低" },
    { text: "在计算机网络发展第一阶段（面向终端的计算机通信网络）中，终端不具备的能力是______。", options: ["A. 输入数据", "B. 显示信息", "C. 独立运行程序", "D. 与主机通信"], answer: "C. 独立运行程序" },
    { text: "在百度搜索引擎中，要精确搜索特定短语，应使用______。", options: ["A. 空格", "B. 双引号", "C. 加号", "D. 减号"], answer: "B. 双引号" },
    { text: "IPv6相对于IPv4的主要优势是______。", options: ["A. 更高的安全性", "B. 更大的地址空间", "C. 更快的传输速度", "D. 更低的成本"], answer: "B. 更大的地址空间" },
    { text: "在通信系统中，信源编码的主要作用是______。", options: ["A. 增加冗余位", "B. 去除数据冗余提升效率", "C. 进行调制", "D. 进行解调"], answer: "B. 去除数据冗余提升效率" },
    { text: "以下哪个是宽带路由器默认开启的服务，方便客户端自动获取IP地址？", options: ["A. DNS", "B. DHCP", "C. NAT", "D. HTTP"], answer: "B. DHCP" },
    { text: "以下哪种网络打印机模式的打印速度最快？", options: ["A. 专用PC机作打印服务器+高性能激光打印机", "B. 外置打印服务器+标准并口打印机", "C. 内置打印服务器+网络激光打印机", "D. 终端共享打印模式"], answer: "C. 内置打印服务器+网络激光打印机" },
    { text: "在Linux系统中，修改网络接口配置文件后，不重启系统使配置生效的命令是______。", options: ["A. systemctl restart network", "B. ifdown && ifup", "C. reboot", "D. service network stop"], answer: "A. systemctl restart network" },
    { text: "DTE的中文全称是______。", options: ["A. 数据终端设备", "B. 数据电路终接设备", "C. 数据通信设备", "D. 数字终端设备"], answer: "A. 数据终端设备" },
    { text: "Linux系统中，普通用户的命令提示符是______，管理员root的提示符是______。", options: ["A. $、#", "B. #、$", "C. %、#", "D. $、%"], answer: "A. $、#" },
    { text: "在vi编辑器中，按______键可以进入插入模式（在光标当前位置插入），按______键可以进入插入模式（在光标下一行插入）。", options: ["A. i、o", "B. a、i", "C. o、a", "D. i、a"], answer: "A. i、o" },
    { text: "IPv4地址的长度为______位。", options: ["A. 16", "B. 32", "C. 64", "D. 128"], answer: "B. 32" },
    { text: "信道编码的主要作用是______。", options: ["A. 去除数据冗余", "B. 增强信号抗干扰能力", "C. 提高传输速率", "D. 压缩数据"], answer: "B. 增强信号抗干扰能力" },
    { text: "在浏览器地址栏输入www.baidu.com，其中\"http\"表示______协议，\"www.baidu.com\"是域名。", options: ["A. 超文本传输", "B. 文件传输", "C. 邮件传输", "D. 远程登录"], answer: "A. 超文本传输" },
    { text: "网络维护中，用于记录故障处理过程和经验的文档称为______。", options: ["A. 网络拓扑图", "B. 维护记录", "C. 设备清单", "D. 用户手册"], answer: "B. 维护记录" },
    { text: "执行命令shutdown -h now的作用是______；shutdown -r now的作用是重启。", options: ["A. 立即关机", "B. 立即重启", "C. 取消关机", "D. 延迟关机"], answer: "A. 立即关机" },
    { text: "执行命令shutdown -t 30 -h的作用是______。", options: ["A. 立即关机", "B. 30分钟后重启", "C. 30秒后关机", "D. 30分钟后关机并关闭电源"], answer: "C. 30秒后关机" },
    { text: "现代计算机网络的基本目的是______。", options: ["A. 数据通信和资源共享", "B. 提高计算机运算速度", "C. 实现人工智能", "D. 替代传统通信方式"], answer: "A. 数据通信和资源共享" },
    { text: "在局域网中，传输距离超过100米时，应优先考虑使用哪种传输介质？", options: ["A. 非屏蔽双绞线", "B. 屏蔽双绞线", "C. 同轴电缆", "D. 光纤"], answer: "D. 光纤" },
    { text: "广域网骨干网络的传输速率通常在______以上。", options: ["A. 100Mbit/s", "B. 1Gbit/s", "C. 10Gbit/s", "D. 100Gbit/s"], answer: "C. 10Gbit/s" },
    { text: "以下哪个命令用于追踪数据包经过的网络路径？", options: ["A. ping", "B. netstat", "C. traceroute", "D. nslookup"], answer: "C. traceroute" },
    { text: "长期固定分配给一台计算机使用的IP地址称为______。", options: ["A. 动态IP", "B. 静态IP", "C. 私有IP", "D. 公有IP"], answer: "B. 静态IP" },
    { text: "使用journalctl -xe命令的作用是______。", options: ["A. 查看系统服务日志", "B. 查看内核日志", "C. 查看磁盘信息", "D. 查看网络连接"], answer: "A. 查看系统服务日志" },
    { text: "当系统启动时停留在\"Kernel panic\"界面，通常需要进入______模式进行修复。", options: ["A. 救援", "B. 单用户", "C. 安全", "D. 调试"], answer: "B. 单用户" },
    { text: "在vi的一般模式下，按______可以撤销上一次操作。", options: ["A. u", "B. .", "C. r", "D. /"], answer: "A. u" },
    { text: "屏蔽双绞线（STP）相比于非屏蔽双绞线（UTP）的主要优点是______。", options: ["A. 价格便宜", "B. 安装简单", "C. 抗干扰能力强", "D. 传输距离远"], answer: "C. 抗干扰能力强" },
    { text: "使用宽带路由器共享上网时，如果网络服务商提供的是静态IP地址，WAN口应选择______。", options: ["A. 动态IP用户", "B. PPPoE用户", "C. 静态IP用户", "D. 桥接模式"], answer: "C. 静态IP用户" },
    { text: "在Linux系统中，查看磁盘使用情况的命令是______。", options: ["A. df -h", "B. du -sh", "C. fdisk -l", "D. mount"], answer: "A. df -h" },
    { text: "无线局域网中常用的拓扑结构是______。", options: ["A. 总线型", "B. 星型", "C. 环型", "D. 蜂窝状"], answer: "D. 蜂窝状" },
    { text: "以下哪种双绞线类型支持最高传输速率1000Mbps？", options: ["A. 3类", "B. 4类", "C. 5类", "D. 超5类"], answer: "D. 超5类" },
    { text: "在基本确定故障在某一具体设备上时，使用已知正常的设备替换可疑部分来验证故障点的方法称为______。", options: ["A. 分析观察法", "B. 故障隔离法", "C. 测试法", "D. 替换法"], answer: "D. 替换法" },
    { text: "当故障区域有限时，将出现故障的工作站和设备进行隔离，逐一排查，逐步缩小问题区域，这种方法称为______。", options: ["A. 分析观察法", "B. 故障隔离法", "C. 测试法", "D. 替换法"], answer: "B. 故障隔离法" },
    { text: "100Base-FX标准使用的传输介质是______。", options: ["A. 粗同轴电缆", "B. 细同轴电缆", "C. 双绞线", "D. 光纤"], answer: "D. 光纤" },
    { text: "光纤接入技术中，FTTH的全称是______，是目前家庭宽带的主流接入方式。", options: ["A. Fiber To The Home", "B. Fiber To The Building", "C. Fiber To The Curb", "D. Fiber To The Office"], answer: "A. Fiber To The Home" },
    { text: "一个C类网络默认的子网掩码下，可用的主机地址数量是______。", options: ["A. 254", "B. 255", "C. 256", "D. 65534"], answer: "A. 254" },
    { text: "在vi的一般模式下，输入ZZ的作用是______，输入ZQ的作用是不保存退出。", options: ["A. 保存并退出", "B. 强制保存", "C. 另存为", "D. 撤销"], answer: "A. 保存并退出" },
    { text: "Wi-Fi技术对应的IEEE标准是______。", options: ["A. 802.3", "B. 802.5", "C. 802.11", "D. 802.1X"], answer: "C. 802.11" },
    { text: "IPv6地址采用______进制表示。", options: ["A. 二", "B. 八", "C. 十", "D. 十六"], answer: "D. 十六" },
    { text: "vi编辑器的三种工作模式是______。", options: ["A. 编辑、插入、命令", "B. 一般、插入、命令", "C. 普通、插入、末行", "D. 一般、编辑、末行"], answer: "C. 普通、插入、末行" },
    { text: "TCP/IP协议栈中，网络接口层对应OSI模型的______。", options: ["A. 物理层和数据链路层", "B. 网络层", "C. 传输层", "D. 应用层"], answer: "A. 物理层和数据链路层" },
    { text: "当计算机能通过IP地址访问互联网，但无法通过域名访问网站时，最可能是______配置错误。", options: ["A. DNS", "B. 网关", "C. 子网掩码", "D. IP地址"], answer: "A. DNS" },
    { text: "OSI参考模型共有______个层次。", options: ["A. 4", "B. 5", "C. 7", "D. 8"], answer: "C. 7" },
    { text: "在OSI七层模型中，负责路由选择的层是______层，负责数据格式转换的层是______层。", options: ["A. 网络、表示", "B. 传输、会话", "C. 数据链路、应用", "D. 物理、网络"], answer: "A. 网络、表示" },
    { text: "在环型拓扑结构中，数据______。", options: ["A. 沿固定方向单向传输", "B. 双向同时传输", "C. 广播式传输", "D. 由中心节点转发"], answer: "A. 沿固定方向单向传输" },
    { text: "在环型拓扑结构中，数据沿______方向传输，如果某个节点故障可能导致全网瘫痪。", options: ["A. 单向", "B. 双向", "C. 广播", "D. 多播"], answer: "A. 单向" },
    { text: "网卡的MAC地址是______位二进制数，通常用12位十六进制数表示，前6位是厂商识别码。", options: ["A. 48", "B. 32", "C. 64", "D. 128"], answer: "A. 48" },
    { text: "在Linux命令行界面中，普通用户登录后的提示符是______。", options: ["A. #", "B. $", "C. %", "D. >"], answer: "B. $" },
    { text: "Linux系统中默认的管理员账号是______。", options: ["A. admin", "B. root", "C. supervisor", "D. administrator"], answer: "B. root" },
    { text: "在Windows系统中，tracert命令对应Linux中的______命令，用于追踪路由路径。", options: ["A. traceroute", "B. route", "C. netstat", "D. pathping"], answer: "A. traceroute" },
    { text: "在Windows系统中，traceroute命令对应的命令是______。", options: ["A. tracert", "B. route", "C. tracepath", "D. pathping"], answer: "A. tracert" },
    { text: "以下哪种拓扑结构具有中心节点，且中心节点故障会导致全网瘫痪？", options: ["A. 总线型", "B. 星型", "C. 环型", "D. 网状"], answer: "B. 星型" },
    { text: "POP3协议用于______邮件，默认端口号为110。", options: ["A. 发送", "B. 接收", "C. 转发", "D. 加密"], answer: "B. 接收" },
    { text: "SELinux有enforcing、permissive和disabled三种模式，其中enforcing模式会______违反策略的操作，permissive模式仅记录不阻止。", options: ["A. 阻止", "B. 允许", "C. 忽略", "D. 询问"], answer: "A. 阻止" },
    { text: "局域网最典型的特征是______。", options: ["A. 传输速率高", "B. 覆盖范围大", "C. 使用无线传输", "D. 需要专用服务器"], answer: "A. 传输速率高" },
    { text: "在vi的一般模式下，按哪个键可以删除光标所在的整行？", options: ["A. x", "B. dd", "C. yy", "D. p"], answer: "B. dd" },
    { text: "以下哪个设备不具备数据过滤和智能管理功能？", options: ["A. 网桥", "B. 交换机", "C. 中继器", "D. 路由器"], answer: "C. 中继器" },
    { text: "交叉线制作时，一端采用568A标准，另一端应采用______标准。", options: ["A. 568A", "B. 568B", "C. 任意", "D. 两端相同"], answer: "B. 568B" },
    { text: "在Windows系统中，共享文件夹的权限具有______特性，即多个权限取并集，但拒绝权限优先于允许。", options: ["A. 累积", "B. 互斥", "C. 覆盖", "D. 传递"], answer: "A. 累积" },
    { text: "局域网中，工作站的正确描述是______。", options: ["A. 没有CPU和内存", "B. 可以独立工作，有自己的操作系统", "C. 只能作为服务器", "D. 必须通过服务器才能运行程序"], answer: "B. 可以独立工作，有自己的操作系统" },
    { text: "云存储的核心功能不包括______。", options: ["A. 数据存储", "B. 数据备份", "C. 数据加密", "D. 文件共享"], answer: "C. 数据加密" },
    { text: "下列哪项不是计算机网络必须具备的要素？", options: ["A. 至少两台计算机互联", "B. 通信设备与传输介质", "C. 网络软件、通信协议和网络操作系统", "D. 一台高性能服务器"], answer: "D. 一台高性能服务器" },
    { text: "在Internet上实现共享打印，需要在服务器上安装并配置______服务，并允许客户端通过HTTP访问打印机。", options: ["A. IIS", "B. Apache", "C. Nginx", "D. Tomcat"], answer: "A. IIS" },
    { text: "以下哪个属于元搜索引擎？", options: ["A. 百度", "B. 谷歌", "C. Dogpile", "D. 搜狗"], answer: "C. Dogpile" },
    { text: "AI搜索相比传统搜索的优势是______。", options: ["A. 更精准地解析用户查询意图", "B. 搜索结果数量更多", "C. 搜索速度更快", "D. 不需要联网"], answer: "A. 更精准地解析用户查询意图" },
    { text: "当服务器出现\"No space left on device\"错误时，应首先使用______命令定位大文件或目录。", options: ["A. df", "B. du", "C. fdisk", "D. ls"], answer: "B. du" },
    { text: "以下哪个设备通常用于连接两个同类型的局域网并隔离广播？", options: ["A. 集线器", "B. 中继器", "C. 网桥", "D. 网关"], answer: "C. 网桥" },
    { text: "在Linux系统中，实现打印服务通常使用______服务。", options: ["A. httpd", "B. vsftpd", "C. cups", "D. sshd"], answer: "C. cups" },
    { text: "下列哪项不是网络维护的常用手段？", options: ["A. 分析观察法", "B. 故障隔离法", "C. 数据加密法", "D. 替换法"], answer: "C. 数据加密法" },

  function renderQuestions() {
    var container = document.getElementById('questionsContainer');
    var html = '';
    var c = 1, t = 1, f = 1;

    html += '<div class="section-title" data-section="choice"><h2>一、选择题</h2><span class="count">' + choiceQuestions.length + ' 题</span></div>';
    choiceQuestions.forEach(function(q, i) {
      html += '<div class="q-card" data-type="choice" data-q="c' + i + '" data-answer="' + q.answer.replace(/"/g, '&quot;') + '"><div class="q-header"><span class="q-num">' + (c++) + '</span><span class="q-text">' + q.text + '</span></div>';
      html += '<div class="opts-group">' + q.options.map(function(o) { return '<label><input type="radio" name="c' + i + '" value="' + o.replace(/"/g, '&quot;') + '"> ' + o + '</label>'; }).join('') + '</div>';
      html += '<div class="ans-area"><span class="ans-toggle" onclick="var n=this.nextElementSibling;n.classList.toggle(\'show\');this.textContent=n.classList.contains(\'show\')?\'隐藏答案\':\'查看答案\'">查看答案</span><div class="ans-content">' + q.answer + '</div></div></div>';
    });

    html += '<div class="section-title" data-section="tf"><h2>二、判断题</h2><span class="count">' + tfQuestions.length + ' 题</span></div>';
    tfQuestions.forEach(function(q, i) {
      html += '<div class="q-card" data-type="tf" data-q="t' + i + '" data-answer="' + q.answer + '"><div class="q-header"><span class="q-num">' + (t++) + '</span><span class="q-text">' + q.text + '</span></div>';
      html += '<div class="tf-opts"><label><input type="radio" name="t' + i + '" value="正确"> 正确</label><label><input type="radio" name="t' + i + '" value="错误"> 错误</label></div>';
      html += '<div class="ans-area"><span class="ans-toggle" onclick="var n=this.nextElementSibling;n.classList.toggle(\'show\');this.textContent=n.classList.contains(\'show\')?\'隐藏答案\':\'查看答案\'">查看答案</span><div class="ans-content">' + q.answer + '</div></div></div>';
    });

    html += '<div class="section-title" data-section="fill"><h2>三、填空题</h2><span class="count">' + fillQuestions.length + ' 题</span></div>';
    fillQuestions.forEach(function(q, i) {
      html += '<div class="q-card" data-type="fill" data-q="f' + i + '" data-answer="' + q.answer.replace(/"/g, '&quot;') + '"><div class="q-header"><span class="q-num">' + (f++) + '</span><span class="q-text">' + q.text + '</span></div>';
      html += '<input class="fill-inp" placeholder="输入答案…">';
      html += '<div class="ans-area"><span class="ans-toggle" onclick="var n=this.nextElementSibling;n.classList.toggle(\'show\');this.textContent=n.classList.contains(\'show\')?\'隐藏答案\':\'查看答案\'">查看答案</span><div class="ans-content">' + q.answer + '</div></div></div>';
    });

    container.innerHTML = html;
    document.getElementById('stats-bar').innerHTML =
      '<span class="stat-chip active" data-filter="all" onclick="filterQuestions(\'all\')">总计 <strong>' + (choiceQuestions.length + tfQuestions.length + fillQuestions.length) + '</strong> 题</span>' +
      '<span class="stat-chip" data-filter="choice" onclick="filterQuestions(\'choice\')">选择题 <strong>' + choiceQuestions.length + '</strong></span>' +
      '<span class="stat-chip" data-filter="tf" onclick="filterQuestions(\'tf\')">判断题 <strong>' + tfQuestions.length + '</strong></span>' +
      '<span class="stat-chip" data-filter="fill" onclick="filterQuestions(\'fill\')">填空题 <strong>' + fillQuestions.length + '</strong></span>';
  }

  window.toggleAllAnswers = function() {
    var all = document.querySelectorAll('.ans-content');
    var show = ![].every.call(all, function(a) { return a.classList.contains('show'); });
    all.forEach(function(a) { a.classList.toggle('show', show); });
    document.querySelectorAll('.ans-toggle').forEach(function(s) { s.textContent = show ? '隐藏答案' : '查看答案'; });
  };

  window.filterQuestions = function(type) {
    document.body.setAttribute('data-exam-filter', type);
    var chips = document.querySelectorAll('.stat-chip');
    chips.forEach(function(c) { c.classList.remove('active'); });
    var activeChip = document.querySelector('[data-filter="' + type + '"]');
    if (activeChip) activeChip.classList.add('active');

    var cards = document.querySelectorAll('.q-card');
    var sections = document.querySelectorAll('.section-title');
    if (type === 'all') {
      cards.forEach(function(c) { c.style.display = ''; });
      sections.forEach(function(s) { s.style.display = ''; });
    } else {
      sections.forEach(function(s) { s.style.display = (s.getAttribute('data-section') === type) ? '' : 'none'; });
      cards.forEach(function(c) {
        c.style.display = (c.getAttribute('data-type') === type) ? '' : 'none';
      });
    }
    if (document.body.classList.contains('exam-mode')) updateProgress();
  };

  window.updateProgress = function() {
    var filter = document.body.getAttribute('data-exam-filter') || 'all';
    var cards = document.querySelectorAll('.q-card');
    var done = 0, left = 0;
    cards.forEach(function(card) {
      if (card.style.display !== 'none' && card.getAttribute('data-type') !== 'fill') {
        left++;
        if (card.querySelector('input[type="radio"]:checked')) done++;
      }
    });
    document.getElementById('progDone').textContent = done;
    document.getElementById('progLeft').textContent = left;
  };

  var examMode = false;
  window.toggleExamMode = function() {
    examMode = !examMode;
    var btn = document.getElementById('exam-btn');
    if (examMode) {
      document.body.classList.add('exam-mode');
      document.body.setAttribute('data-exam-filter', 'all');
      btn.textContent = '退出考试';
      btn.style.color = '#18d1ff';
      btn.style.borderColor = '#18d1ff';
      document.querySelectorAll('.ans-content.show').forEach(function(a) { a.classList.remove('show'); });
      document.querySelectorAll('.ans-toggle').forEach(function(s) { s.textContent = '查看答案'; });
      document.querySelectorAll('.q-card').forEach(function(c) { c.classList.remove('correct', 'wrong'); });
      document.getElementById('exam-score').style.display = 'none';
      document.getElementById('exam-score').innerHTML = '';
      document.querySelectorAll('input[type="radio"]').forEach(function(r) { r.checked = false; });
      document.body.classList.remove('review-wrong');
      // activate "all" chip
      var chips = document.querySelectorAll('.stat-chip');
      chips.forEach(function(c) { c.classList.remove('active'); });
      var allChip = document.querySelector('[data-filter="all"]');
      if (allChip) allChip.classList.add('active');
      // show all cards
      document.querySelectorAll('.q-card').forEach(function(c) { c.style.display = ''; });
      document.querySelectorAll('.section-title').forEach(function(s) { s.style.display = ''; });
      // add radio change listener
      document.addEventListener('change', updateProgress);
      updateProgress();
    } else {
      document.body.classList.remove('exam-mode');
      document.body.classList.remove('review-wrong');
      btn.textContent = '考试模式';
      btn.style.color = '';
      btn.style.borderColor = '';
      document.querySelectorAll('.q-card').forEach(function(c) { c.classList.remove('correct', 'wrong'); });
      document.getElementById('exam-score').style.display = 'none';
      document.getElementById('exam-score').innerHTML = '';
      document.removeEventListener('change', updateProgress);
      document.querySelectorAll('.q-card').forEach(function(c) { c.style.display = ''; });
      document.querySelectorAll('.section-title').forEach(function(s) { s.style.display = ''; });
      // reset stat chips
      var chips = document.querySelectorAll('.stat-chip');
      chips.forEach(function(c) { c.classList.remove('active'); });
      var allChip = document.querySelector('[data-filter="all"]');
      if (allChip) allChip.classList.add('active');
    }
  };

  window.submitExam = function() {
    var total = 0, correct = 0, fillCount = 0;
    var cards = document.querySelectorAll('.q-card');
    var visibleCards = [];
    cards.forEach(function(card) {
      if (card.style.display === 'none') return;
      var type = card.getAttribute('data-type');
      var answer = card.getAttribute('data-answer');
      if (type === 'fill') { fillCount++; return; }
      total++;
      visibleCards.push(card);
      var checked = card.querySelector('input[type="radio"]:checked');
      if (checked && checked.value === answer) {
        correct++;
        card.classList.add('correct');
      } else {
        card.classList.add('wrong');
      }
    });
    // show score (excludes fills)
    var scoreHtml = '得分: ' + correct + ' / ' + total;
    if (total > 0) scoreHtml += ' (' + Math.round(correct / total * 100) + '%)';
    if (fillCount > 0) scoreHtml += '（不含填空题 ' + fillCount + ' 道）';
    scoreHtml += ' <button class="toolbar-btn" onclick="showReview()" style="font-size:0.65rem;padding:0.2rem 0.7rem;">只看错题和填空题</button>';
    var scoreEl = document.getElementById('exam-score');
    scoreEl.innerHTML = scoreHtml;
    scoreEl.style.display = 'block';
    document.removeEventListener('change', updateProgress);
    window.scrollTo({ top: document.getElementById('exam-submit').offsetTop - 100, behavior: 'smooth' });
  };

  window.showReview = function() {
    document.body.classList.add('review-wrong');
    // show all cards first, then hide correct ones
    document.querySelectorAll('.q-card').forEach(function(c) { c.style.display = ''; });
    document.querySelectorAll('.section-title').forEach(function(s) { s.style.display = ''; });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  renderQuestions();
  document.addEventListener('DOMContentLoaded', renderQuestions);

        }, 800);
      }, 600);

      var txt = document.getElementById('loaderPct');
      var p = 0;
      var t = setInterval(function(){
        p += Math.random() * 7 + 3;
        if (p >= 100) { p = 100; clearInterval(t); }
        if (bar) bar.style.width = p + '%';
        if (txt) txt.textContent = Math.floor(p) + '%';
        if (p === 100) setTimeout(function(){
          scr.classList.add('done');
          setTimeout(function(){
            var pc = document.getElementById('page-content');
            if (pc) pc.classList.add('visible');
          }, 800);
        }, 300);
      }, 50);
    }
  }

  /* ========== NAV SCROLL ========== */
  var nav = document.getElementById('nav');
  window.addEventListener('scroll', function(){ nav.classList.toggle('scrolled', window.scrollY > 50); });
</script>
</div>
</body>
</html>
