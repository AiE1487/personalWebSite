<!DOCTYPE html>
<html lang="zh-cn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">

<title>计算机网络题库 — AIRES PRIVATE</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; font-size: 16px; color-scheme: dark; scroll-behavior: smooth; }
body {
  background: #141414; color: #c4c2c2;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  width: 100%; min-height: 100vh; overflow-x: hidden; line-height: 1.7;
}
#page-content { opacity: 0; transition: opacity 0.5s ease; }
#page-content.visible { opacity: 1; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: #141414; }
::-webkit-scrollbar-thumb { background: #18d1ff; border-radius: 2px; }

/* ========== LOADER ========== */
#loader { position: fixed; inset: 0; z-index: 99999; background: #2a2a2a; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease, visibility 0.8s ease; }
#loader.done { opacity: 0; visibility: hidden; pointer-events: none; }
@keyframes slideUpIn { from { transform: translateY(100vh); } to { transform: translateY(0); } }
#loader.from-index { animation: slideUpIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
.loader-logo { text-align: center; }
.loader-icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; opacity: 0.85; }
.loader-icon img { width: 100%; height: 100%; object-fit: contain; }
.loader-logo .zh { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.25em; color: #c4c2c2; line-height: 1.2; }
.loader-logo .en { font-size: 0.5rem; letter-spacing: 0.5em; color: #666; margin-top: 0.5rem; text-transform: uppercase; }
.loader-logo .line { width: 4rem; height: 1px; background: #555; margin: 0.8rem auto; }
.loader-track { position: absolute; bottom: 4.5rem; left: 50%; transform: translateX(-50%); width: 55%; max-width: 520px; }
.loader-bar { width: 100%; height: 3px; background: #444; }
.loader-fill { height: 100%; background: #18d1ff; width: 0%; transition: width 0.05s linear; }
.loader-info { display: flex; justify-content: space-between; margin-top: 0.6rem; font-size: 0.55rem; letter-spacing: 0.08em; color: #777; }
.loader-info .cyan { color: #18d1ff; }
.loader-copy { position: absolute; bottom: 1.5rem; left: 2rem; font-size: 0.55rem; letter-spacing: 0.12em; color: #555; }

/* ========== NAV ========== */
#nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; height: 60px; transition: background 0.4s ease; }
#nav.scrolled { background: rgba(20,20,20,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.04); }
.nav-left { display: flex; align-items: center; gap: 0.5rem; }
.nav-brand-icon { width: 24px; height: 24px; }
.nav-brand-icon img { width: 100%; height: 100%; object-fit: contain; }
.nav-brand { text-decoration: none; display: flex; align-items: center; }
.nav-brand-text { font-size: 1rem; font-weight: 700; letter-spacing: 0.2em; color: #fff; }
.nav-right { display: flex; align-items: center; }
.nav-back { font-size: 0.55rem; letter-spacing: 0.12em; color: #18d1ff; text-decoration: none; text-transform: uppercase; border: 1px solid rgba(24,209,255,0.25); padding: 0.3rem 0.8rem; transition: background 0.3s ease; }
.nav-back:hover { background: rgba(24,209,255,0.1); }

/* ========== HEADER STATS ========== */
#stats-bar {
  display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: center;
  padding: 0 0 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 1.5rem;
}
.stat-chip {
  font-size: 0.75rem; font-weight: 600; color: #18d1ff;
  background: rgba(24,209,255,0.08); padding: 0.3rem 0.9rem;
  letter-spacing: 0.04em; border: 1px solid rgba(24,209,255,0.15);
}
.stat-chip strong { color: #fff; margin: 0 0.15rem; }

/* ========== TOOLBAR ========== */
#toolbar {
  display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: center; margin-bottom: 2rem;
}
.toolbar-btn {
  font-size: 0.72rem; font-weight: 500; letter-spacing: 0.06em;
  padding: 0.4rem 1.1rem; cursor: pointer;
  background: transparent; color: #888; border: 1px solid rgba(255,255,255,0.12);
  transition: all 0.3s ease; font-family: inherit;
}
.toolbar-btn:hover { color: #18d1ff; border-color: rgba(24,209,255,0.4); background: rgba(24,209,255,0.05); }

/* exam mode */
.exam-mode .stat-chip { opacity: 0.4; pointer-events: auto; }
.exam-mode .stat-chip.active { opacity: 1; }
.exam-mode .ans-area { display: none !important; }
.exam-mode .q-card.correct { border-color: rgba(0,255,100,0.4) !important; background: rgba(0,255,100,0.04) !important; }
.exam-mode .q-card.wrong { border-color: rgba(255,80,80,0.4) !important; background: rgba(255,80,80,0.04) !important; }
/* review mode: show only wrong + fill cards */
.review-wrong .q-card.correct { display: none !important; }
.review-wrong .q-card:not(.correct):not(.wrong) { } /* fill cards stay */
#exam-submit {
  display: none; width: 100%; max-width: 860px; margin: 0 auto 3rem; padding: 0 2rem;
}
#exam-submit button {
  width: 100%; padding: 0.8rem; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.12em;
  cursor: pointer; background: transparent; color: #18d1ff; border: 1px solid rgba(24,209,255,0.3);
  transition: all 0.3s ease; font-family: inherit;
}
#exam-submit button:hover { background: #18d1ff; color: #141414; }
.exam-mode #exam-submit { display: block; }
#exam-score { text-align: center; font-size: 1rem; color: #18d1ff; margin-top: 1rem; display: none; }
#exam-score button { margin-top: 0.6rem; margin-left: 0.5rem; }
.stat-chip { cursor: pointer; user-select: none; }
.stat-chip.active { background: rgba(24,209,255,0.2); border-color: #18d1ff; color: #fff; }

/* exam progress sidebar */
#exam-progress {
  position: fixed; left: 0; top: 50%; transform: translateY(-50%);
  z-index: 900; display: none; flex-direction: column; align-items: center; gap: 0.4rem;
  padding: 0.8rem 0.5rem; background: #1a1c1e; border: 1px solid rgba(255,255,255,0.06);
  border-left: none;
}
.exam-mode #exam-progress { display: flex; }
#exam-progress .prog-label { font-size: 0.45rem; color: #666; letter-spacing: 0.1em; writing-mode: vertical-rl; }
#exam-progress .prog-done { font-size: 0.8rem; font-weight: 700; color: #18d1ff; }
#exam-progress .prog-divider { width: 12px; height: 1px; background: rgba(255,255,255,0.1); }
#exam-progress .prog-left { font-size: 0.7rem; color: #888; }
@media (max-width: 768px) {
  #exam-progress { left: 2px; padding: 0.4rem 0.3rem; gap: 0.2rem; }
  #exam-progress .prog-done { font-size: 0.65rem; }
  #exam-progress .prog-left { font-size: 0.55rem; }
}

/* ========== MAIN ========== */
#main { max-width: 860px; margin: 0 auto; padding: 100px 2rem 4rem; }

#main h1 {
  font-size: 1.5rem; font-weight: 800; color: #fff; letter-spacing: 0.08em;
  text-align: center; margin-bottom: 1.2rem;
}

/* ========== SECTION TITLE ========== */
.section-title {
  margin: 2.5rem 0 1rem; padding-bottom: 0.6rem;
  border-bottom: 2px solid #18d1ff; display: flex; align-items: baseline; gap: 0.8rem;
}
.section-title h2 { font-size: 1.15rem; font-weight: 700; color: #eee; letter-spacing: 0.06em; }
.section-title .count { font-size: 0.72rem; color: #18d1ff; background: rgba(24,209,255,0.08); padding: 0.2rem 0.7rem; border: 1px solid rgba(24,209,255,0.15); }

/* ========== QUESTION CARD ========== */
.q-card {
  background: #1a1c1e; border: 1px solid rgba(255,255,255,0.08);
  padding: 1.2rem 1.4rem; margin-bottom: 0.8rem;
  transition: border-color 0.3s ease, background 0.3s ease;
}
.q-card:hover { border-color: rgba(24,209,255,0.2); background: #1c1e20; }

.q-header { display: flex; align-items: flex-start; gap: 0.8rem; margin-bottom: 0.8rem; }
.q-num {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 26px; height: 26px; border-radius: 6px;
  background: #18d1ff; color: #141414; font-size: 0.7rem; font-weight: 700; flex-shrink: 0;
}
.q-text { font-weight: 500; font-size: 0.92rem; color: #d0d0d0; padding-top: 2px; line-height: 1.6; }

/* Options */
.opts-group { margin-left: 2.1rem; }
.opts-group label {
  display: block; padding: 0.35rem 0.6rem; margin: 0.15rem 0; border-radius: 6px;
  cursor: pointer; font-size: 0.85rem; color: #bfbfbf;
  transition: background 0.15s; border: 1px solid transparent;
}
.opts-group label:hover { background: rgba(24,209,255,0.06); }
.opts-group input[type="radio"] { margin-right: 0.5rem; accent-color: #18d1ff; }

.tf-opts { display: flex; gap: 1.5rem; margin-left: 2.1rem; }
.tf-opts label { cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; color: #bfbfbf; }
.tf-opts input[type="radio"] { accent-color: #18d1ff; }

.fill-inp {
  width: calc(100% - 2.1rem); margin-left: 2.1rem; padding: 0.55rem 0.8rem;
  border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: #141414;
  font-size: 0.85rem; color: #c4c2c2; transition: border-color 0.3s ease; font-family: inherit;
}
.fill-inp:focus { outline: none; border-color: #18d1ff; }

/* Answer toggle */
.ans-area { margin-left: 2.1rem; margin-top: 0.5rem; }
.ans-toggle {
  font-size: 0.72rem; font-weight: 500; color: #18d1ff; cursor: pointer; user-select: none;
}
.ans-toggle:hover { text-decoration: underline; }
.ans-content {
  display: none; margin-top: 0.4rem; padding: 0.5rem 0.8rem; border-radius: 6px;
  background: rgba(24,209,255,0.06); font-size: 0.8rem; font-weight: 500;
  border-left: 3px solid #18d1ff; color: #18d1ff;
}
.ans-content.show { display: block; }
.ans-jiexi { margin-top: 0.4rem; padding: 0.4rem 0.6rem; border-radius: 0; background: rgba(24,209,255,0.04); border-left: 3px solid rgba(24,209,255,0.3); font-size: 0.78rem; color: #999; }
.ai-jiexi { background: rgba(255,200,50,0.03); border-left-color: rgba(255,200,50,0.3); color: #888; font-style: italic; }
.exam-mode .ans-jiexi { display: none !important; }

/* Back to top */
.back-top {
  position: fixed; bottom: 1.5rem; right: 1.5rem; width: 36px; height: 36px;
  background: #1a1c1e; color: #18d1ff;
  border: 1px solid rgba(24,209,255,0.2); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center; z-index: 200;
  transition: all 0.3s ease;
}
.back-top:hover { background: #18d1ff; color: #141414; }
.back-bottom {
  position: fixed; bottom: 4.2rem; right: 1.5rem; width: 36px; height: 36px;
  background: #1a1c1e; color: #18d1ff;
  border: 1px solid rgba(24,209,255,0.2); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center; z-index: 200;
  transition: all 0.3s ease;
}
.back-bottom:hover { background: #18d1ff; color: #141414; }

/* ========== FOOTER ========== */
#footer { border-top: 1px solid rgba(255,255,255,0.06); padding: 1.5rem 2rem; max-width: 860px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; font-size: 0.55rem; letter-spacing: 0.08em; color: #555; }
.footer-links { display: flex; gap: 1.5rem; }
.footer-links a { color: #555; text-decoration: none; transition: color 0.3s ease; }
.footer-links a:hover { color: #18d1ff; }

@media (max-width: 768px) {
  #nav { padding: 0 1.5rem; }
  #main { padding: 80px 1rem 3rem; }
  .q-card { padding: 0.9rem 0.8rem; }
  .opts-group, .tf-opts, .fill-inp, .ans-area { margin-left: 1.2rem; }
  .fill-inp { width: calc(100% - 1.2rem); }
  .section-title h2 { font-size: 1rem; }
}
</style>
</head>

<script>
const choiceQuestions = [
    { text: "在Linux中，使用命令______可以查看当前路由表，使用命令______可以添加默认网关。", options: ["A. route、route add default gw", "B. ip route、route add", "C. route -n、route add", "D. 以上都是"], answer: "A", 解析: "Linux中route命令用于查看和修改路由表，route add default gw用于添加默认网关，指定数据包的默认出口路径。" },
    { text: "制定了商业建筑电信布线系统规范EIA/TIA-568的组织是______。", options: ["A. IEEE", "B. IANA", "C. EIA/TIA", "D. IETF"], answer: "C", 解析: "EIA/TIA（电子工业协会/电信工业协会）制定了商业建筑电信布线标准EIA/TIA-568，规定了双绞线线序、连接器和布线规范。" },
    { text: "公有IP地址的分配和管理由______负责。", options: ["A. IEEE", "B. IANA", "C. ISO", "D. W3C"], answer: "B", 解析: "IANA（互联网号码分配机构）隶属于ICANN，负责全球IP地址分配、域名系统根区管理和协议参数维护。" },
    { text: "在OSI参考模型中，路由器通常工作在______。", options: ["A. 物理层", "B. 数据链路层", "C. 网络层", "D. 传输层"], answer: "C", 解析: "路由器工作在网络层（OSI第3层），基于目标IP地址查询路由表，进行数据包的路径选择和转发决策。" },
    { text: "Linux中，chmod命令可以使用数字形式设置权限，例如chmod 755 file，其中7表示所有者权限（rwx），5表示组用户权限（r-x），另一个5表示其他用户权限______。", options: ["A. r-x", "B. rw-", "C. --x", "D. r--"], answer: "A", 解析: "chmod 755中：7=rwx（所有者读写执行），5=r-x（组用户读和执行），5=r-x（其他用户读和执行）。每位数字对应r(4)+w(2)+x(1)之和。" },
    { text: "下列哪个IP地址是回环测试地址？", options: ["A. 0.0.0.0", "B. 255.255.255.255", "C. 127.0.0.1", "D. 192.168.1.1"], answer: "C", 解析: "127.0.0.1是回环测试地址（Loopback），数据包发送后不经过物理网卡，在TCP/IP协议栈内部返回，用于测试本机协议安装是否正常。" },
    { text: "将数字信号转化为模拟信号的过程称为______。", options: ["A. 解调", "B. 编码", "C. 调制", "D. 解码"], answer: "C", 解析: "调制（Modulation）是将数字信号（基带信号）转换为模拟信号的过程，使数字信号能够在模拟信道上传输。" },
    { text: "将数字信号转换为模拟信号的过程称为______，将模拟信号转换为数字信号的过程称为______。", options: ["A. 调制、解调", "B. 解调、调制", "C. 编码、解码", "D. 解码、编码"], answer: "A", 解析: "调制是将数字信号转换为模拟信号；解调是将模拟信号恢复为数字信号。Modem（调制解调器）兼具两种功能。" },
    { text: "中国于______年正式全功能接入Internet。", options: ["A. 1987", "B. 1994", "C. 1997", "D. 2000"], answer: "B", 解析: "1994年4月20日，中国通过NCFC的64K国际专线全功能接入Internet，正式成为国际互联网成员。" },
    { text: "中国正式全功能接入Internet的时间是______。", options: ["A. 1987年", "B. 1994年", "C. 2000年", "D. 2010年"], answer: "B", 解析: "1994年中国正式全功能接入Internet（1987年发送了第一封电子邮件但并非全功能接入）。" },
    { text: "微博是一种______媒体，用户可以通过它发布短消息、图片和视频，与他人互动。", options: ["A. 社交", "B. 新闻", "C. 直播", "D. 教育"], answer: "A", 解析: "微博是一种社交媒体平台（Micro-blog），用户可发布短文字、图片和视频，通过关注、转发、评论和点赞进行互动。" },
    { text: "以下哪个协议用于远程登录？", options: ["A. HTTP", "B. FTP", "C. Telnet", "D. SMTP"], answer: "C", 解析: "Telnet（远程登录协议）默认端口23，以明文传输数据。HTTP用于Web访问(80)，FTP用于文件传输(21)，SMTP用于邮件发送(25)。" },
    { text: "统计时分多路复用技术相比于传统时分多路复用的改进之处在于______。", options: ["A. 固定分配时间片", "B. 动态分配时间片", "C. 增加信道带宽", "D. 减少用户数量"], answer: "B", 解析: "统计时分多路复用（STDM）与传统TDM的关键区别在于动态分配时间片——只在用户有数据发送时才分配，提高了信道利用率。" },
    { text: "光纤收发器的主要功能是______。", options: ["A. 将电信号转换为光信号或将光信号转换为电信号", "B. 放大信号", "C. 路由选择", "D. 数据过滤"], answer: "A", 解析: "光纤收发器（光电转换器）的核心功能是电信号与光信号之间的双向转换，使双绞线网络设备可通过光纤进行远距离传输。" },
    { text: "IP数据报首部固定长度为______字节，可变部分长度不定。", options: ["A. 20", "B. 32", "C. 64", "D. 128"], answer: "A", 解析: "IP数据报首部固定部分为20字节，包含版本、首部长度、服务类型、总长度、标识、标志、片偏移、TTL、协议、首部校验和、源IP地址和目的IP地址等字段。" },
    { text: "直通线（平行线）适用于以下哪种设备连接？", options: ["A. 计算机与计算机", "B. 交换机普通口与另一交换机普通口", "C. 计算机与交换机普通口", "D. 交换机级联口与另一交换机级联口"], answer: "C", 解析: "直通线两端线序相同（T568B-T568B），用于连接异类设备如计算机（DTE）与交换机普通口（DCE）。同类设备间（如计算机-计算机）需使用交叉线。" },
    { text: "IPv6地址的长度为______位。", options: ["A. 32", "B. 64", "C. 128", "D. 256"], answer: "C", 解析: "IPv6地址长度为128位（16字节），是IPv4（32位）的4倍，理论上可提供约3.4×10^38个地址，彻底解决了IPv4地址耗尽问题。" },
    { text: "IP地址中，主机位全\"0\"表示______。", options: ["A. 广播地址", "B. 网络地址", "C. 回环地址", "D. 全网地址"], answer: "B", 解析: "IP地址中主机位全0表示网络地址（Network Address），用于标识一个网络。主机位全1表示该网络的广播地址。" },
    { text: "下列哪个是私有IP地址？", options: ["A. 8.8.8.8", "B. 114.114.114.114", "C. 172.31.100.1", "D. 192.169.1.1"], answer: "C", 解析: "172.31.100.1属于B类私有地址（172.16.0.0~172.31.255.255）。8.8.8.8是Google公共DNS，114.114.114.114是国内公共DNS，192.169.1.1不在C类私有范围（192.168.x.x）内。" },
    { text: "在光纤宽带接入中，用户端需要安装的设备是______。", options: ["A. ADSL Modem", "B. Cable Modem", "C. 光猫（ONU）", "D. 路由器"], answer: "C", 解析: "光纤宽带接入中，用户端需安装光猫（ONU/ONT），将光纤传输的光信号转换为以太网电信号。ADSL使用电话线和ADSL Modem。" },
    { text: "以下哪个是全文搜索引擎？", options: ["A. hao123", "B. 百度", "C. 新浪", "D. 网易"], answer: "B", 解析: "百度是全文搜索引擎，通过爬虫抓取网页建立索引供关键词检索。hao123是目录导航网站，新浪和网易是门户网站。" },
    { text: "无盘工作站的特点是______。", options: ["A. 没有CPU和内存", "B. 没有软盘驱动器和硬盘驱动器", "C. 不能独立工作", "D. 必须连接Internet"], answer: "B", 解析: "无盘工作站没有软盘驱动器和硬盘驱动器，依赖网卡上的Boot ROM芯片通过网络从服务器远程加载操作系统和数据。" },
    { text: "在异步传输中，每个字符用一个起始位引导（编码为0），用一个停止位结束（编码为1），这种方式的优点是______。", options: ["A. 传输效率高", "B. 不需要时钟同步", "C. 适合高速传输", "D. 硬件简单"], answer: "B", 解析: "异步传输每个字符用起始位和停止位界定，收发双方无需严格时钟同步，硬件实现简单。缺点是有起始/停止位的额外开销，传输效率相对较低。" },
    { text: "数据通信中，允许信息同时沿两个方向传输的方式是______。", options: ["A. 单工通信", "B. 半双工通信", "C. 双工通信", "D. 异步通信"], answer: "C", 解析: "双工通信（Full-duplex）允许信息同时在两个方向传输，双方可同时发送和接收数据。单工只能单向传输，半双工可双向但不能同时。" },
    { text: "数据通信中，允许数据同时双向传输的方式称为______通信。", options: ["A. 单工", "B. 半双工", "C. 双工", "D. 异步"], answer: "C", 解析: "双工通信允许数据同时在两个方向传输，是最灵活高效的通信方式，如同电话通话，双方可同时说话和收听。" },
    { text: "在Windows系统中启用\"Internet连接共享\"功能后，内网网卡的IP地址会自动设置为______。", options: ["A. 192.168.0.1", "B. 192.168.1.1", "C. 192.168.137.1", "D. 10.0.0.1"], answer: "C", 解析: "Windows启用Internet连接共享（ICS）后，内网网卡IP自动设置为192.168.137.1/24，同时启用DHCP服务为内网设备分配IP地址。" },
    { text: "计算机网络是______相结合的产物。", options: ["A. 计算机技术和多媒体技术", "B. 计算机技术和通信技术", "C. 通信技术和自动化技术", "D. 计算机技术和电子技术"], answer: "B", 解析: "计算机网络是计算机技术（提供数据处理和存储能力）与通信技术（提供数据传输通道）相结合的产物，二者缺一不可。" },
    { text: "IPv6地址中，双冒号\"::\"只能使用______次，用以代表连续的多个0。", options: ["A. 一", "B. 二", "C. 三", "D. 任意"], answer: "A", 解析: "IPv6简化规则中双冒号（::）只能使用一次，代表连续多组全0。若使用多次会导致无法唯一确定原地址。每组开头的0可以省略。" },
    { text: "下列哪项不是局域网的特征？", options: ["A. 网络所覆盖的地理范围比较小", "B. 网络的经营权和管理权属于某个单位", "C. 传输质量好，误码率低", "D. 支持传输介质单一"], answer: "D", 解析: "局域网可使用多种传输介质（双绞线、光纤、同轴电缆），并非只能使用单一介质。覆盖范围小、单位所有、误码率低、速率高是局域网的典型特征。" },
    { text: "FTP协议用于控制连接的端口号是______。", options: ["A. 20", "B. 21", "C. 22", "D. 23"], answer: "B", 解析: "FTP协议使用两个端口：21用于控制连接（发送命令和响应），20用于数据传输连接（传送文件内容）。" },
    { text: "以下哪个不是搜索引擎的分类？", options: ["A. 全文搜索引擎", "B. 目录索引类搜索引擎", "C. 元搜索引擎", "D. 关系型搜索引擎"], answer: "D", 解析: "搜索引擎分为全文搜索引擎（百度/Google）、目录索引类搜索引擎（hao123）和元搜索引擎（Dogpile）。没有所谓的关系型搜索引擎这一分类。" },
    { text: "在Windows系统中，将网络打印机设置为默认打印机的方法是______。", options: ["A. 右击打印机图标选择\"设置为默认打印机\"", "B. 在打印机属性中勾选\"默认\"", "C. 在控制面板中设置", "D. 无法设置"], answer: "A", 解析: "Windows中设置默认打印机的方法是：右击打印机图标选择\"设置为默认打印机\"，此后所有应用程序将默认使用该打印机输出。" },
    { text: "Internet上的资源类型不包括以下哪项？", options: ["A. 文本", "B. 图片", "C. 硬件设备", "D. 视频"], answer: "C", 解析: "Internet资源类型主要包括文本、图片、视频、声音、动画等数字内容。硬件设备（如打印机、扫描仪）是物理实体，不属于Internet上的资源类型。" },
    { text: "使用搜索引擎的filetype:pdf功能可以______。", options: ["A. 搜索PDF格式的文件", "B. 搜索包含PDF关键词的网页", "C. 搜索PDF软件", "D. 搜索PDF阅读器"], answer: "A", 解析: "搜索引擎中使用filetype:pdf语法限定只搜索PDF格式文件。类似语法还有filetype:doc、filetype:ppt、filetype:xls等。" },
    { text: "以下哪个属于Internet提供的常用服务？", options: ["A. 文件传输", "B. 数据库管理", "C. 操作系统更新", "D. 硬件驱动下载"], answer: "A", 解析: "Internet提供的常用服务包括WWW（网页浏览）、电子邮件、文件传输（FTP）、远程登录等。数据库管理和操作系统更新不属于Internet直接提供的公共服务。" },
    { text: "按分布距离分类，覆盖范围在10~100km之间的网络是______。", options: ["A. 局域网", "B. 城域网", "C. 广域网", "D. 互联网"], answer: "B", 解析: "城域网（MAN）覆盖范围约10-100公里，介于局域网（几米-10km）和广域网（100km以上）之间，通常将一个城市内的多个局域网互联。" },
    { text: "在EIA/TIA568B标准中，双绞线线序的第1脚颜色是______。", options: ["A. 白绿", "B. 白橙", "C. 橙", "D. 绿"], answer: "B", 解析: "EIA/TIA 568B标准线序：1白橙、2橙、3白绿、4蓝、5白蓝、6绿、7白棕、8棕。第1脚为白橙。568A标准第1脚为白绿。" },
    { text: "在Windows系统中，安装网络打印机时，需要指定打印机的______。", options: ["A. IP地址或主机名", "B. 驱动程序路径", "C. 端口号", "D. 打印队列名称"], answer: "A", 解析: "安装网络打印机时需要指定打印机的网络地址（IP地址或主机名），以便计算机通过TCP/IP网络找到并连接目标打印机。" },
    { text: "光纤调制解调器（光猫）是______接入网络的关键设备。", options: ["A. ADSL", "B. 光纤", "C. 电缆", "D. 卫星"], answer: "B", 解析: "光猫是光纤宽带接入的关键设备。ADSL使用电话线和ADSL Modem，Cable Modem使用有线电视同轴电缆，卫星使用卫星天线。只有光纤接入使用光猫。" },
    { text: "ADSL技术中，\"非对称\"指的是______。", options: ["A. 上行速率与下行速率不同", "B. 上行速率与下行速率相同", "C. 传输距离不对称", "D. 信号频率不对称"], answer: "A", 解析: "ADSL的非对称特性指上行速率（用户发送）与下行速率（接收）不同，通常下行速率远高于上行速率，符合用户浏览网页、下载文件为主的典型使用模式。" },
    { text: "百度网盘的______功能可以实现本地文件夹与云端文件夹的实时同步，方便多设备使用。", options: ["A. 同步", "B. 分享", "C. 备份", "D. 压缩"], answer: "A", 解析: "百度网盘的\"同步\"功能可实现本地文件夹与云端文件夹的实时双向同步，在一个设备上的修改会自动更新到云端和其他设备。" },
    { text: "P2P文件共享技术中，每个节点既是客户端也是服务器，典型的应用有BT和______。", options: ["A. eMule", "B. FTP", "C. HTTP", "D. SMTP"], answer: "A", 解析: "eMule（电驴）和BitTorrent（BT）都是经典P2P文件共享应用。FTP、HTTP和SMTP均为传统的客户端-服务器模式协议。" },
    { text: "打印队列的作用是______。", options: ["A. 将打印作业直接发送到打印机", "B. 暂时存放等待打印的作业", "C. 管理打印机的硬件", "D. 转换打印数据格式"], answer: "B", 解析: "打印队列是一个缓冲区，暂时存放等待打印的作业，按先进先出（FIFO）顺序逐个发送到打印机，用户无需等待即可提交新的打印任务。" },
    { text: "TCP/IP协议簇中，提供端到端可靠数据传输的协议是______。", options: ["A. IP", "B. ARP", "C. TCP", "D. UDP"], answer: "C", 解析: "TCP（传输控制协议）提供面向连接的可靠数据传输，通过序列号编序、确认号确认、超时重传和流量控制等机制，确保数据无差错、不丢失、不重复、按序到达。" },
    { text: "下列IPv6地址简写正确的是______。", options: ["A. 2001:0db8:0000:0000:0000:ff00:0042:8329", "B. 2001:db8::ff00:42:8329", "C. 2001:db8:0:0:0:ff00:42:8329", "D. 2001:db8:0:0:0:ff00:0042:8329"], answer: "B", 解析: "IPv6简写规则：每组开头0可省略；连续多组全0可用双冒号（::）替代（只能用一次）。B选项2001:db8::ff00:42:8329符合所有简化规则。" },
    { text: "如果一个主机无法从DHCP服务器获取IP地址，它可能会自动配置一个从______范围内的IP地址。", options: ["A. 10.0.0.0/8", "B. 172.16.0.0/12", "C. 192.168.0.0/16", "D. 169.254.0.0/16"], answer: "D", 解析: "当DHCP客户端无法获取IP地址时，Windows系统自动配置APIPA地址（169.254.0.0/16范围），只能与同一子网内其他APIPA设备通信，无法访问Internet。" },
    { text: "Linux文件权限用数字表示时，7对应rwx，6对应rw-，5对应r-x，4对应r--，0对应---。那么权限754表示______。", options: ["A. rwxr-xr--", "B. rwxrw-r--", "C. rwxr-xrwx", "D. rwxr-xr-x"], answer: "A", 解析: "权限754：7=rwx（所有者读写执行），5=r-x（组用户读和执行），4=r--（其他用户仅读）。每位数字由r(4)+w(2)+x(1)求和可得。" },
    { text: "端口号的范围是______，其中0~1023称为知名端口。", options: ["A. 0-1024", "B. 0-65535", "C. 1-1024", "D. 1-65535"], answer: "B", 解析: "端口号是16位无符号整数，范围0-65535。0-1023为知名端口（Well-known Ports），由IANA分配给标准服务；1024-49151为注册端口；49152-65535为动态/私有端口。" },
    { text: "UDP协议是______的传输层协议。", options: ["A. 面向连接、可靠", "B. 面向连接、不可靠", "C. 无连接、可靠", "D. 无连接、不可靠"], answer: "D", 解析: "UDP（用户数据报协议）是无连接、不可靠的传输层协议，不建立连接、不提供确认重传和排序。优点是开销小、速度快，适用于DNS查询、实时音视频等场景。" },
    { text: "在星型拓扑结构中，中心设备通常使用______。", options: ["A. 集线器或交换机", "B. 路由器", "C. 网桥", "D. 中继器"], answer: "A", 解析: "星型拓扑以中心节点为核心，各节点通过独立链路连接到中心设备。中心设备通常使用集线器或交换机，负责所有数据的转发。" },
    { text: "IEEE802.3标准定义了______网络，IEEE802.5定义了______网络。", options: ["A. 以太网、令牌环", "B. 令牌环、以太网", "C. 无线局域网、以太网", "D. 城域网、令牌环"], answer: "A", 解析: "IEEE802.3定义了以太网标准（CSMA/CD），IEEE802.5定义了令牌环网标准。IEEE802.11是无线局域网标准，IEEE802.1系列是网桥和生成树协议标准。" },
    { text: "在对等式网络中，计算机的角色是______。", options: ["A. 有专门的服务器", "B. 地位平等，既可是服务器也可是工作站", "C. 只能作为工作站", "D. 只能作为服务器"], answer: "B", 解析: "对等式网络中每台计算机地位平等，无专用服务器，每台计算机既可作为服务器提供资源，也可作为工作站访问资源，角色可互换。" },
    { text: "宽带路由器的WAN口连接ISP（如光猫），LAN口连接内部网络设备，通常LAN口IP地址默认为______或192.168.0.1。", options: ["A. 192.168.1.1", "B. 10.0.0.1", "C. 172.16.0.1", "D. 169.254.0.1"], answer: "A", 解析: "宽带路由器LAN口默认IP地址通常为192.168.1.1或192.168.0.1，作为内网网关和DHCP服务器，为连接的设备自动分配私有IP地址。" },
    { text: "下列设备中，属于DTE的是______。", options: ["A. 调制解调器", "B. 计算机", "C. 光纤收发器", "D. ISDN适配器"], answer: "B", 解析: "DTE（数据终端设备）是数据的源或终点，计算机和打印机属于DTE。调制解调器、交换机、光纤收发器属于DCE（数据电路终接设备）。" },
    { text: "TCP协议首部中用于保证数据可靠传输的关键机制包括______。", options: ["A. 源端口号", "B. 序列号和确认号", "C. 目的IP地址", "D. 数据长度"], answer: "B", 解析: "TCP通过序列号对发送字节编号和确认号确认已接收字节，实现可靠传输：丢失则重传、乱序则重排、重复则丢弃。这是TCP区别于UDP的核心机制。" },
    { text: "将线路用于传输的时间划分成若干个时间片，每个用户得到一个时间片，这种复用技术是______。", options: ["A. 频分多路复用", "B. 时分多路复用", "C. 波分多路复用", "D. 码分多路复用"], answer: "B", 解析: "时分多路复用（TDM）将传输时间划分为固定长度的时隙，每个用户分配到固定时隙轮流使用信道。不同于频分（分频率）、波分（分波长）和码分（分编码）复用。" },
    { text: "开发了OSI参考模型和OSI协议簇的国际标准化组织是______。", options: ["A. IEEE", "B. IANA", "C. ISO", "D. IETF"], answer: "C", 解析: "ISO（国际标准化组织）开发了OSI七层参考模型和OSI协议簇，旨在为不同厂商的网络产品提供统一的互联互通标准框架。" },
    { text: "以下哪个命令用于显示Linux系统的路由表？", options: ["A. ifconfig", "B. route", "C. ping", "D. netstat -a"], answer: "B", 解析: "Linux中route命令用于显示和修改IP路由表。ifconfig显示网络接口配置，ping测试连通性，netstat -a显示所有连接。" },
    { text: "下列哪种有线传输介质的安装成本最高？", options: ["A. 粗同轴电缆", "B. 细同轴电缆", "C. 非屏蔽双绞线", "D. 光纤"], answer: "D", 解析: "光纤制造工艺复杂、铺设接续需要专业设备和人员，是有线传输介质中安装成本最高的。但光纤传输速率最高、抗电磁干扰最强、传输距离最远。" },
    { text: "ISO成立于______年，中国是其常任理事国。", options: ["A. 1946", "B. 1947", "C. 1984", "D. 1963"], answer: "B", 解析: "ISO（国际标准化组织）成立于1947年2月23日，总部设于瑞士日内瓦。中国是其常任理事国之一。IEEE成立于1963年。" },
    { text: "以下哪项不属于网络共享打印系统的组成部分？", options: ["A. 打印队列", "B. 打印服务器", "C. 网络打印机", "D. 扫描仪"], answer: "D", 解析: "网络共享打印系统由打印服务器、打印队列和网络打印机三部分组成。扫描仪是输入设备，不属于打印系统的组成部分。" },
    { text: "无盘工作站网络对服务器的______要求较高。", options: ["A. 存储容量", "B. 并发处理能力", "C. 图形处理能力", "D. 散热性能"], answer: "B", 解析: "无盘工作站的所有操作（系统加载、文件访问、程序运行）都依赖服务器通过网络提供，当多个工作站同时请求时，对服务器的并发处理能力要求最高。" },
    { text: "以下哪种接入方式属于光纤接入？", options: ["A. ADSL", "B. FTTH", "C. Cable Modem", "D. 5G"], answer: "B", 解析: "FTTH（Fiber To The Home，光纤到户）是最理想的光纤接入方式，光纤直接铺设到用户家中。FTTB是光纤到楼，FTTC是光纤到路边。ADSL使用电话线，5G是无线接入。" },
    { text: "以下哪个工具常用于下载Internet资源？", options: ["A. Word", "B. Excel", "C. 迅雷", "D. PowerPoint"], answer: "C", 解析: "迅雷是多线程P2P下载工具，支持HTTP/FTP/BT/eMule等多种协议，可加速Internet资源下载。Word、Excel、PowerPoint是办公软件，不具备下载管理功能。" },
    { text: "传统的电话通信信道无法直接传输计算机的数字信号，因此需要使用______设备。", options: ["A. 中继器", "B. 交换机", "C. 调制解调器", "D. 路由器"], answer: "C", 解析: "传统电话网传输模拟语音信号，计算机输出数字信号，调制解调器（Modem）将数字信号转换为模拟信号后经电话线传输，接收端再解调还原为数字信号。" },
    { text: "下列哪个网络被认为是互联网的前身，并最早采用了分组交换技术？", options: ["A. ARPANET", "B. NSFNET", "C. WWW", "D. Ethernet"], answer: "A", 解析: "ARPANET由美国国防部ARPA于1969年建立，是全球第一个分组交换网络，被认为是Internet的前身。NSFNET后来取代ARPANET成为Internet骨干网。" },
    { text: "目录索引类搜索引擎（如hao123）主要通过______查找信息。", options: ["A. 关键词", "B. 分类目录", "C. 人工智能", "D. 语音输入"], answer: "B", 解析: "目录索引类搜索引擎（如hao123、早期Yahoo目录）通过分类目录组织网站，用户逐级浏览分类来查找信息，而非输入关键词搜索。" },
    { text: "远程登录服务中，Telnet是明文传输，而______提供了加密的安全连接。", options: ["A. SSH", "B. RDP", "C. VNC", "D. FTP"], answer: "A", 解析: "SSH（安全外壳协议）提供加密的安全远程登录连接，默认端口22，所有传输数据均加密。RDP是Windows远程桌面，VNC是跨平台远程控制，FTP是文件传输协议。" },
    { text: "下列哪项是对等式网络的优点？", options: ["A. 具备网络管理功能", "B. 安全性高", "C. 成本低", "D. 适合大型网络"], answer: "C", 解析: "对等式网络无需专用服务器和管理员，各计算机地位平等、资源共享，结构简单、配置方便，因此成本低。缺点是无集中管理、安全性较差、不适合大型网络。" },
    { text: "使用ping命令测试本机TCP/IP协议是否正常工作，应ping的地址是______。", options: ["A. 本机IP地址", "B. 默认网关", "C. 127.0.0.1", "D. 对方主机IP"], answer: "C", 解析: "ping 127.0.0.1（回环地址）测试本机TCP/IP协议栈是否正常工作。若通说明协议栈正常；若不通则TCP/IP安装或配置有问题，与物理网络无关。" },
    { text: "A类IP地址的第一个字节范围是1~126，其中127.0.0.0/8保留用于______测试。", options: ["A. 回环", "B. 广播", "C. 组播", "D. 私有"], answer: "A", 解析: "A类IP地址范围1.0.0.0~126.255.255.255，其中127.0.0.0/8保留用于回环测试（Loopback）。127.0.0.1是最常用的回环地址。" },
    { text: "在Linux系统中，改变文件拥有者的命令是______。", options: ["A. chmod", "B. chown", "C. chgrp", "D. usermod"], answer: "B", 解析: "chown（change owner）用于更改文件或目录的拥有者。chmod修改访问权限，chgrp修改所属组，usermod修改用户账户属性。" },
    { text: "下列哪种传输介质的抗干扰能力最强？", options: ["A. 双绞线", "B. 同轴电缆", "C. 光纤", "D. 无线电磁波"], answer: "C", 解析: "光纤利用光信号传输数据，完全不受电磁干扰和射频干扰，是有线传输介质中抗干扰能力最强的。双绞线通过绞合减少干扰，同轴电缆通过屏蔽层抗干扰。" },
    { text: "局域网中，通信处理一般由______完成。", options: ["A. 路由器", "B. 交换机", "C. 网卡", "D. 服务器"], answer: "C", 解析: "在局域网中，网卡（NIC）负责数据的封装成帧、介质访问控制、差错校验和发送接收，是主机与局域网之间通信处理的核心部件。" },
    { text: "W3C制定的标准包括HTML、CSS和______等。", options: ["A. TCP/IP", "B. XML", "C. FTP", "D. HTTP"], answer: "B", 解析: "W3C（万维网联盟）由Tim Berners-Lee领导，制定核心Web标准包括HTML、CSS和XML等。TCP/IP由IETF标准化，FTP和HTTP是IETF制定的应用层协议。" },
    { text: "使用搜索引擎时，将关键词用双引号括起来可以实现______匹配，提高搜索准确性。", options: ["A. 精确", "B. 模糊", "C. 同义词", "D. 拼音"], answer: "A", 解析: "搜索引擎中用双引号括起关键词可实现精确匹配，返回包含该完整短语的页面。空格表示与运算符（AND），减号排除关键词，加号强制包含。" },
    { text: "GPON技术中，最大分光比可达______。", options: ["A. 1:32", "B. 1:64", "C. 1:128", "D. 1:256"], answer: "C", 解析: "GPON（千兆无源光网络）最大分光比可达1:128，即一根光纤可同时服务128个用户终端，通过无源分光器实现信号分配。EPON最大分光比通常为1:64。" },
    { text: "以下哪个是访问Internet资源的工具？", options: ["A. 浏览器", "B. 编译器和C. 文本编辑器", "D. 数据库管理系统"], answer: "A", 解析: "浏览器（如Chrome、Edge、Firefox）是访问Internet上WWW网页资源的主要工具。编译器和文本编辑器用于本地开发，数据库管理系统用于数据管理。" },
    { text: "配置计算机TCP/IP协议时，如果不需要访问本网络以外的网络，可以不配置______。", options: ["A. IP地址", "B. 子网掩码", "C. 默认网关", "D. DNS服务器"], answer: "C", 解析: "默认网关用于访问本子网以外的网络。若计算机只需与同一局域网内的设备通信，可不配置默认网关。DNS也只是需要域名解析时才必需。" },
    { text: "在无盘工作站网络中，工作站的启动依赖于______。", options: ["A. 本地硬盘中的操作系统", "B. 网卡上的自启动芯片和服务器", "C. U盘启动", "D. 光盘启动"], answer: "B", 解析: "无盘工作站没有本地硬盘，启动时依靠网卡上的Boot ROM自启动芯片，通过网络向服务器请求引导程序下载并加载操作系统。" },
    { text: "虚拟桌面技术的整体架构中，负责将桌面虚拟机在数据中心进行托管并统一管理的层是______。", options: ["A. 终端接入层", "B. 桌面管理层", "C. 资源池层", "D. 接入网络层"], answer: "B", 解析: "虚拟桌面架构（VDI）分四层：终端接入层、接入网络层、桌面管理层和资源池层。桌面管理层负责桌面虚拟机的托管、分配、监控和统一管理，是VDI的核心层。" },
    { text: "以太网帧中，用于差错控制的字段位于______。", options: ["A. 帧头", "B. 数据部分", "C. 帧尾", "D. 前导码"], answer: "C", 解析: "以太网帧的帧尾包含FCS/CRC校验字段，用于接收方检测数据在传输过程中是否出现比特差错。帧头包含目标MAC、源MAC和类型/长度字段。" },
    { text: "IM（即时通信）软件除了文字聊天外，通常还支持语音通话、视频通话和______传输等功能。", options: ["A. 文件", "B. 数据库", "C. 程序", "D. 系统"], answer: "A", 解析: "IM（即时通信）软件除文字聊天外，通常还支持语音通话、视频通话和文件传输功能。微信、QQ、钉钉等都是典型的即时通信软件。" },
    { text: "当需要直接连接两台计算机时，应使用______双绞线。", options: ["A. 直通线", "B. 交叉线", "C. 反线", "D. 屏蔽线"], answer: "B", 解析: "两台计算机直连（同类设备互联）必须使用交叉线，一端按568A标准、另一端按568B标准制作，使发送引脚与接收引脚交叉连接。" },
    { text: "以下哪种拓扑结构可靠性最高，但布线成本也最高？", options: ["A. 总线型", "B. 星型", "C. 环型", "D. 网状"], answer: "D", 解析: "网状拓扑每个节点间都有点对点链路，任意两节点间有多条路径可选，单点或单链路故障不影响通信，可靠性最高。但n个节点需要n(n-1)/2条链路，布线成本极高。" },
    { text: "计算机网络发展第一阶段的主要特征是______。", options: ["A. 分组交换", "B. 以单台计算机为中心的联机终端系统", "C. 标准化网络体系结构", "D. 互联网普及"], answer: "B", 解析: "第一阶段（20世纪50-60年代）以一台大型主机为中心，通过通信线路连接多个远程终端，形成面向终端的联机系统。终端无独立处理能力，所有计算由主机完成。" },
    { text: "制作双绞线RJ-45接头时，剥线长度一般为______。", options: ["A. 1cm", "B. 1.5cm", "C. 2.5cm", "D. 3.5cm"], answer: "B", 解析: "制作RJ-45水晶头时剥线长度一般为1.5cm左右，确保线芯能完全插入水晶头且外层护套进入压接区域，提供机械保护和应力释放。" },
    { text: "工作站/服务器网络常用于______的局域网络。", options: ["A. 小型", "B. 大型、中型", "C. 家庭", "D. 对等"], answer: "B", 解析: "工作站/服务器网络有专门的服务器提供集中资源管理和服务，适合大中型局域网。对等式网络无专用服务器，适合小型、任务简单的网络环境。" },
    { text: "IEEE802.3标准是关于______的标准。", options: ["A. 无线局域网", "B. 令牌环网", "C. 以太网", "D. 城域网"], answer: "C", 解析: "IEEE802.3是以太网标准，定义了CSMA/CD介质访问控制方式。IEEE802.11是无线局域网（WLAN）标准，IEEE802.5是令牌环网标准。" },
    { text: "在Windows系统中，查看详细网络配置（包括MAC地址、IP地址、DNS等）的命令是______。", options: ["A. ipconfig", "B. ipconfig/all", "C. ifconfig", "D. winipcfg"], answer: "B", 解析: "Windows中ipconfig /all显示所有网络接口的详细配置信息，包括物理地址（MAC地址）、IP地址、子网掩码、默认网关、DNS服务器等。ipconfig仅显示简要信息。" },
    { text: "代理服务器的主要功能不包括以下哪项？", options: ["A. 设置用户验证和记账", "B. 增加缓冲器提高访问速度", "C. 充当防火墙", "D. 路由选择"], answer: "D", 解析: "代理服务器的主要功能包括：用户验证与记账、缓存网页加速访问、过滤URL和内容、充当防火墙。路由选择是路由器的核心功能，不属于代理服务器的功能范围。" },
    { text: "IP地址10.0.0.1属于______类私有地址。", options: ["A. A", "B. B", "C. C", "D. D"], answer: "A", 解析: "10.0.0.1属于A类私有地址（10.0.0.0~10.255.255.255）。B类私有地址172.16.0.0~172.31.255.255，C类私有地址192.168.0.0~192.168.255.255。" },
    { text: "动态IP地址通常由______服务器自动分配，适用于普通客户端。", options: ["A. DNS", "B. DHCP", "C. HTTP", "D. FTP"], answer: "B", 解析: "DHCP（动态主机配置协议）服务器自动为客户端分配动态IP地址及相关参数（子网掩码、网关、DNS）。静态IP由管理员手动配置，长期固定分配给特定设备。" },
    { text: "在Windows系统中，设置文件夹共享后，默认的共享权限是______。", options: ["A. 完全控制", "B. 更改", "C. 读取", "D. 写入"], answer: "C", 解析: "Windows系统中设置文件夹共享后，默认共享权限为\"读取\"（允许查看和复制文件）。管理员可修改为\"更改\"或\"完全控制\"（含删除和权限管理权）。" },
    { text: "在OSI参考模型中，负责数据格式变换、数据加密与解密、数据压缩与恢复的层是______。", options: ["A. 会话层", "B. 表示层", "C. 应用层", "D. 传输层"], answer: "B", 解析: "OSI表示层（第6层）负责数据格式变换、加密解密、压缩与恢复。网络层（第3层）负责路由选择，会话层（第5层）管理会话对话。" },
    { text: "IEEE802委员会的主要任务是制定______标准。", options: ["A. 互联网域名", "B. 局域网和城域网", "C. 网络安全", "D. 万维网"], answer: "B", 解析: "IEEE802委员会成立于1980年2月，主要任务是制定局域网（LAN）和城域网（MAN）的技术标准，如802.3以太网、802.11无线局域网等。" },
    { text: "10Base-T标准使用的传输介质是______，最大传输距离为100米。", options: ["A. 粗同轴电缆", "B. 细同轴电缆", "C. 非屏蔽双绞线", "D. 光纤"], answer: "C", 解析: "10Base-T中10代表10Mbps速率，Base代表基带传输，T代表双绞线（Twisted Pair）。使用非屏蔽双绞线（UTP Cat3及以上），最大传输距离100米。" },
    { text: "使用迅雷等P2P下载工具时，下载同一文件的人越多，下载速度通常越______，因为用户之间也在互相上传数据。", options: ["A. 快", "B. 慢", "C. 不变", "D. 不确定"], answer: "A", 解析: "P2P下载的核心特点是下载者越多速度越快——每个下载者同时也在上传已下载的数据给其他用户，形成分布式的众筹加速效应。" },
    { text: "在总线型拓扑结构中，如果总线两端不安装终端电阻，会导致______。", options: ["A. 信号反射，网络通信异常", "B. 网络速度变慢", "C. 网络完全无法通信", "D. 增加可连接设备数"], answer: "A", 解析: "总线型拓扑结构中最常用的传输介质是同轴电缆，所有节点通过T型连接器并联到同一总线上，总线两端需安装终端电阻防止信号反射。" },
    { text: "通信系统中，将消息转化为原始电信号的设备是______，接收端恢复信息的设备是______。", options: ["A. 信源、信宿", "B. 发送设备、接收设备", "C. 信道、信源", "D. 信宿、信源"], answer: "A", 解析: "信源将各类消息转化为原始电信号（如话筒将声音转为电信号），信宿是信息的目的地，将接收方恢复的电信号还原为可理解的信息形式（如扬声器还原为声音）。" },
    { text: "路由器的最基本功能是______。", options: ["A. 信号放大", "B. 数据包转发", "C. 协议转换", "D. 地址学习"], answer: "B", 解析: "路由器的最核心功能是根据路由表进行数据包转发。信号放大是中继器功能，协议转换是网关功能，MAC地址学习是交换机功能。" },
    { text: "以下哪个不是Internet提供的常见服务？", options: ["A. WWW", "B. 电子邮件", "C. 文件传输", "D. 数据库管理"], answer: "D", 解析: "Internet提供的基础服务包括WWW（网页浏览）、电子邮件、文件传输（FTP）、远程登录（Telnet/SSH）等。数据库管理属于企业内网应用，不是Internet直接提供的公共服务。" },
    { text: "网盘（云存储）的核心功能包括数据存储、备份、共享和______。", options: ["A. 协同编辑", "B. 杀毒", "C. 加密", "D. 压缩"], answer: "A", 解析: "网盘（云存储）的核心功能包括数据存储、备份、共享和协同编辑。协同编辑允许多用户通过云端实时共同编辑同一文档，是云存储区别于传统存储的关键增值功能。" },
    { text: "局域网中，工作站与服务器的区别在于______。", options: ["A. 工作站没有CPU", "B. 服务器没有CPU", "C. 工作站可以独立工作，服务器提供共享资源", "D. 两者功能完全相同"], answer: "C", 解析: "工作站是可以独立工作的完整计算机，有自己的操作系统和本地处理能力；服务器主要为网络中的其他设备提供共享资源和服务。" },
    { text: "在打印服务器上，可以取消所有打印作业的操作是______。", options: ["A. 选择\"打印机\"→\"暂停打印\"", "B. 选择\"打印机\"→\"取消所有文档\"", "C. 右击每个文档选择\"取消\"", "D. 关闭打印机电源"], answer: "B", 解析: "在打印服务器管理界面中，选择\"打印机\"→\"取消所有文档\"可以一键取消打印队列中所有等待和正在打印的作业，比逐个取消更高效。" },
    { text: "局域网的地理范围通常在______。", options: ["A. 几米至10km", "B. 10~100km", "C. 100km以上", "D. 全球范围"], answer: "A", 解析: "局域网（LAN）地理覆盖范围通常在几米至10公里之间，一般为一个办公室、一栋楼或一个园区。10~100km为城域网（MAN），100km以上为广域网（WAN）。" },
    { text: "HTTPS协议默认使用的端口号是______。", options: ["A. 80", "B. 443", "C. 8080", "D. 8443"], answer: "B", 解析: "HTTPS（HTTP Secure）默认端口443，通过TLS/SSL对HTTP通信进行加密传输。HTTP默认端口80为明文传输，8080是常用的HTTP备用端口。" },
    { text: "电子邮件系统中，发送邮件的协议是SMTP，接收邮件的协议可以是POP3或______。", options: ["A. IMAP", "B. HTTP", "C. FTP", "D. Telnet"], answer: "A", 解析: "电子邮件系统中SMTP用于发送邮件。接收邮件可使用POP3（端口110，下载到本地）或IMAP（端口143，邮件保留在服务器，支持多设备同步）。" },
    { text: "微博属于Internet的哪一类服务？", options: ["A. 文件传输", "B. 即时通信", "C. 社交平台/信息共享", "D. 远程登录"], answer: "C", 解析: "微博是一种社交媒体平台（Micro-blog），以短内容为核心，用户可发布文字、图片和视频，通过关注、转发、评论和点赞进行信息共享和社交互动。" },
    { text: "世界上最大的广域网是______。", options: ["A. 互联网（Internet）", "B. 城域网", "C. ARPANET", "D. NSFNET"], answer: "A", 解析: "Internet（互联网）是全球最大的广域网，采用TCP/IP协议簇将世界各地的计算机网络互联互通。ARPANET是其前身，NSFNET是其发展中的重要骨干网络。" },
    { text: "私有IP地址也称为______。", options: ["A. 外网地址", "B. 公网地址", "C. 内网地址或局域网专用地址", "D. 全球唯一地址"], answer: "C", 解析: "私有IP地址也称为内网地址或局域网专用地址，仅在局域网内部使用，不可在Internet上直接路由。包括10.0.0.0/8、172.16.0.0/12和192.168.0.0/16三个范围。" },
    { text: "模拟信号与数字信号的主要区别在于______。", options: ["A. 模拟信号连续，数字信号离散", "B. 模拟信号离散，数字信号连续", "C. 两者都连续", "D. 两者都离散"], answer: "A", 解析: "模拟信号是连续变化的电磁波，在时间和幅度上连续取值；数字信号则是离散的电脉冲序列，在时间上离散、幅度上只有有限个取值（如0和1）。" },
    { text: "在Linux系统中，使用chmod命令修改文件权限，数字764对应的权限是______。", options: ["A. rwxrw-r--", "B. rw-rwxr--", "C. rwxrw-rw-", "D. rwxr-xr--"], answer: "A", 解析: "权限764：7=4+2+1=rwx（所有者），6=4+2=rw-（组用户），4=r--（其他用户），对应字母表示为rwxrw-r--。" },
    { text: "P2P文件共享技术的特点是______。", options: ["A. 下载速度随下载人数增加而变慢", "B. 下载人数越多，上传人数也越多，速度越快", "C. 必须通过中心服务器", "D. 只能下载不能上传"], answer: "B", 解析: "P2P下载的核心特点是下载者越多速度越快——每个下载者同时也在上传已下载的数据给其他用户，形成分布式的众筹加速效应。" },
    { text: "在EIA/TIA568A标准中，线序第1脚是白绿，第2脚是绿，第3脚是白橙，第4脚是蓝，第5脚是白蓝，第6脚是橙，第7脚是白棕，第8脚是棕。568B与568A的区别是______和______两组线对调。", options: ["A. 1-2与3-6", "B. 1-3与2-6", "C. 1-6与2-3", "D. 1-4与2-5"], answer: "A", 解析: "568A与568B的区别在于1-2对（白绿/绿）与3-6对（白橙/橙）互换，其余线对位置不变。交叉线即利用这一区别，实现发送端与接收端的交叉连接。" },
    { text: "局域网的典型传输速率范围为______。", options: ["A. 10Mbit/s~100Mbit/s", "B. 100Mbit/s~10Gbit/s", "C. 1Mbit/s~10Mbit/s", "D. 10Gbit/s~100Gbit/s"], answer: "B", 解析: "现代局域网典型传输速率范围为100Mbit/s~10Gbit/s。早期10M以太网已淘汰，当前主流为千兆（1Gbps）和万兆（10Gbps）以太网。" },
    { text: "在局域网中实现网络共享打印的第一步是______。", options: ["A. 安装网络打印机驱动程序", "B. 在服务器上安装本地打印机并共享", "C. 购买打印机", "D. 配置IP地址"], answer: "B", 解析: "实现网络共享打印的第一步是在服务器上安装本地打印机驱动程序并设置为共享状态，之后网络中的其他客户端才能发现并连接该共享打印机。" },
    { text: "HTTP协议的默认端口号是______。", options: ["A. 21", "B. 80", "C. 443", "D. 25"], answer: "B", 解析: "HTTP（超文本传输协议）默认使用TCP端口80，以明文方式传输网页内容。HTTPS（HTTP Secure）使用端口443进行加密传输。" },
    { text: "共享文件夹的权限中，\"更改\"权限不包括______。", options: ["A. 创建新文件夹", "B. 修改文件内容", "C. 删除文件和文件夹", "D. 获得文件的所有权"], answer: "D", 解析: "共享文件夹的\"更改\"权限包括创建、修改和删除操作，但不包括\"获得文件所有权\"和\"更改权限\"——这两个属于\"完全控制\"权限。" },
    { text: "计算机网络最常见的分类方式是按______进行分类。", options: ["A. 传输介质", "B. 拓扑结构", "C. 分布距离", "D. 通信协议"], answer: "C", 解析: "计算机网络最常见的分类方式是按分布距离，分为局域网（LAN，几米至10km）、城域网（MAN，10~100km）和广域网（WAN，100km以上）。" },
    { text: "通信系统中，信源的作用是______。", options: ["A. 对信号进行调制", "B. 把各类消息转化为原始电信号", "C. 对信号进行解调", "D. 传输信号"], answer: "B", 解析: "信源是通信系统中产生消息的源头，其作用是将各类消息（如声音、图像、文字）转化为原始电信号，供后续的发送设备进行处理。" },
    { text: "关于局域网的说法，正确的是______。", options: ["A. 局域网必须使用双绞线", "B. 局域网只能采用星型拓扑", "C. 局域网误码率较低", "D. 局域网必须连接互联网"], answer: "C", 解析: "局域网覆盖范围小、传输质量高，误码率较低是局域网的典型特征之一。局域网并非必须使用双绞线（也可用光纤/无线），也不是只能采用星型拓扑，也不要求必须接入互联网。" },
    { text: "在计算机网络发展第一阶段（面向终端的计算机通信网络）中，终端不具备的能力是______。", options: ["A. 输入数据", "B. 显示信息", "C. 独立运行程序", "D. 与主机通信"], answer: "C", 解析: "第一代网络中的终端仅作为输入输出设备，无CPU和内存等独立处理能力，所有数据处理和程序运行均由中心主机完成，终端不能独立运行程序。" },
    { text: "在百度搜索引擎中，要精确搜索特定短语，应使用______。", options: ["A. 空格", "B. 双引号", "C. 加号", "D. 减号"], answer: "B", 解析: "搜索引擎中将关键词用双引号括起来可实现精确匹配，只返回包含该完整短语的页面。空格表示与运算（多个词都需出现），减号用于排除特定关键词。" },
    { text: "IPv6相对于IPv4的主要优势是______。", options: ["A. 更高的安全性", "B. 更大的地址空间", "C. 更快的传输速度", "D. 更低的成本"], answer: "B", 解析: "IPv6地址长度为128位（IPv4仅32位），可提供约3.4×10^38个地址，是IPv6相对于IPv4最核心的优势——彻底解决IPv4地址耗尽的根本问题。" },
    { text: "在通信系统中，信源编码的主要作用是______。", options: ["A. 增加冗余位", "B. 去除数据冗余提升效率", "C. 进行调制", "D. 进行解调"], answer: "B", 解析: "信源编码的主要作用是通过压缩技术去除数据中的冗余信息，提高传输效率，降低带宽需求。信道编码则相反，是通过添加冗余位来增强抗干扰能力。" },
    { text: "以下哪个是宽带路由器默认开启的服务，方便客户端自动获取IP地址？", options: ["A. DNS", "B. DHCP", "C. NAT", "D. HTTP"], answer: "B", 解析: "宽带路由器默认开启DHCP（动态主机配置协议）服务，自动为内网连接的设备分配IP地址、子网掩码、默认网关和DNS等网络参数，无需用户手动配置。" },
    { text: "以下哪种网络打印机模式的打印速度最快？", options: ["A. 专用PC机作打印服务器+高性能激光打印机", "B. 外置打印服务器+标准并口打印机", "C. 内置打印服务器+网络激光打印机", "D. 终端共享打印模式"], answer: "C", 解析: "内置打印服务器（打印机自带网卡直接接入网络）速度最快，因为打印数据直接通过网络传输到打印机，无需经过中间PC或外置盒转换，链路最短、延迟最低。" },
    { text: "在Linux系统中，修改网络接口配置文件后，不重启系统使配置生效的命令是______。", options: ["A. systemctl restart network", "B. ifdown && ifup", "C. reboot", "D. service network stop"], answer: "A", 解析: "修改网络配置文件后，可使用systemctl restart network（或service network restart）重启网络服务使配置立即生效，无需重启整个系统。" },
    { text: "DTE的中文全称是______。", options: ["A. 数据终端设备", "B. 数据电路终接设备", "C. 数据通信设备", "D. 数字终端设备"], answer: "A", 解析: "DTE（Data Terminal Equipment）的中文全称是数据终端设备，是数据的源或目的地，如计算机、打印机。" },
    { text: "Linux系统中，普通用户的命令提示符是______，管理员root的提示符是______。", options: ["A. $、#", "B. #、$", "C. %、#", "D. $、%"], answer: "A", 解析: "Linux系统中，普通用户登录后命令提示符默认为$（美元符号），管理员root登录后提示符默认为#（井号），直观区分当前用户权限级别。" },
    { text: "在vi编辑器中，按______键可以进入插入模式（在光标当前位置插入），按______键可以进入插入模式（在光标下一行插入）。", options: ["A. i、o", "B. a、i", "C. o、a", "D. i、a"], answer: "A", 解析: "vi编辑器中按i键在当前光标位置进入插入模式，按o键在当前行下方新增一行并进入插入模式。按a在光标后插入，按O在上一行插入。" },
    { text: "IPv4地址的长度为______位。", options: ["A. 16", "B. 32", "C. 64", "D. 128"], answer: "B", 解析: "IPv4地址长度为32位（4字节），通常用点分十进制表示（如192.168.1.1）。IPv6地址为128位，是IPv4的4倍。" },
    { text: "信道编码的主要作用是______。", options: ["A. 去除数据冗余", "B. 增强信号抗干扰能力", "C. 提高传输速率", "D. 压缩数据"], answer: "B", 解析: "信道编码通过添加冗余位（如奇偶校验位、CRC校验码）来增强信号的抗干扰能力，使接收端能够检测甚至纠正传输中出现的差错。" },
    { text: "在浏览器地址栏输入www.baidu.com，其中\"http\"表示______协议，\"www.baidu.com\"是域名。", options: ["A. 超文本传输", "B. 文件传输", "C. 邮件传输", "D. 远程登录"], answer: "A", 解析: "HTTP（HyperText Transfer Protocol）即超文本传输协议，默认端口80，用于在Web浏览器和Web服务器之间传输网页内容。" },
    { text: "网络维护中，用于记录故障处理过程和经验的文档称为______。", options: ["A. 网络拓扑图", "B. 维护记录", "C. 设备清单", "D. 用户手册"], answer: "B", 解析: "维护记录（Bug Report/维护日志）用于详细记录每次故障的现象、原因分析和处理过程，是网络运维中重要的经验积累文档。" },
    { text: "执行命令shutdown -h now的作用是______；shutdown -r now的作用是重启。", options: ["A. 立即关机", "B. 立即重启", "C. 取消关机", "D. 延迟关机"], answer: "A", 解析: "shutdown -h now中的-h（halt）表示关机后停止所有CPU活动，now表示立即执行。shutdown -r now表示立即重启。" },
    { text: "执行命令shutdown -t 30 -h的作用是______。", options: ["A. 立即关机", "B. 30分钟后重启", "C. 30秒后关机", "D. 30分钟后关机并关闭电源"], answer: "C", 解析: "shutdown -t 30 -h中-t 30设置关机前的延迟时间为30秒，-h表示关机。注意部分版本的-t参数含义可能不同。" },
    { text: "现代计算机网络的基本目的是______。", options: ["A. 数据通信和资源共享", "B. 提高计算机运算速度", "C. 实现人工智能", "D. 替代传统通信方式"], answer: "A", 解析: "计算机网络的两大基本目的是数据通信（信息传输）和资源共享（硬件、软件和数据资源共享），这是所有网络设计和应用的基础。" },
    { text: "在局域网中，传输距离超过100米时，应优先考虑使用哪种传输介质？", options: ["A. 非屏蔽双绞线", "B. 屏蔽双绞线", "C. 同轴电缆", "D. 光纤"], answer: "D", 解析: "双绞线最大传输距离通常为100米。超过100米时，光纤是首选——传输距离可达数公里甚至数十公里，且抗干扰能力强。" },
    { text: "广域网骨干网络的传输速率通常在______以上。", options: ["A. 100Mbit/s", "B. 1Gbit/s", "C. 10Gbit/s", "D. 100Gbit/s"], answer: "C", 解析: "现代广域网骨干网络通常采用光纤传输，传输速率在10Gbit/s以上，核心节点间甚至达到100Gbit/s或更高。" },
    { text: "以下哪个命令用于追踪数据包经过的网络路径？", options: ["A. ping", "B. netstat", "C. traceroute", "D. nslookup"], answer: "C", 解析: "traceroute（Windows为tracert）通过发送递增TTL值的IP包，利用中间路由器返回的ICMP超时报文，逐跳显示数据包经过的路径。" },
    { text: "长期固定分配给一台计算机使用的IP地址称为______。", options: ["A. 动态IP", "B. 静态IP", "C. 私有IP", "D. 公有IP"], answer: "B", 解析: "静态IP（固定IP）是由管理员手动配置、长期固定分配给特定计算机的IP地址，不随重启或时间变化，适用于服务器等需固定地址的设备。" },
    { text: "使用journalctl -xe命令的作用是______。", options: ["A. 查看系统服务日志", "B. 查看内核日志", "C. 查看磁盘信息", "D. 查看网络连接"], answer: "A", 解析: "journalctl -xe用于查看systemd系统服务日志，-x提供详细上下文，-e跳转到日志末尾，常用于排查服务启动失败等系统问题。" },
    { text: "当系统启动时停留在\"Kernel panic\"界面，通常需要进入______模式进行修复。", options: ["A. 救援", "B. 单用户", "C. 安全", "D. 调试"], answer: "B", 解析: "Kernel panic是内核级致命错误。进入单用户模式（Single User Mode）可绕过正常启动流程，以最小环境加载系统，便于排查和修复内核问题。" },
    { text: "在vi的一般模式下，按______可以撤销上一次操作。", options: ["A. u", "B. .", "C. r", "D. /"], answer: "A", 解析: "vi一般模式下按u键可撤销上一次编辑操作（undo），连续多次按u可逐次撤销更早的修改，是常用的回退操作。" },
    { text: "屏蔽双绞线（STP）相比于非屏蔽双绞线（UTP）的主要优点是______。", options: ["A. 价格便宜", "B. 安装简单", "C. 抗干扰能力强", "D. 传输距离远"], answer: "C", 解析: "屏蔽双绞线（STP）在外层增加了金属屏蔽层，能有效抵御外部电磁干扰和减少信号辐射。非屏蔽双绞线（UTP）仅靠绞合减少干扰，抗干扰能力弱于STP。" },
    { text: "使用宽带路由器共享上网时，如果网络服务商提供的是静态IP地址，WAN口应选择______。", options: ["A. 动态IP用户", "B. PPPoE用户", "C. 静态IP用户", "D. 桥接模式"], answer: "C", 解析: "当ISP提供的是静态IP地址时，宽带路由器WAN口应选择\"静态IP用户\"模式，手动输入ISP分配的固定IP、子网掩码、网关和DNS。" },
    { text: "在Linux系统中，查看磁盘使用情况的命令是______。", options: ["A. df -h", "B. du -sh", "C. fdisk -l", "D. mount"], answer: "A", 解析: "df -h命令以人类可读格式（KB/MB/GB）显示各文件系统磁盘使用情况。-h参数使输出更直观，du -sh用于查看目录大小。" },
    { text: "无线局域网中常用的拓扑结构是______。", options: ["A. 总线型", "B. 星型", "C. 环型", "D. 蜂窝状"], answer: "D", 解析: "无线局域网（WLAN）采用蜂窝状拓扑，以无线接入点（AP）为中心覆盖一个六边形蜂窝区域，通过频率复用避免相邻蜂窝干扰，多个蜂窝组成大范围覆盖。" },
    { text: "以下哪种双绞线类型支持最高传输速率1000Mbps？", options: ["A. 3类", "B. 4类", "C. 5类", "D. 超5类"], answer: "D", 解析: "超5类（Cat5e）双绞线在100米内支持1000Mbps（千兆）传输，是Cat5的增强版。Cat5仅支持100Mbps，Cat6支持1000Mbps且性能更优。" },
    { text: "在基本确定故障在某一具体设备上时，使用已知正常的设备替换可疑部分来验证故障点的方法称为______。", options: ["A. 分析观察法", "B. 故障隔离法", "C. 测试法", "D. 替换法"], answer: "D", 解析: "替换法是在基本确定故障可能出在某一具体设备时，用已知正常的同型号设备替换可疑设备，通过对比验证来定位故障点的方法。" },
    { text: "当故障区域有限时，将出现故障的工作站和设备进行隔离，逐一排查，逐步缩小问题区域，这种方法称为______。", options: ["A. 分析观察法", "B. 故障隔离法", "C. 测试法", "D. 替换法"], answer: "B", 解析: "故障隔离法是将出现故障的工作站和设备逐一隔离排查，逐步缩小问题范围，最终精确定位故障源的方法。与替换法不同，它侧重于逻辑隔离而非物理替换。" },
    { text: "100Base-FX标准使用的传输介质是______。", options: ["A. 粗同轴电缆", "B. 细同轴电缆", "C. 双绞线", "D. 光纤"], answer: "D", 解析: "100Base-FX中F代表Fiber（光纤），使用多模或单模光纤作为传输介质，100表示100Mbps速率。使用双绞线的标准为100Base-TX。" },
    { text: "光纤接入技术中，FTTH的全称是______，是目前家庭宽带的主流接入方式。", options: ["A. Fiber To The Home", "B. Fiber To The Building", "C. Fiber To The Curb", "D. Fiber To The Office"], answer: "A", 解析: "FTTH（Fiber To The Home，光纤到户）将光纤直接铺设到用户家中，提供最高带宽和最佳传输质量。FTTB为光纤到楼，FTTC为光纤到路边。" },
    { text: "一个C类网络默认的子网掩码下，可用的主机地址数量是______。", options: ["A. 254", "B. 255", "C. 256", "D. 65534"], answer: "A", 解析: "C类网络默认子网掩码为255.255.255.0，主机位8位，可用主机数为2^8-2=254个（减去网络地址和广播地址各一个）。" },
    { text: "在vi的一般模式下，输入ZZ的作用是______，输入ZQ的作用是不保存退出。", options: ["A. 保存并退出", "B. 强制保存", "C. 另存为", "D. 撤销"], answer: "A", 解析: "vi一般模式下输入ZZ（大写）表示保存当前文件并退出。ZQ表示不保存退出。:wq是末行模式下的保存退出命令。" },
    { text: "Wi-Fi技术对应的IEEE标准是______。", options: ["A. 802.3", "B. 802.5", "C. 802.11", "D. 802.1X"], answer: "C", 解析: "Wi-Fi技术对应IEEE 802.11系列标准，包括802.11a/b/g/n/ac/ax等，定义了无线局域网的物理层和MAC层规范。" },
    { text: "IPv6地址采用______进制表示。", options: ["A. 二", "B. 八", "C. 十", "D. 十六"], answer: "D", 解析: "IPv6地址为128位，采用冒号分隔的十六进制表示法，如2001:db8::1，共8组每组4位十六进制数。" },
    { text: "vi编辑器的三种工作模式是______。", options: ["A. 编辑、插入、命令", "B. 一般、插入、命令", "C. 普通、插入、末行", "D. 一般、编辑、末行"], answer: "C", 解析: "vi编辑器有三种工作模式：一般模式（普通模式）用于光标移动和操作命令，插入模式用于输入文本，末行模式用于保存/退出等文件级操作。" },
    { text: "TCP/IP协议栈中，网络接口层对应OSI模型的______。", options: ["A. 物理层和数据链路层", "B. 网络层", "C. 传输层", "D. 应用层"], answer: "A", 解析: "TCP/IP网络接口层对应OSI模型的物理层和数据链路层，负责物理传输、数据帧封装、MAC寻址和差错检测。" },
    { text: "当计算机能通过IP地址访问互联网，但无法通过域名访问网站时，最可能是______配置错误。", options: ["A. DNS", "B. 网关", "C. 子网掩码", "D. IP地址"], answer: "A", 解析: "能通过IP访问但无法通过域名访问说明网络连接正常，但域名解析失败——最大可能是DNS服务器配置错误或DNS服务器不可达。" },
    { text: "OSI参考模型共有______个层次。", options: ["A. 4", "B. 5", "C. 7", "D. 8"], answer: "C", 解析: "OSI参考模型将网络通信分为七层：物理层、数据链路层、网络层、传输层、会话层、表示层和应用层。" },
    { text: "在OSI七层模型中，负责路由选择的层是______层，负责数据格式转换的层是______层。", options: ["A. 网络、表示", "B. 传输、会话", "C. 数据链路、应用", "D. 物理、网络"], answer: "A", 解析: "OSI参考模型中网络层（第3层）负责路由选择和数据包转发；表示层（第6层）负责数据格式转换、加密解密和压缩。" },
    { text: "在环型拓扑结构中，数据______。", options: ["A. 沿固定方向单向传输", "B. 双向同时传输", "C. 广播式传输", "D. 由中心节点转发"], answer: "A", 解析: "环型拓扑中各节点首尾相连形成闭合环路，数据沿固定方向单向传输，每个节点依次接收前一个节点发来的数据并转发给下一节点。" },
    { text: "在环型拓扑结构中，数据沿______方向传输，如果某个节点故障可能导致全网瘫痪。", options: ["A. 单向", "B. 双向", "C. 广播", "D. 多播"], answer: "A", 解析: "环型拓扑单点故障可致全网瘫痪。改进为双环结构后，数据可沿两个方向传输，当某节点或链路故障时可自动切换到备用环，显著提高可靠性。" },
    { text: "网卡的MAC地址是______位二进制数，通常用12位十六进制数表示，前6位是厂商识别码。", options: ["A. 48", "B. 32", "C. 64", "D. 128"], answer: "A", 解析: "网卡的MAC地址是48位二进制数（6字节），通常用12位十六进制数表示（如00:1A:2B:3C:4D:5E），前24位是厂商识别码（OUI）。" },
    { text: "在Linux命令行界面中，普通用户登录后的提示符是______。", options: ["A. #", "B. $", "C. %", "D. >"], answer: "B", 解析: "Linux命令行界面中，普通用户登录后的命令提示符默认为$（美元符号），以区别于root的#提示符。" },
    { text: "Linux系统中默认的管理员账号是______。", options: ["A. admin", "B. root", "C. supervisor", "D. administrator"], answer: "B", 解析: "Linux系统中默认的超级管理员账号为root，拥有系统的最高权限，可以执行所有管理操作。普通用户通过su或sudo临时获取管理员权限。" },
    { text: "在Windows系统中，tracert命令对应Linux中的______命令，用于追踪路由路径。", options: ["A. traceroute", "B. route", "C. netstat", "D. pathping"], answer: "A", 解析: "tracert（Windows）/traceroute（Linux）通过逐跳探测追踪数据包从源到目的的完整路径。" },
    { text: "在Windows系统中，traceroute命令对应的命令是______。", options: ["A. tracert", "B. route", "C. tracepath", "D. pathping"], answer: "A", 解析: "Windows系统中与Linux traceroute对应的命令是tracert，通过发送递增TTL值的ICMP包来追踪路由路径。" },
    { text: "以下哪种拓扑结构具有中心节点，且中心节点故障会导致全网瘫痪？", options: ["A. 总线型", "B. 星型", "C. 环型", "D. 网状"], answer: "B", 解析: "星型拓扑所有节点通过独立链路连接到中心节点。一旦中心节点（交换机/集线器）故障，所有节点间通信中断，这就是星型拓扑的致命弱点。" },
    { text: "POP3协议用于______邮件，默认端口号为110。", options: ["A. 发送", "B. 接收", "C. 转发", "D. 加密"], answer: "B", 解析: "POP3（邮局协议第3版）默认端口110，用于从邮件服务器下载邮件到本地客户端。IMAP（端口143）则保留邮件在服务器端。" },
    { text: "SELinux有enforcing、permissive和disabled三种模式，其中enforcing模式会______违反策略的操作，permissive模式仅记录不阻止。", options: ["A. 阻止", "B. 允许", "C. 忽略", "D. 询问"], answer: "A", 解析: "SELinux的enforcing（强制执行）模式会阻止所有违反安全策略的操作并记录日志，是最安全的模式。permissive模式仅记录不阻止。" },
    { text: "局域网最典型的特征是______。", options: ["A. 传输速率高", "B. 覆盖范围大", "C. 使用无线传输", "D. 需要专用服务器"], answer: "A", 解析: "局域网最典型特征包括：传输速率高（100Mbit/s~10Gbit/s）、覆盖范围小（几米至10km）、误码率低、为一个单位内部使用。" },
    { text: "在vi的一般模式下，按哪个键可以删除光标所在的整行？", options: ["A. x", "B. dd", "C. yy", "D. p"], answer: "B", 解析: "vi一般模式下按dd键可删除光标所在的整行，2dd删除2行，ndd删除n行。删除的内容会存入缓冲区，可用p键粘贴。" },
    { text: "以下哪个设备不具备数据过滤和智能管理功能？", options: ["A. 网桥", "B. 交换机", "C. 中继器", "D. 路由器"], answer: "C", 解析: "中继器（Repeater）工作在物理层，仅对信号进行放大和再生，无法识别数据帧结构或MAC地址，不具备任何数据过滤和智能管理功能。" },
    { text: "交叉线制作时，一端采用568A标准，另一端应采用______标准。", options: ["A. 568A", "B. 568B", "C. 任意", "D. 两端相同"], answer: "B", 解析: "交叉线制作时，一端按568A、另一端按568B标准压接，使1-2和3-6两对线交叉连接，用于计算机-计算机等同类设备直连。" },
    { text: "在Windows系统中，共享文件夹的权限具有______特性，即多个权限取并集，但拒绝权限优先于允许。", options: ["A. 累积", "B. 互斥", "C. 覆盖", "D. 传递"], answer: "A", 解析: "Windows共享权限具有累积特性：用户的最终权限是其所属所有组的权限并集。但\"拒绝\"权限优先于\"允许\"权限，是唯一例外。" },
    { text: "局域网中，工作站的正确描述是______。", options: ["A. 没有CPU和内存", "B. 可以独立工作，有自己的操作系统", "C. 只能作为服务器", "D. 必须通过服务器才能运行程序"], answer: "B", 解析: "工作站是可以独立工作的完整计算机，有自己的操作系统和本地处理能力；服务器主要为网络中的其他设备提供共享资源和服务。" },
    { text: "云存储的核心功能不包括______。", options: ["A. 数据存储", "B. 数据备份", "C. 数据加密", "D. 文件共享"], answer: "C", 解析: "云存储（网盘）的核心功能包括数据存储、备份、共享和协同编辑。数据加密通常由用户自行管理或作为附加安全功能，不属于核心基础功能。" },
    { text: "下列哪项不是计算机网络必须具备的要素？", options: ["A. 至少两台计算机互联", "B. 通信设备与传输介质", "C. 网络软件、通信协议和网络操作系统", "D. 一台高性能服务器"], answer: "D", 解析: "计算机网络三大要素：至少两台计算机互联、通信设备与传输介质、网络软件和通信协议。高性能服务器不是必备要素——对等式网络无需服务器。" },
    { text: "在Internet上实现共享打印，需要在服务器上安装并配置______服务，并允许客户端通过HTTP访问打印机。", options: ["A. IIS", "B. Apache", "C. Nginx", "D. Tomcat"], answer: "A", 解析: "在Internet上实现共享打印，需在Windows服务器上安装IIS并启用Internet打印功能，通过IPP协议和HTTP传输打印任务。" },
    { text: "以下哪个属于元搜索引擎？", options: ["A. 百度", "B. 谷歌", "C. Dogpile", "D. 搜狗"], answer: "C", 解析: "Dogpile和MetaCrawler是典型的元搜索引擎，它们将用户查询转发给多个独立搜索引擎（Google、Yahoo等），汇总、去重后返回结果。" },
    { text: "AI搜索相比传统搜索的优势是______。", options: ["A. 更精准地解析用户查询意图", "B. 搜索结果数量更多", "C. 搜索速度更快", "D. 不需要联网"], answer: "A", 解析: "AI搜索相比传统关键词搜索的核心优势在于能更精准地理解用户自然语言查询意图，直接生成答案摘要而非仅返回链接列表。" },
    { text: "当服务器出现\"No space left on device\"错误时，应首先使用______命令定位大文件或目录。", options: ["A. df", "B. du", "C. fdisk", "D. ls"], answer: "B", 解析: "当磁盘空间不足（No space left on device）时，du -sh /*可逐层查看各目录大小，快速定位占用空间最大的文件或目录。" },
    { text: "以下哪个设备通常用于连接两个同类型的局域网并隔离广播？", options: ["A. 集线器", "B. 中继器", "C. 网桥", "D. 网关"], answer: "C", 解析: "网桥（Bridge）工作在数据链路层，可以连接两个同类型局域网，通过学习MAC地址表有选择地转发帧，能隔离冲突域但不能隔离广播域。" },
    { text: "在Linux系统中，实现打印服务通常使用______服务。", options: ["A. httpd", "B. vsftpd", "C. cups", "D. sshd"], answer: "C", 解析: "CUPS（Common UNIX Printing System）是Linux/UNIX系统中最常用的打印服务系统，支持IPP协议，可管理本地和网络打印机。" },
    { text: "下列哪项不是网络维护的常用手段？", options: ["A. 分析观察法", "B. 故障隔离法", "C. 数据加密法", "D. 替换法"], answer: "C", 解析: "网络维护常用手段包括：分析观察法、故障隔离法、测试法和替换法。数据加密法属于网络安全领域的技术手段，不属于网络维护的常用方法。" },
    { text: "在电路交换中，数据传送开始前必须首先建立一条______。", options: ["A. 逻辑连接", "B. 虚电路", "C. 端到端的物理连接", "D. 数据报连接"], answer: "C", 解析: "电路交换在通信前建立专用物理通路，通信期间独占线路资源，通信结束后释放线路。电话系统是典型的电路交换应用。" },
    { text: "环境变量PATH用于指定系统查找可执行文件的路径，使用命令______可以查看当前PATH的值。", options: ["A. echo $PATH", "B. print PATH", "C. show PATH", "D. ls PATH"], answer: "A", 解析: "Linux中echo $PATH命令显示当前环境变量PATH的值，PATH定义了Shell在哪些目录中搜索可执行文件。" },
    { text: "Linux系统中，使用命令______可以查看系统当前的时间和日期，使用命令______可以设置时区。", options: ["A. date、timedatectl", "B. time、date", "C. clock、timezone", "D. cal、hwclock"], answer: "A", 解析: "date命令查看和设置系统日期时间；timedatectl是现代Linux发行版中管理时区、时间和NTP同步的综合命令。" },
    { text: "以下哪个命令可以显示当前系统的网络连接状态、路由表和接口统计信息？", options: ["A. ping", "B. ifconfig", "C. netstat", "D. traceroute"], answer: "C", 解析: "netstat命令用于显示网络连接状态、路由表、接口统计信息等多维度网络数据，是网络排错的核心命令之一。" },
    { text: "以下哪个命令用于显示网络接口的配置信息？", options: ["A. ping", "B. ifconfig", "C. netstat", "D. traceroute"], answer: "B", 解析: "ifconfig命令用于查看和配置网络接口参数，包括IP地址、子网掩码、MAC地址、MTU等。较新Linux发行版推荐使用ip命令替代。" },
    { text: "在Linux系统中，用于测试网络连通性的命令是______。", options: ["A. ifconfig", "B. netstat", "C. ping", "D. traceroute"], answer: "C", 解析: "ping命令通过发送ICMP Echo Request报文测试目标主机的网络连通性，是最常用的网络诊断命令。" },
    { text: "检查DNS解析是否正常，可以使用______命令（Windows/Linux）或dig命令。", options: ["A. nslookup", "B. ping", "C. tracert", "D. netstat"], answer: "A", 解析: "nslookup命令用于查询DNS服务器，测试域名解析是否正常。dig是更强大的DNS查询工具。DNS默认端口53。" },
    { text: "DHCP客户端使用的端口号是______。", options: ["A. 67", "B. 68", "C. 69", "D. 70"], answer: "B", 解析: "DHCP客户端使用UDP端口68发送请求，DHCP服务器使用UDP端口67监听和响应。DHCP用于自动分配IP地址等网络参数。" },
    { text: "在Linux系统中，锁定控制台的命令是______。", options: ["A. lock", "B. vlock", "C. logout", "D. shutdown"], answer: "B", 解析: "vlock命令用于锁定Linux虚拟控制台或当前终端会话，防止未授权访问。logout用于退出登录，shutdown用于关机或重启。" },
    { text: "以下哪种无线接入技术延迟最低、速率最高？", options: ["A. GPRS", "B. 3G", "C. 4G", "D. 5G"], answer: "D", 解析: "5G网络具有最低延迟（理论1ms）和最高速率（理论峰值10-20Gbit/s），在四者中性能最优。GPRS最慢，3G和4G居中。" },
    { text: "以下哪种无线传输介质受天气影响最大？", options: ["A. 无线电波", "B. 微波", "C. 红外线", "D. 激光"], answer: "D", 解析: "激光传输受雨、雾、雪等天气条件影响最大，因为激光波长极短，容易被大气中的微粒散射和吸收。微波也受天气影响但程度较轻。" },
    { text: "当DHCP客户端无法获取IP地址时，会自动配置一个从______到169.254.255.254的APIPA地址。", options: ["A. 169.254.0.1", "B. 192.168.0.1", "C. 10.0.0.1", "D. 172.16.0.1"], answer: "A", 解析: "APIPA（自动专用IP寻址）地址范围为169.254.0.1~169.254.255.254，子网掩码为255.255.0.0。当DHCP客户端无法获取IP地址时自动配置。" },
    { text: "由ISP动态分配的一个暂时的IP地址属于______。", options: ["A. 固定IP", "B. 动态IP", "C. 公有IP", "D. 私有IP"], answer: "B", 解析: "动态IP地址由ISP的DHCP服务器在用户连接时自动分配，断开后IP被回收供其他用户使用。静态IP则长期固定分配给特定设备。" },
    { text: "蜂窝状拓扑结构常用于______网络中，以无线发射站为中心覆盖一定区域。", options: ["A. 有线局域网", "B. 无线局域网", "C. 广域网", "D. 城域网"], answer: "B", 解析: "蜂窝状拓扑是无线局域网（WLAN）和移动通信网络的典型拓扑，以基站（AP）为中心，覆盖六边形蜂窝区域，多个蜂窝组成大覆盖范围。" },
    { text: "Internet是全球最大的广域网，其核心通信协议是______。", options: ["A. TCP/IP", "B. HTTP", "C. FTP", "D. SMTP"], answer: "A", 解析: "Internet（互联网）是全球最大的广域网，采用TCP/IP协议簇将世界各地的计算机网络互联互通。" },
    { text: "WWW服务基于HTTP协议，默认端口为______；HTTPS是加密版本，默认端口为443。", options: ["A. 80", "B. 21", "C. 25", "D. 110"], answer: "A", 解析: "HTTP默认端口80用于明文传输网页内容；HTTPS默认端口443通过TLS/SSL加密传输。21是FTP端口，25是SMTP端口，110是POP3端口。" },
    { text: "以下哪个不是即时通信（IM）软件？", options: ["A. 微信", "B. QQ", "C. 钉钉", "D. 迅雷"], answer: "D", 解析: "微信、QQ、钉钉都是即时通信（IM）软件，支持文字、语音和视频实时通信。迅雷是多线程下载工具，不具备即时消息收发功能。" },
    { text: "TCP/IP协议栈中，传输层包括TCP和UDP两个主要协议，其中TCP提供可靠传输，UDP提供______。", options: ["A. 不可靠传输", "B. 可靠传输", "C. 加密传输", "D. 广播传输"], answer: "A", 解析: "TCP提供面向连接的可靠传输（通过确认、重传、排序机制）；UDP提供无连接、不可靠的传输服务，但开销小、速度快。" },
    { text: "以下哪个不是Internet提供的常用服务？", options: ["A. WWW", "B. E-mail", "C. 网盘", "D. 打印服务"], answer: "D", 解析: "Internet提供的常用服务包括WWW（网页浏览）、E-mail（电子邮件）、网盘（云存储）、FTP、即时通信等。打印服务属于局域网共享服务，不是Internet直接提供的基础公共服务。" },
    { text: "网络维护中，用于测试网线通断和线序的工具是______，用于测试光纤衰减的工具是光功率计。", options: ["A. 测线仪", "B. 万用表", "C. 红光笔", "D. 示波器"], answer: "A", 解析: "测线仪（校线器）用于测试双绞线的通断和线序，由发送和接收两部分组成。指示灯不按顺序闪烁或出现红灯表示存在断路或线序错误。" },
    { text: "测线仪（校线器）测试双绞线时，如果指示灯不按顺序闪烁或出现红灯，表示______。", options: ["A. 线缆制作成功", "B. 线缆存在断路或线序错误", "C. 线缆过长", "D. 线缆正常"], answer: "B", 解析: "测线仪测试时指示灯不按顺序闪烁或出现红灯，表示线缆存在断路、短路或线序错误，需要重新制作RJ-45接头。" },
    { text: "网络维护中，用于检测光纤线路衰减情况的工具是______。", options: ["A. 测线仪", "B. 光功率计", "C. 万用表", "D. 红光笔"], answer: "B", 解析: "光功率计用于测量光纤线路的光功率衰减情况。红光笔用于查找光纤断点和识别光纤，测线仪用于测试双绞线通断和线序。" },
    { text: "使用ping命令测试本机TCP/IP协议栈是否正常，应首先ping的地址是______。", options: ["A. 本机IP", "B. 网关IP", "C. 127.0.0.1", "D. 外网IP"], answer: "C", 解析: "ping 127.0.0.1（回环地址）是测试本机TCP/IP协议栈是否正常工作的最基本方法。若通则协议栈安装正确，若不通则TCP/IP配置有问题。" },
    { text: "使用Windows Internet连接共享（ICS）时，充当网关的计算机必须安装______块网卡。", options: ["A. 1", "B. 2", "C. 3", "D. 4"], answer: "B", 解析: "Windows ICS要求网关主机安装两块网卡：一块连接Internet（WAN），另一块连接内部网络（LAN），实现内外网络之间的数据转发。" },
    { text: "光纤接入中，EPON和GPON是两种主流技术，其中GPON的下行速率最高可达______Gbit/s。", options: ["A. 2.5", "B. 1.25", "C. 10", "D. 100"], answer: "A", 解析: "GPON（千兆无源光网络）下行速率最高可达2.5Gbit/s，上行1.25Gbit/s。EPON上下行均为1.25Gbit/s。GPON在速率和分光比方面优于EPON。" },
    { text: "IP地址192.168.1.100属于______类地址。", options: ["A. A", "B. B", "C. C", "D. D"], answer: "C", 解析: "192.168.1.100属于C类私有地址（192.168.0.0~192.168.255.255），C类地址第一个字节范围为192-223。" },
    { text: "负责互联网资源分配和标识符管理的标准化组织是______。", options: ["A. W3C", "B. IETF", "C. EIA/TIA", "D. IANA"], answer: "D", 解析: "IANA（互联网号码分配机构）是负责互联网资源分配、域名管理和协议参数协调的标准化组织，隶属于ICANN。" },
    { text: "光纤接入技术中，FTTH的全称是______，是目前家庭宽带的主流接入方式。", options: ["A. Fiber To The Home", "B. Fiber To The Building", "C. Fiber To The Curb", "D. Fiber To The Office"], answer: "A", 解析: "FTTH（Fiber To The Home，光纤到户）将光纤直接铺设到用户家中，是目前家庭宽带最理想的光纤接入方式。" },
    { text: "在对等式网络中，计算机的角色是______。", options: ["A. 有专门的服务器", "B. 地位平等，既可是服务器也可是工作站", "C. 只能作为工作站", "D. 只能作为服务器"], answer: "B", 解析: "对等式网络中每台计算机地位平等，无专用服务器，每台计算机既可作为服务器提供资源，也可作为工作站访问资源，角色可互换。" },
    { text: "局域网中，通信处理一般由______完成。", options: ["A. 路由器", "B. 交换机", "C. 网卡", "D. 服务器"], answer: "C", 解析: "在局域网中，通信处理一般由网卡完成。网卡负责数据的封装成帧、介质访问控制和数据发送接收。" },
    { text: "在Windows系统中，tracert命令对应Linux中的______命令，用于追踪路由路径。", options: ["A. traceroute", "B. route", "C. netstat", "D. pathping"], answer: "A", 解析: "Windows中tracert命令对应Linux中的traceroute命令，两者都通过发送递增TTL值的探测包来追踪数据包经过的路由路径。" },
    { text: "在Windows系统中启用\"Internet连接共享\"功能后，内网网卡的IP地址会自动设置为______。", options: ["A. 192.168.0.1", "B. 192.168.1.1", "C. 192.168.137.1", "D. 10.0.0.1"], answer: "C", 解析: "Windows启用Internet连接共享（ICS）后，内网网卡IP自动设置为192.168.137.1/24，同时为该内网启用DHCP服务器和DNS代理功能。" },
    { text: "长期固定分配给一台计算机使用的IP地址称为______。", options: ["A. 动态IP", "B. 静态IP", "C. 私有IP", "D. 公有IP"], answer: "B", 解析: "静态IP（固定IP）由管理员手动配置，长期固定分配给特定计算机，不会随时间或重启而改变，适用于服务器等需要固定地址的设备。" },
    { text: "在vi的一般模式下，按______可以撤销上一次操作。", options: ["A. u", "B. .", "C. r", "D. /"], answer: "A", 解析: "vi编辑器的一般模式下按u键可撤销上一次编辑操作（undo），连续多次按u可逐次撤销更早的操作。" },
    { text: "使用搜索引擎时，将关键词用双引号括起来可以实现______匹配，提高搜索准确性。", options: ["A. 精确", "B. 模糊", "C. 同义词", "D. 拼音"], answer: "A", 解析: "搜索引擎中将关键词用双引号括起来可实现精确匹配，返回包含该完整短语的页面，提高搜索准确性。空格表示与逻辑，减号排除。" },
    { text: "在环型拓扑结构中，数据______。", options: ["A. 沿固定方向单向传输", "B. 双向同时传输", "C. 广播式传输", "D. 由中心节点转发"], answer: "A", 解析: "环型拓扑中各节点首尾相连形成闭合环路，数据沿固定方向单向传输，每个节点依次接收前一个节点发来的数据并转发给下一节点。" },
    { text: "B类IP地址默认子网掩码是______，用CIDR表示为/16。", options: ["A. 255.0.0.0", "B. 255.255.0.0", "C. 255.255.255.0", "D. 255.255.255.255"], answer: "B", 解析: "B类IP地址前16位为网络号，默认子网掩码为255.255.0.0，用CIDR表示为/16。A类为255.0.0.0(/8)，C类为255.255.255.0(/24)。" },
    { text: "IP数据报首部的固定部分长度为______字节。", options: ["A. 20", "B. 32", "C. 64", "D. 128"], answer: "A", 解析: "IP数据报首部固定部分长度为20字节，包含版本、首部长度、服务类型、总长度、标识、标志、片偏移、TTL、协议、首部校验和、源IP和目的IP共12个字段。" },
    { text: "安全外壳协议SSH的默认端口号是______。", options: ["A. 22", "B. 23", "C. 25", "D. 53"], answer: "A", 解析: "SSH（安全外壳协议）默认使用TCP端口22，提供加密的远程登录和安全数据传输通道。Telnet端口23、SMTP端口25、DNS端口53。" },
    { text: "在局域网中实现网络共享打印的第一步是______。", options: ["A. 安装网络打印机驱动程序", "B. 在服务器上安装本地打印机并共享", "C. 购买打印机", "D. 配置IP地址"], answer: "B", 解析: "实现网络共享打印的第一步是在服务器上安装本地打印机并将其设置为共享状态，然后网络中的其他客户端才能发现并连接该共享打印机。" },
    { text: "在Linux系统中，使用chmod命令修改文件权限，数字764对应的权限是______。", options: ["A. rwxrw-r--", "B. rw-rwxr--", "C. rwxrw-rw-", "D. rwxr-xr--"], answer: "A", 解析: "权限数字764：7=4+2+1=rwx（所有者读写执行），6=4+2=rw-（组用户读写），4=r--（其他用户仅读）。" },
    { text: "对于超过2TB容量的硬盘，应使用______分区表，并使用______引导系统。", options: ["A. MBR、BIOS", "B. GPT、UEFI", "C. MBR、UEFI", "D. GPT、BIOS"], answer: "B", 解析: "MBR分区表最大支持2TB硬盘，超过2TB必须使用GPT分区表并配合UEFI启动模式。GPT还支持更多分区数和更大容量。" },
    { text: "在Linux系统中，查看磁盘使用情况的命令是______。", options: ["A. df -h", "B. du -sh", "C. fdisk -l", "D. mount"], answer: "A", 解析: "df -h命令以人类可读格式（GB/MB）显示Linux系统中各文件系统的磁盘空间使用情况。du -sh用于查看目录大小，fdisk -l列出磁盘分区。" },
    { text: "Linux系统中，网卡配置文件的ONBOOT=yes参数表示______。", options: ["A. 系统启动时激活该网卡", "B. 网卡支持热插拔", "C. 网卡自动获取IP", "D. 网卡使用静态IP"], answer: "A", 解析: "Linux网卡配置文件中ONBOOT=yes表示系统启动时自动激活该网卡，使网络配置在开机后自动生效，无需手动启动网络服务。" },
    { text: "P2P文件共享技术中，每个节点既是客户端也是服务器，典型的应用有BT和______。", options: ["A. eMule", "B. FTP", "C. HTTP", "D. SMTP"], answer: "A", 解析: "eMule（电驴）使用eDonkey网络协议实现P2P文件共享，与BT（BitTorrent）同为经典P2P应用。每个节点既是客户端下载数据，也是服务器上传数据。" },
    { text: "100Base-FX标准使用的传输介质是______。", options: ["A. 粗同轴电缆", "B. 细同轴电缆", "C. 双绞线", "D. 光纤"], answer: "D", 解析: "100Base-FX中F表示Fiber（光纤），使用多模或单模光纤作为传输介质，100代表100Mbps速率，FX表示光纤介质。最大传输距离可达2km（多模）。" },
    { text: "在无盘工作站网络中，工作站的启动依赖于______。", options: ["A. 本地硬盘中的操作系统", "B. 网卡上的自启动芯片和服务器", "C. U盘启动", "D. 光盘启动"], answer: "B", 解析: "无盘工作站没有本地硬盘，启动时依靠网卡上的Boot ROM自启动芯片，通过网络向服务器请求引导程序，由服务器的远程启动服务加载操作系统。" },
    { text: "在Internet上实现共享打印，需要在服务器上安装并配置______服务，并允许客户端通过HTTP访问打印机。", options: ["A. IIS", "B. Apache", "C. Nginx", "D. Tomcat"], answer: "A", 解析: "在Internet上实现共享打印需要在服务器上安装IIS（Internet信息服务）并启用Internet打印功能，使用IPP协议通过HTTP传输打印任务。" },
    { text: "下列设备中，属于DTE的是______。", options: ["A. 调制解调器", "B. 计算机", "C. 光纤收发器", "D. ISDN适配器"], answer: "B", 解析: "DTE（数据终端设备）是数据的源或终点，计算机和打印机属于DTE。调制解调器、交换机、光纤收发器和ISDN适配器属于DCE（数据电路终接设备）。" },
    { text: "以下哪种拓扑结构可靠性最高，但布线成本也最高？", options: ["A. 总线型", "B. 星型", "C. 环型", "D. 网状"], answer: "D", 解析: "网状拓扑中任意两节点间有多条冗余路径，单点或单链路故障不影响通信，因此可靠性最高。但n个节点需要n(n-1)/2条链路，布线成本极高。" },
    { text: "当故障区域有限时，将出现故障的工作站和设备进行隔离，逐一排查，逐步缩小问题区域，这种方法称为______。", options: ["A. 分析观察法", "B. 故障隔离法", "C. 测试法", "D. 替换法"], answer: "B", 解析: "故障隔离法是在故障区域有限的情况下，将可能出问题的工作站和设备逐一隔离排查，逐步缩小问题范围，最终定位故障源的方法。" },
    { text: "信道编码的主要作用是______。", options: ["A. 去除数据冗余", "B. 增强信号抗干扰能力", "C. 提高传输速率", "D. 压缩数据"], answer: "B", 解析: "信道编码通过添加冗余位（校验位）来增强信号的抗干扰能力，使接收端能检测甚至纠正传输错误。信源编码则去除冗余提高传输效率。" },
    { text: "网盘（云存储）的核心功能包括数据存储、备份、共享和______。", options: ["A. 协同编辑", "B. 杀毒", "C. 加密", "D. 压缩"], answer: "A", 解析: "网盘（云存储）的核心功能包括数据存储、备份、共享和协同编辑。协同编辑允许多用户在线实时共同编辑同一文档，这是云存储的关键增值功能。" },
    { text: "在电路交换中，数据传送开始前必须首先建立一条______。", options: ["A. 逻辑连接", "B. 虚电路", "C. 端到端的物理连接", "D. 数据报连接"], answer: "C", 解析: "电路交换（如传统电话系统）在数据传送开始前必须首先建立一条端到端的专用物理连接，通信期间该通路被独占，通信结束后线路拆除释放资源。" },
    { text: "直通线（平行线）适用于以下哪种设备连接？", options: ["A. 计算机与计算机", "B. 交换机普通口与另一交换机普通口", "C. 计算机与交换机普通口", "D. 交换机级联口与另一交换机级联口"], answer: "C", 解析: "直通线（平行线）两端线序相同（T568B），用于连接不同类设备，如计算机与交换机普通口、交换机普通口与级联口。同类设备间使用交叉线。" },
    { text: "计算机网络发展第一阶段的主要特征是______。", options: ["A. 分组交换", "B. 以单台计算机为中心的联机终端系统", "C. 标准化网络体系结构", "D. 互联网普及"], answer: "B", 解析: "计算机网络发展第一阶段（20世纪50-60年代）以一台大型主机为中心，通过通信线路连接多个远程终端，形成面向终端的联机系统。" },
    { text: "覆盖范围是一个城市，将一个城市的局域网互联起来的网络是______。", options: ["A. 局域网", "B. 城域网", "C. 广域网", "D. 互联网"], answer: "B", 解析: "城域网（MAN）是一种比局域网更大的网络，覆盖范围通常为一个城市（10-100km），将一个城市内的多个局域网互联起来。" },
    { text: "在Linux中，使用命令______可以创建一个ext4文件系统的分区。", options: ["A. mkfs", "B. fdisk", "C. mount", "D. fsck"], answer: "A", 解析: "Linux中mkfs（make filesystem）命令用于创建文件系统，如mkfs -t ext4或mkfs.ext4格式化ext4分区。fdisk用于分区，mount用于挂载。" },
    { text: "在Linux系统中，创建新用户的命令是______。", options: ["A. useradd", "B. passwd", "C. groupadd", "D. addgroup"], answer: "A", 解析: "useradd命令用于在Linux系统中创建新用户账户，可指定家目录、Shell等参数。passwd用于设置密码，groupadd用于创建用户组。" },
    { text: "在Linux中，临时配置网卡IP地址后，激活配置的命令是______。", options: ["A. ifdown ens33 && ifup ens33", "B. reboot", "C. systemctl restart network", "D. ifconfig ens33 up"], answer: "D", 解析: "Linux中临时配置网卡IP地址后，使用ifconfig ens33 up命令激活网卡使配置立即生效。但此配置为临时配置，系统重启后会恢复原设置。" },
    { text: "以下哪个设备工作在OSI模型的物理层？", options: ["A. 网卡", "B. 交换机", "C. 路由器", "D. 中继器"], answer: "D", 解析: "中继器（Repeater）工作在OSI模型第一层——物理层，仅对衰减的信号进行放大和再生，不识别数据帧格式和MAC地址，不能过滤数据。" },
    { text: "在Linux系统中，按组合键______可以在图形界面和命令行界面之间切换。", options: ["A. Ctrl+Alt+Del", "B. Ctrl+Alt+F1~F6", "C. Ctrl+Shift", "D. Alt+Tab"], answer: "B", 解析: "Linux系统中按Ctrl+Alt+F1~F6可切换到不同的命令行终端（tty1-tty6），Ctrl+Alt+F7通常切换回图形界面。Ctrl+Alt+Del为重启。" },
    { text: "网络共享打印中，______是监管打印队列和打印机的设备。", options: ["A. 打印服务器", "B. 打印机", "C. 工作站", "D. 打印队列"], answer: "A", 解析: "网络共享打印中，打印服务器是监管打印队列和打印机的核心设备，负责接收客户端打印请求、管理打印队列和分配任务。" },
    { text: "局域网的地理范围通常在______。", options: ["A. 几米至10km", "B. 10~100km", "C. 100km以上", "D. 全球范围"], answer: "A", 解析: "局域网地理覆盖范围通常在几米至10公里之间，一般为一个办公室、一栋楼或一个园区。10-100km为城域网，100km以上为广域网。" },
    { text: "端口号的范围是______，其中0~1023称为知名端口。", options: ["A. 0-1024", "B. 0-65535", "C. 1-1024", "D. 1-65535"], answer: "B", 解析: "TCP/UDP端口号是16位无符号整数，范围0-65535。0-1023为知名端口（Well-known Ports），由IANA分配给HTTP(80)、FTP(21)等标准服务。" },
    { text: "在数据通信中，基带信号是指未经调制的原始电信号，宽带信号是指经过调制的频分复用信号。基带传输通常用于______，宽带传输用于CATV等。", options: ["A. 局域网", "B. 广域网", "C. 城域网", "D. 电话网"], answer: "A", 解析: "基带传输将未经调制的数字信号直接在线上传输，通常用于局域网。宽带传输将信号调制到不同频段，用于有线电视（CATV）等频分复用系统。" },
    { text: "IPv6地址的长度为______位。", options: ["A. 32", "B. 64", "C. 128", "D. 256"], answer: "C", 解析: "IPv6地址长度为128位（16字节），是IPv4（32位）的4倍，采用冒号十六进制表示（8组4位十六进制数），极大扩展了地址空间。" },
    { text: "局域网最典型的特征是______。", options: ["A. 传输速率高", "B. 覆盖范围大", "C. 使用无线传输", "D. 需要专用服务器"], answer: "A", 解析: "局域网最典型的特征是传输速率高（100Mbit/s~10Gbit/s），此外覆盖范围小（几米至10km），通常为一个单位内部使用，误码率低。" },
    { text: "无线局域网中常用的拓扑结构是______。", options: ["A. 总线型", "B. 星型", "C. 环型", "D. 蜂窝状"], answer: "D", 解析: "蜂窝状拓扑是无线局域网（WLAN）最常用的结构，以无线接入点（AP）为中心覆盖一个蜂窝区域，多个蜂窝通过频率复用扩展覆盖范围。" },
    { text: "数据通信中，允许信息同时沿两个方向传输的方式是______。", options: ["A. 单工通信", "B. 半双工通信", "C. 双工通信", "D. 异步通信"], answer: "C", 解析: "双工通信（Full-duplex）允许信息同时在两个方向传输，双方可同时发送和接收数据。单工只能单向，半双工可双向但不可同时。" },
    { text: "以下哪种拓扑结构具有中心节点，且中心节点故障会导致全网瘫痪？", options: ["A. 总线型", "B. 星型", "C. 环型", "D. 网状"], answer: "B", 解析: "星型拓扑所有节点通过独立链路连接到中心节点，中心节点负责全部数据的转发。一旦中心节点（集线器/交换机）故障，所有节点之间无法通信。" },
    { text: "虚拟桌面技术的整体架构中，负责将桌面虚拟机在数据中心进行托管并统一管理的层是______。", options: ["A. 终端接入层", "B. 桌面管理层", "C. 资源池层", "D. 接入网络层"], answer: "B", 解析: "虚拟桌面架构中，桌面管理层负责将所有桌面虚拟机在数据中心服务器上托管、分配、监控和统一管理，是VDI架构的核心组件。" },
    { text: "TCP/IP协议栈中，传输层包括TCP和UDP两个主要协议，其中TCP提供可靠传输，UDP提供______。", options: ["A. 不可靠传输", "B. 可靠传输", "C. 加密传输", "D. 广播传输"], answer: "A", 解析: "UDP（用户数据报协议）提供无连接、不可靠的传输服务，不提供确认、重传和排序机制。优点是开销小、速度快，适用于DNS查询和实时音视频等场景。" },
  ];
  const tfQuestions = [
    { text: "在打印服务器上，管理员可以取消任何用户的打印作业，但普通用户只能取消自己的作业。", answer: "正确", 解析: "打印服务器上管理员拥有完全管理权限，可取消所有用户的打印作业；普通用户只能管理自己的打印作业。这是网络共享打印的基本权限规则。" },
    { text: "HTTPS协议的默认端口号是80。", answer: "错误", 解析: "HTTPS使用TLS/SSL加密，默认端口为443，而非80。HTTP的默认端口才是80。该说法混淆了HTTP和HTTPS的端口。" },
    { text: "ping命令只能测试IP地址的连通性，不能测试域名。", answer: "错误", 解析: "ping命令实际支持直接输入域名（如ping baidu.com），系统会通过DNS将域名解析为IP地址后再测试连通性，因此既可以测试IP也可以测试域名。" },
    { text: "远程桌面服务属于远程登录的一种形式。", answer: "正确", 解析: "远程桌面服务（如RDP、VNC）允许用户通过网络远程登录到目标计算机并进行图形化操作，属于远程登录服务的一种形式。" },
    { text: "使用Windows自带的Internet连接共享功能时，网关主机需要安装两块网卡。", answer: "正确", 解析: "Windows的Internet连接共享（ICS）功能要求网关主机安装两块网卡：一块连接内网（局域网），一块连接外网（Internet），实现内外网之间的数据转发和NAT转换。" },
    { text: "FTP服务只能用于下载文件，不能上传。", answer: "错误", 解析: "FTP（文件传输协议）支持文件的上传和下载双向传输。使用端口21进行控制连接，端口20进行数据传输，用户既可以从服务器下载文件，也可以上传文件到服务器。" },
    { text: "现代计算机网络中，终端和工作站具有相同的硬件配置。", answer: "错误", 解析: "终端通常指无独立处理能力的输入输出设备（如哑终端），工作站是具有完整CPU、内存和本地处理能力的计算机，二者硬件配置不同。" },
    { text: "局域网的地理范围通常在100km以上。", answer: "错误", 解析: "局域网（LAN）地理覆盖范围通常在几米至10公里之间，100km以上是广域网（WAN）的范围。" },
    { text: "IPv6地址中，每组开头的0可以省略。", answer: "正确", 解析: "IPv6地址简化规则允许省略每组十六进制数开头的0，如:0001可简写为:1。连续多组全零可用双冒号::替代一次。" },
    { text: "在调制过程中，将数字信号转换为模拟信号后，可以在模拟信道上传输。", answer: "正确", 解析: "Modem通过调制将数字信号转换为模拟信号，使其能在电话线等模拟信道上传输，接收端再通过解调还原为数字信号。" },
    { text: "互联网是一种具体的网络技术。", answer: "错误", 解析: "互联网（Internet）不是一种具体的网络技术，而是全球范围内众多网络互联形成的网络集合体，采用TCP/IP协议簇实现互联。" },
    { text: "同轴电缆的抗干扰能力比非屏蔽双绞线强。", answer: "正确", 解析: "同轴电缆采用金属屏蔽层结构，对外部电磁干扰有较好的屏蔽作用。非屏蔽双绞线（UTP）仅靠双绞来减少串扰，抗干扰能力弱于同轴电缆。" },
    { text: "P2P技术的特点是不依赖中心服务器，每个节点既下载也上传，参与人数越多，整体速度越快。", answer: "正确", 解析: "P2P下载的核心特点是下载者越多速度越快——每个下载者同时也在上传已下载的数据给其他用户，形成分布式的众筹加速效应。" },
    { text: "分组交换采用存储-转发-交换原理进行工作。", answer: "正确", 解析: "分组交换将数据分成小包传输，各中间节点采用存储-转发方式处理每个分组，各包可独立路由，提高线路利用率。" },
    { text: "信宿是信息的归宿，把接收设备恢复的电信号转换为可理解的信息形式。", answer: "正确", 解析: "在通信系统中，信源产生信息并转化为电信号，信宿是信息的最终接收者，将电信号还原为可理解的信息形式（如声音、图像）。" },
    { text: "无线传输介质中的红外线可以穿透墙壁。", answer: "错误", 解析: "红外线不能穿透墙壁等固体障碍物，传输距离短且需要直线视距（Line of Sight）。无线电波则可以穿透或绕过一定障碍物。" },
    { text: "发送设备对信源产生的原始电信号进行处理，使其适配信道传输，如调制、编码等操作。", answer: "正确", 解析: "发送设备位于信源与信道之间，对原始电信号进行调制、编码、放大等处理，使信号特性与信道匹配，确保有效传输。" },
    { text: "在Windows中添加网络打印机时，可以使用IP地址或主机名，也可以使用URL（如Internet打印）。", answer: "正确", 解析: "Windows添加网络打印机支持三种方式：通过IP地址添加、通过主机名添加和通过URL（Internet打印协议IPP）添加，灵活适应不同网络环境。" },
    { text: "校线器（测线仪）测试双绞线时，如果指示灯不按顺序闪烁或出现红灯，表示线缆制作成功。", answer: "错误", 解析: "校线器（测线仪）测试时，指示灯不按顺序闪烁或出现红灯表示线缆存在断路、短路或线序错误，不是制作成功的表现。正常情况应为两端指示灯按1-8顺序同步闪烁绿灯。" },
    { text: "使用搜索引擎时，intitle:关键词不能搜索标题中含有该关键词的网页，site:域名可以限定在特定网站内搜索。", answer: "错误", 解析: "搜索引擎中intitle:关键词可以搜索标题中含有该关键词的网页。题干前半句说法错误——intitle:是可以搜索标题中含关键词的网页的。" },
    { text: "私有IP地址可以在互联网上直接路由。", answer: "错误", 解析: "私有IP地址仅在局域网内部使用，不可在Internet上直接路由。私有IP地址范围包括10.0.0.0/8、172.16.0.0/12和192.168.0.0/16。" },
    { text: "网状拓扑中，每个节点之间都有点对点链路，可靠性高但成本高，适用于核心网络。", answer: "正确", 解析: "网状拓扑每个节点间都有点对点链路，提供多条冗余路径，单点故障不影响整体通信，可靠性极高。但n个节点需n(n-1)/2条链路，成本极高，常用于核心骨干网络。" },
    { text: "网络层的PDU称为数据包（packet），传输层的PDU称为数据段（segment），数据链路层的PDU称为帧（frame），物理层的PDU称为比特（bit）。", answer: "正确", 解析: "各层PDU：物理层为比特(bit)、数据链路层为帧(frame)、网络层为数据包(packet)、传输层为数据段(segment)。题干描述正确。" },
    { text: "无线电波传输可以绕过障碍物，但易受干扰。", answer: "正确", 解析: "无线电波频率较低，具有一定的绕射能力可绕过部分障碍物，但也因此容易受到同频干扰和电磁噪声的影响。" },
    { text: "5G网络的理论峰值速率可达1~120Gbit/s。", answer: "正确", 解析: "5G网络理论峰值速率可达10~20Gbit/s（ITU IMT-2020标准），是4G的100倍以上。题干范围1~120Gbit/s说法较为宽泛但整体方向正确。" },
    { text: "使用USB接口的打印机安装过程比LPT接口的打印机复杂。", answer: "错误", 解析: "USB接口打印机支持即插即用和热插拔，安装过程通常比LPT接口打印机更简单方便，无需关机连接和配置并行端口参数。" },
    { text: "在OSI参考模型中，会话层负责维护两个节点之间的传输链接，管理数据交换。", answer: "正确", 解析: "OSI参考模型中会话层（第5层）负责建立、管理和终止两个节点之间的会话连接，管理数据交换的同步和对话控制。" },
    { text: "局域网的误码率较高。", answer: "错误", 解析: "局域网覆盖范围小、传输条件好，误码率较低（通常低于10^-8），远低于广域网的误码率。" },
    { text: "IP数据报首部的可变部分长度是固定的。", answer: "错误", 解析: "IP数据报首部固定部分为20字节，可变部分（选项字段）长度不定，用于支持可选功能（如源路由、时间戳、记录路由等），最长可达40字节。题干说\"固定\"是错误的。" },
    { text: "网桥可以连接两个不同协议的网络。", answer: "错误", 解析: "网桥（Bridge）只能连接两个相同协议的网络（如两个以太网），工作在数据链路层。连接不同协议的网络需要网关（Gateway），网关工作在更高层进行协议转换。" },
    { text: "Telnet协议使用加密方式传输数据，因此比SSH更安全。", answer: "错误", 解析: "Telnet以明文方式传输包括密码在内的所有数据，安全性极低。SSH（安全外壳协议，默认端口22）采用加密传输，远比Telnet安全。题干说法与实际完全相反。" },
    { text: "IP地址中，主机位全\"1\"表示广播地址。", answer: "正确", 解析: "IP地址中主机位全1表示该网络的广播地址，数据包发送到广播地址会送达该网络内所有主机。例如192.168.1.255（/24网络）即为该子网的广播地址。" },
    { text: "双绞线按照质量等级分为Cat5、Cat5e、Cat6、Cat7等，Cat5e支持1000Mbps（千兆）传输。", answer: "正确", 解析: "Cat5e（超五类）双绞线在100米内支持1000Mbps（千兆/1Gbps）传输，是Cat5的增强版，增加了串扰抑制能力（如回波损耗、远端串扰等指标）。" },
    { text: "在Windows系统中，使用ipconfig/all命令可以查看本机的MAC地址。", answer: "正确", 解析: "Windows中ipconfig /all显示所有网络接口详细信息，包括物理地址（即MAC地址）、IP地址、子网掩码、默认网关、DNS服务器等完整网络配置。" },
    { text: "Internet起源于军事和科研需求，旨在实现不同计算机之间的数据共享。", answer: "正确", 解析: "Internet起源于美国军方ARPANET项目（1969年），最初目的是实现军事和科研机构之间的数据共享与通信，采用分组交换技术实现分散式网络。" },
    { text: "元搜索引擎是将多个独立搜索引擎的结果聚合、去重和重新排序后返回给用户，典型代表有Dogpile、MetaCrawler等。", answer: "正确", 解析: "元搜索引擎（如Dogpile、MetaCrawler）将用户查询转发给多个独立搜索引擎，聚合各引擎返回的结果，去重和重新排序后返回给用户，不维护自己的索引数据库。" },
    { text: "UDP协议在数据传输过程中确保数据无丢失、无失序、无错误。", answer: "错误", 解析: "UDP是无连接的不可靠传输协议，不保证数据无丢失、无失序、无错误。但UDP开销小、速度快，适用于实时音视频传输和DNS查询等对速度要求高于可靠性的应用场景。" },
    { text: "在Linux系统中，临时配置的IP地址在系统重启后会失效。", answer: "正确", 解析: "Linux中通过ifconfig或ip addr命令临时配置的IP地址存储在内存中，系统重启后配置会丢失。要使配置永久生效需写入网卡配置文件（如/etc/sysconfig/network-scripts/ifcfg-eth0）。" },
    { text: "Internet资源只能通过浏览器访问。", answer: "错误", 解析: "Internet资源可通过多种客户端访问，不仅仅是浏览器。如FTP客户端访问文件、邮件客户端访问邮件、Telnet/SSH客户端远程登录、即时通讯软件等。" },
    { text: "代理服务器可以节省IP开销，允许内部网络使用私有IP地址。", answer: "正确", 解析: "代理服务器允许内网用户使用私有IP地址，通过代理的公有IP访问Internet，从而节省公有IP开销（NAT功能），同时隐藏内网结构提高安全性。" },
    { text: "AI搜索引擎可以理解自然语言问题，直接给出答案摘要，并引用来源，提高搜索效率。", answer: "正确", 解析: "AI搜索引擎（如百度AI搜索、New Bing等）利用大语言模型理解自然语言问题，直接生成答案摘要并引用来源，大幅提高搜索效率和准确性。" },
    { text: "计算机网络的功能仅包括数据通信和资源共享。", answer: "错误", 解析: "计算机网络功能不仅限于数据通信和资源共享，还包括提高系统可靠性（冗余备份）、负载均衡、分布式处理、集中管理等重要功能。" },
    { text: "动态IP地址一般由ISP自动分配，普通用户不需要手动设置。", answer: "正确", 解析: "动态IP地址是ISP的DHCP服务器在用户连接时自动分配的临时IP地址，断开连接后IP被回收供其他用户使用，普通用户无需手动配置网络参数。" },
    { text: "总线型拓扑结构中，所有工作站地位平等，无中心节点控制。", answer: "正确", 解析: "总线型拓扑所有工作站共享一条总线，地位平等，无中心节点控制。每个节点都可独立发送数据，通过CSMA/CD等机制避免数据冲突。" },
    { text: "OSI参考模型中的物理层利用传输介质为数据链路层提供物理连接。", answer: "正确", 解析: "OSI参考模型中物理层（第1层）负责利用传输介质（如双绞线、光纤）为上层数据链路层提供物理连接，定义电气特性、机械特性和接口规范，传输原始比特流。" },
    { text: "在浏览器中保存网页时，可以选择\"网页，全部\"（包括图片等资源）或\"网页，仅HTML\"（只有文本和基本结构）。", answer: "正确", 解析: "浏览器保存网页时提供多种保存类型：\"网页，全部\"会保存HTML文件及图片、CSS、JS等所有资源到本地文件夹；\"网页，仅HTML\"只保存HTML源码和基本文本结构。" },
    { text: "星型拓扑结构的网络延迟时间较小，传输误差较低。", answer: "正确", 解析: "星型拓扑以中心节点（交换机/集线器）为核心，各节点通过独立链路连接中心设备，传输延迟较小，且各链路独立使传输误差较低，故障检测也较为容易。" },
    { text: "将网络打印机设置为默认打印机后，所有应用程序都将默认使用该打印机打印。", answer: "正确", 解析: "在Windows中将某台打印机设置为\"默认打印机\"后，所有应用程序的打印命令将自动发送到该打印机，无需每次手动选择。用户也可在打印对话框中临时切换其他打印机。" },
    { text: "在局域网中，\"包\"是包含在\"帧\"里的。", answer: "正确", 解析: "在局域网数据封装过程中，网络层的\"包\"（Packet）作为数据链路层\"帧\"（Frame）的数据载荷被封装在帧内部。帧=帧头+包（网络层数据）+帧尾，即包被帧封装。" },
    { text: "网卡中的MAC地址是全世界唯一的，由生产厂家烧入ROM中。", answer: "正确", 解析: "MAC地址（48位物理地址）由IEEE分配给网卡制造商，制造商在生产时将唯一MAC地址烧录在网卡的ROM中，确保全球每块网卡的MAC地址唯一。" },
    { text: "微博是一种典型的社交媒体，用户可以关注他人、发布短文、图片和视频，实现信息快速传播。", answer: "正确", 解析: "微博（Micro-blog）是典型的社交媒体平台，用户可通过关注建立社交关系，发布短文（早期140字限制）、图片和视频，通过转发机制实现信息的裂变式快速传播。" },
    { text: "IEEE802.3标准定义了CSMA/CD访问控制方式，用于以太网；IEEE802.11定义了无线局域网的CSMA/CA方式。", answer: "正确", 解析: "IEEE802.3是以太网标准，使用CSMA/CD（载波侦听多路访问/冲突检测）控制介质访问。IEEE802.11是无线局域网标准，使用CSMA/CA（冲突避免），因为无线环境下难以检测冲突。" },
    { text: "调制解调器（Modem）只能用于数字信号到模拟信号的转换，不能反向转换。", answer: "错误", 解析: "调制解调器（Modem）既能将数字信号调制为模拟信号（发送端），也能将模拟信号解调为数字信号（接收端），\"调制\"+\"解调\"双向功能正是其名称的由来。" },
    { text: "IEEE是全球最大的技术行业协会，成立于1963年。", answer: "正确", 解析: "IEEE（电气与电子工程师协会）成立于1963年，由AIEE和IRE合并而成，是全球最大的技术行业协会，制定了大量网络通信标准（如IEEE802系列）。" },
    { text: "局域网的地理范围通常不超过10km。", answer: "正确", 解析: "局域网（LAN）的地理范围通常在几米至10公里以内，覆盖一个房间、一栋建筑或一个校园。超过10km范围通常归为城域网（MAN）或广域网（WAN）。" },
    { text: "在Windows系统中，映射网络驱动器后，共享文件夹会以硬盘符号出现在\"此电脑\"中。", answer: "正确", 解析: "Windows中映射网络驱动器可将远程共享文件夹分配一个本地盘符（如Z:），该盘符出现在\"此电脑\"/\"我的电脑\"中，用户可像访问本地硬盘一样访问远程共享文件夹。" },
    { text: "路由器可以连接不同网络，基于IP地址进行路由选择，并实现网络层协议转换。", answer: "正确", 解析: "路由器工作在网络层，可连接不同类型的网络（如LAN与WAN），根据IP地址查询路由表进行路由选择和包转发，实现不同网络之间的互联互通。" },
    { text: "C类IP地址的默认子网掩码是255.255.0.0。", answer: "错误", 解析: "C类IP地址的默认子网掩码是255.255.255.0（/24），前三个字节为网络号。255.255.0.0（/16）是B类IP地址的默认子网掩码。题干将B类和C类的子网掩码混淆。" },
    { text: "子网划分后，每个子网可用的IP地址数量等于2的主机位数次方。", answer: "错误", 解析: "子网划分后，每个子网可用的IP地址数量等于2^主机位数 - 2。减去2是因为网络地址（主机位全0）和广播地址（主机位全1）不可分配给主机使用。" },
    { text: "蜂窝状拓扑常用于无线局域网和移动通信网络，以基站为中心覆盖六边形区域。", answer: "正确", 解析: "蜂窝状拓扑是无线局域网和移动通信网络的典型拓扑结构，以基站（AP或蜂窝塔）为中心，覆盖六边形蜂窝区域，多个蜂窝互联组成大范围无线覆盖网络。" },
    { text: "10Base-2标准使用的传输介质是粗同轴电缆。", answer: "错误", 解析: "10Base-2标准使用的传输介质是细同轴电缆（RG-58），最大段长185米（约200米，2代表200米）。使用粗同轴电缆的是10Base-5标准（最大段长500米，5代表500米）。" },
    { text: "环型拓扑结构中，一个节点出现故障不会影响全网。", answer: "错误", 解析: "单环拓扑中任一节点或链路故障会导致全网通信中断。改进的双环结构（如FDDI）可通过自愈环机制，在单点故障时自动切换到备用环，提高可靠性。" },
    { text: "信道是信号传输的媒介，分为有线信道和无线信道。", answer: "正确", 解析: "信道是通信系统中信号传输的物理媒介。有线信道包括双绞线、同轴电缆、光纤等；无线信道包括无线电波、微波、红外线、激光等自由空间传播介质。" },
    { text: "特殊IP地址0.0.0.0代表本网段的所有主机。", answer: "错误", 解析: "0.0.0.0在不同语境中有不同含义：在路由表中表示默认路由（任意目标）；在服务器监听中表示绑定所有网络接口；在网络配置中表示\"本网络上的本主机\"。代表\"本网段所有主机\"的是广播地址（主机位全1），而非0.0.0.0。" },
    { text: "压线钳压接水晶头时，听到\"咔嗒\"声表示压接到位。", answer: "正确", 解析: "使用压线钳压接RJ45水晶头时，听到\"咔嗒\"一声表示压线钳的棘轮机构已释放，铜片已完全压入并刺破双绞线绝缘层与铜芯接触，压接操作到位。" },
    { text: "DNS服务使用的端口号是53。", answer: "正确", 解析: "DNS（域名系统）服务使用端口53，TCP和UDP均可使用：UDP 53用于常规域名解析查询，TCP 53用于区域传输和超过512字节的大响应。" },
    { text: "星型拓扑以中心节点为核心，易于故障检测，但中心节点故障会导致全网瘫痪。", answer: "正确", 解析: "星型拓扑以中心节点（交换机/集线器）为核心，各节点通过独立链路连接，便于故障隔离和检测。但中心节点是单点故障源，一旦中心设备故障将导致全网瘫痪。" },
    { text: "配置静态IP地址时，子网掩码必须与IP地址的网络号匹配。", answer: "正确", 解析: "配置静态IP地址时，子网掩码必须与IP地址的网络类别和子网划分方案一致。子网掩码用于区分IP地址中的网络部分和主机部分，配置错误会导致通信异常。" },
    { text: "万维网（WWW）的发明推动了Internet在全球范围的普及。", answer: "正确", 解析: "万维网（World Wide Web）由Tim Berners-Lee于1989年发明，将超文本技术与Internet结合，通过浏览器以图形化方式访问信息，极大降低了Internet使用门槛，推动了全球范围的普及。" },
    { text: "Internet的特点包括全球性、开放性、平等性、虚拟性和匿名性等。", answer: "正确", 解析: "Internet作为全球开放网络，具有全球性（覆盖世界）、开放性（无中心控制）、平等性（节点地位平等）、虚拟性（虚拟社区/身份）和匿名性（可匿名访问）等特点。" },
    { text: "URL（统一资源定位符）的格式为：协议://主机名[:端口]/路径，如 http://www.example.com:8080/index.html。", answer: "正确", 解析: "URL的标准格式为 scheme://host[:port]/path[?query][#fragment]，其中端口号可选（省略时使用协议默认端口，如HTTP默认80）。示例中:8080为显式指定端口。" },
    { text: "局域网中所有计算机必须安装相同的操作系统。", answer: "错误", 解析: "局域网中的计算机可以运行不同的操作系统（如Windows、Linux、macOS），只要使用相同的网络协议（如TCP/IP）即可互联通信，不要求操作系统一致。" },
    { text: "在使用宽带路由器时，若ISP提供的是PPPoE拨号方式，WAN口应选择PPPoE用户，并输入用户名和密码。", answer: "正确", 解析: "PPPoE（以太网点对点协议）是宽带接入常用方式。在路由器WAN口设置中选择PPPoE连接类型，输入ISP提供的用户名和密码，路由器自动拨号建立Internet连接。" },
    { text: "使用电子邮件时，不要轻易打开陌生发件人的附件或点击可疑链接，以防钓鱼攻击或病毒传播。", answer: "正确", 解析: "电子邮件安全基本原则：不打开陌生发件人的附件（可能含病毒/木马），不点击可疑链接（可能是钓鱼网站），防止个人信息泄露和恶意软件感染。" },
    { text: "时分多路复用（TDM）将时间划分为时间片，轮流分配给用户；统计时分复用动态分配时间片，提高信道利用率。", answer: "正确", 解析: "TDM将时间划分为固定时间片轮流分配给各用户（同步TDM）；统计时分复用（STDM）仅对有数据发送的用户动态分配时间片，避免空闲用户的时隙浪费，显著提高信道利用率。" },
    { text: "局域网一定具有规则的拓扑结构。", answer: "错误", 解析: "局域网不一定具有规则的拓扑结构。实际局域网拓扑可以是多种拓扑的混合（如星型-总线混合），也可能是非规则结构，取决于网络设备连接方式和规模。" },
    { text: "在局域网中，通信处理一般由网卡完成，传输质量好，误码率低。", answer: "正确", 解析: "局域网中通信处理主要由网卡（NIC）完成，包括数据封装/解封装、CSMA/CD或CSMA/CA访问控制、差错校验等。局域网传输距离短，信号质量好，误码率通常低于10^-8。" },
    { text: "城域网的传输速率通常比局域网低。", answer: "错误", 解析: "城域网和局域网的传输速率取决于具体采用的技术。现代城域网同样可采用光纤等高带宽技术（如10G/40G/100G以太网），速率不一定低于局域网。" },
    { text: "OSI七层模型中，物理层传输比特，数据链路层传输帧，网络层传输包，传输层传输段，会话层、表示层、应用层传输数据。", answer: "正确", 解析: "OSI七层模型各层PDU：物理层-比特(bit)，数据链路层-帧(frame)，网络层-数据包(packet)，传输层-数据段(segment)，会话层/表示层/应用层-数据(data/报文)。题目描述正确。" },
    { text: "电路交换的\"线路拆除\"阶段发生在数据传输完成后，用于释放占用的信道资源。", answer: "正确", 解析: "电路交换三阶段：线路建立→数据传输→线路拆除。数据传输完成后，拆除已建立的物理连接，释放被占用的信道和交换资源，供其他通信使用。" },
    { text: "ADSL接入时，需要安装分离器（Splitter），用于分离语音信号和数据信号，避免互相干扰。", answer: "正确", 解析: "ADSL使用电话线同时传输语音（低频，0-4kHz）和数据（高频），分离器（Splitter）通过滤波器将低频语音与高频数据信号分离，确保打电话和上网互不干扰。" },
    { text: "树型结构是星型结构的扩展，是在星型网上加上分支形成的。", answer: "正确", 解析: "树型拓扑是星型拓扑的分层扩展：顶层为根节点，中间层为分支节点（级联的交换机/集线器），底层为叶节点。通过星型结构逐级级联形成层次化的树形网络。" },
    { text: "SSID是无线局域网的网络名称，同一无线网络中的所有设备必须配置相同的SSID才能实现互联通信。", answer: "正确", 解析: "SSID（服务集标识符）是无线局域网的网络名称，用于区分不同的无线网络。同一WLAN内的所有设备（客户端和AP）必须配置相同的SSID才能建立无线连接和通信。" },
    { text: "FTP协议在进行文件传输时，需要使用用户名和密码登录（匿名用户可免密）。", answer: "正确", 解析: "FTP通常需要用户名和密码认证后才能传输文件。匿名FTP允许用户以anonymous为用户名、电子邮件为密码（或无需密码）登录，访问公开文件资源。" },
    { text: "A类私有IP地址的范围是172.16.0.0~172.31.255.255。", answer: "错误", 解析: "A类私有IP地址的范围是10.0.0.0~10.255.255.255（10.0.0.0/8）。172.16.0.0~172.31.255.255（172.16.0.0/12）是B类私有IP地址范围。C类私有地址为192.168.0.0~192.168.255.255（192.168.0.0/16）。" },
    { text: "直通线用于连接不同类设备（如计算机-交换机），交叉线用于连接同类设备（如计算机-计算机、交换机-交换机普通口）。", answer: "正确", 解析: "直通线（两端线序相同，通常均为568B）用于连接不同类型设备（PC↔交换机、交换机↔路由器）。交叉线（一端568A另一端568B）用于连接同类设备（PC↔PC、交换机普通口↔交换机普通口）。" },
    { text: "局域网中的服务器通常配置和性能要求高于普通工作站。", answer: "正确", 解析: "局域网中的服务器为网络中其他设备提供共享资源和服务（文件、打印、数据库、Web等），需同时处理大量并发请求，因此服务器的CPU、内存、存储和可靠性要求通常远高于普通工作站。" },
    { text: "在电路交换方式中，一旦电路建立，该通路由一对用户完全占用，即使没有数据传输也会占用线路。", answer: "正确", 解析: "电路交换的特征是通信前建立专用物理连接，通信期间该通路被通信双方独占，即使没有实际数据传输（如通话静默期），线路资源也无法被其他用户使用，信道利用率较低。" },
    { text: "IEEE802.3、IEEE802.11等标准已被广泛使用，其中IEEE802.3是以太网标准。", answer: "正确", 解析: "IEEE802.3定义了有线以太网的CSMA/CD访问方式和物理层规范，是最广泛使用的局域网标准。IEEE802.11定义了无线局域网（Wi-Fi）标准，两者均为IEEE802系列的核心标准。" },
    { text: "在早期的联机终端系统中，主机需要处理所有终端的请求，因此主机负担很重。", answer: "正确", 解析: "早期联机终端系统中，所有终端本身不具备独立处理能力，数据的处理、存储和计算全部由中心主机集中完成，主机需同时处理所有终端的输入输出和运算请求，负载极重。" },
    { text: "中国第一封电子邮件发出于1990年，标志着中国开始探索Internet的应用。", answer: "错误", 解析: "中国第一封电子邮件发出于1987年9月20日，由钱天白教授从北京发出，内容为\"Across the Great Wall we can reach every corner in the world\"（越过长城，走向世界），而非1990年。" },
    { text: "D类IP地址（224.0.0.0-239.255.255.255）用于组播通信，E类地址（240.0.0.0-255.255.255.255）保留用于实验。", answer: "正确", 解析: "D类IP地址（224.0.0.0~239.255.255.255）用于IP组播（Multicast），不区分网络号和主机号。E类地址（240.0.0.0~255.255.255.255）为IETF保留地址，用于实验和研究用途，不分配给常规网络。" },
    { text: "集线器所有端口共享带宽，属于冲突域。交换机每个端口独立带宽，隔离冲突域，但所有端口仍属于同一广播域（除非划分VLAN）。", answer: "正确", 解析: "集线器（Hub）工作在物理层，所有端口共享带宽，属于同一冲突域。交换机工作在数据链路层，每个端口独立带宽，可隔离冲突域，但所有端口默认属于同一广播域（划分VLAN可隔离广播域）。" },
    { text: "DHCP客户端使用端口68，服务器使用端口67。", answer: "正确", 解析: "DHCP协议使用UDP传输：客户端使用端口68发送请求，服务器使用端口67监听和响应。客户端初始无IP地址时，以0.0.0.0:68广播发送DHCP Discover，服务器以255.255.255.255:67或单播回复。" },
    { text: "使用邮件客户端（如Outlook、Foxmail）时，需要配置SMTP服务器地址用于发信，POP3或IMAP服务器地址用于收信。", answer: "正确", 解析: "邮件客户端配置需要：SMTP服务器（发信，端口25/465/587）、POP3服务器（收信，端口110/995，下载到本地）或IMAP服务器（收信，端口143/993，邮件保留在服务器，支持多设备同步）。" },
    { text: "广域网通常租用专线，通过IMP和线路连接起来构成网状结构。", answer: "正确", 解析: "广域网（WAN）覆盖范围广，通常租用电信运营商专线，通过IMP（接口报文处理机，即路由器/交换节点）和通信线路连接，构成网状拓扑结构，实现远距离网络互联。" },
    { text: "信源编码通过压缩冗余提高传输效率，信道编码通过添加冗余提高抗干扰能力。", answer: "正确", 解析: "信源编码的目的是去除数据中的冗余信息（压缩）以提高传输效率；信道编码则是主动添加冗余位（如校验码、纠错码）来增强抗干扰和纠错能力，二者目的相反但互补。" },
    { text: "FTP协议既可用于文件上传也可用于文件下载。", answer: "正确", 解析: "FTP（文件传输协议）支持双向文件传输：用户可以从服务器下载文件到本地，也可以从本地上传文件到服务器，是完整的文件传输解决方案。使用端口21（控制）和20（数据）。" },
    { text: "虚拟桌面技术允许用户通过任何设备、在任何地点、任何时间访问个人的桌面系统。", answer: "正确", 解析: "虚拟桌面基础架构（VDI）将桌面操作系统和应用程序托管在数据中心服务器上，用户可通过任何终端设备（PC、平板、手机）随时随地通过网络远程访问自己的虚拟桌面环境。" },
    { text: "端口号0~1023被称为知名端口，一般分配给常见的网络服务。", answer: "正确", 解析: "知名端口（Well-known Ports）0-1023由IANA统一分配并注册，绑定到常见网络服务，如HTTP(80)、HTTPS(443)、FTP(21)、SSH(22)、Telnet(23)、SMTP(25)、DNS(53)等。" },
    { text: "IPv6解决了IPv4地址资源即将耗尽的问题。", answer: "正确", 解析: "IPv6地址长度为128位，地址空间为2^128（约3.4×10^38），相比IPv4的32位（约43亿地址）增加了约2^96倍，从根本上解决了IPv4地址枯竭问题，为未来物联网等应用提供充足地址。" },
    { text: "OSI参考模型中，表示层主要负责路由选择。", answer: "错误", 解析: "OSI中路由选择是网络层（第3层）的主要功能。表示层（第6层）负责数据格式转换（如编码转换）、数据加密/解密、数据压缩与解压缩，确保应用层数据能被对端正确理解。" },
