    { text: "打印服务器是监管打印队列和打印机的设备。", answer: "正确", 解析: "打印服务器是网络共享打印的核心设备，负责接收客户端打印请求、管理打印队列（排队、优先级、暂停/取消）、调度打印作业并将任务分配给对应打印机。" },
    { text: "ARPANET是互联网的前身，最早使用了分组交换技术。", answer: "正确", 解析: "ARPANET由美国国防部高级研究计划局（ARPA）于1969年建立，是全球首个采用分组交换技术的计算机网络，是Internet的前身，奠定了TCP/IP协议的基础。" },
    { text: "nslookup命令只能用于正向解析（域名到IP），不能用于反向解析。", answer: "错误", 解析: "nslookup命令既支持正向解析（域名→IP地址），也支持反向解析（IP地址→域名）。可通过set type=ptr或直接输入IP地址进行反向DNS查询，是功能全面的DNS诊断工具。" },
    { text: "ADSL接入不影响同时使用电话。", answer: "正确", 解析: "ADSL通过分离器将语音信号（低频，0-4kHz）和数据信号（高频，25kHz以上）在频分复用下分开传输，在同一根电话线上实现上网和打电话同时进行且互不干扰。" },
    { text: "在vi的一般模式下，可以输入和修改文本内容。", answer: "错误", 解析: "vi的一般模式（Normal模式/命令模式）只能执行光标移动、删除、复制粘贴、查找等编辑操作，不能直接输入文本。必须按i/a/o等键进入插入模式（Insert模式）后才能输入和修改文本内容。" },
    { text: "DTE和DCE通过串行端口连接时，DTE通常是孔头（母头），DCE是针头（公头）。", answer: "错误", 解析: "DTE（数据终端设备，如计算机）通常使用针头（公头/DB-9 Male），DCE（数据通信设备，如Modem）通常使用孔头（母头/DB-9 Female）。题干将两者的连接器性别说反了。" },
    { text: "traceroute命令通过发送TTL=1,2,3...的IP包，依次获取沿途路由器的响应，从而显示路径。", answer: "正确", 解析: "traceroute（Windows中为tracert）利用IP首部的TTL字段：依次发送TTL=1,2,3...的数据包，每经过一跳路由器TTL减1，当TTL=0时路由器返回ICMP超时报文，从而逐跳追踪到达目标经过的路径。" },
    { text: "vi编辑器只能在图形界面下启动。", answer: "错误", 解析: "vi是Linux/Unix系统中经典的全屏文本编辑器，既可以在图形界面的终端模拟器中运行，也能在纯命令行界面（tty终端、SSH会话）下正常使用，是最通用的编辑工具之一。" },
    { text: "CentOS在本地为用户提供了6个tty虚拟终端，编号为tty1~tty6。", answer: "正确", 解析: "CentOS等Linux发行版默认提供6个字符界面的虚拟终端（tty1~tty6），用户可通过Ctrl+Alt+F1~F6切换。tty7通常预留给图形界面（X Window），Ctrl+Alt+F7返回图形界面。" },
    { text: "云存储服务只能通过网页访问，不能通过客户端。", answer: "错误", 解析: "云存储服务（如百度网盘、OneDrive、Dropbox）提供多种访问方式：网页版、PC客户端（支持同步盘功能）、移动App等。客户端通常提供更丰富的功能（如自动同步、断点续传）。" },
    { text: "服务器负载（Load Average）持续过高，通常表示CPU、内存或I/O资源存在瓶颈。", answer: "正确", 解析: "Load Average是系统负载平均值（1/5/15分钟），反映等待CPU、等待磁盘I/O或处于不可中断状态的进程数量。持续高于CPU核心数通常表示系统存在CPU、内存（换页）或磁盘I/O瓶颈。" },
    { text: "SELinux的enforcing模式会阻止违反策略的操作并记录日志。", answer: "正确", 解析: "SELinux有三种模式：Enforcing（强制执行模式，阻止违反安全策略的操作并记录审计日志）、Permissive（宽容模式，仅记录不阻止，用于调试）、Disabled（禁用SELinux）。Enforcing安全性最高。" },
    { text: "在vi编辑器中，命令模式用于保存、退出等操作，其中:w保存，:q退出，:wq保存并退出，:q!强制退出不保存。", answer: "正确", 解析: "vi的末行模式（命令行模式）中输入:w保存文件、:q退出、:wq保存并退出、:q!强制不保存退出、:wq!强制保存并退出。这些是vi最基本的文件操作命令。" },
    { text: "蜂窝状拓扑结构的安装就是发射站的安装，工作站可以随处移动。", answer: "正确", 解析: "蜂窝状拓扑用于无线网络，核心是安装基站（发射站/AP），每个基站覆盖六边形蜂窝区域。工作站在蜂窝覆盖范围内可自由移动并通过漫游切换保持连接，安装灵活便捷。" },
    { text: "解调是将数字信号转换为模拟信号的过程。", answer: "错误", 解析: "解调（Demodulation）是将模拟信号恢复为数字信号的过程。将数字信号转换为模拟信号的过程称为调制（Modulation）。题干将调制和解调的概念完全弄反了。" },
    { text: "在分配网络地址时，A类网络地址可以再分成B类IP地址。", answer: "错误", 解析: "A类网络地址不能重新划分为B类地址。A/B/C类地址分类是根据第一个字节的前几位固定区分的（A类0xxx，B类10xx，C类110x），这是IP地址类别决定的，不可交叉转换。但可以通过子网划分将A类网络细分为更小子网。" },
    { text: "子网掩码配置错误会导致设备无法判断目标主机是否在同一子网。", answer: "正确", 解析: "子网掩码用于区分IP地址中的网络位和主机位。若子网掩码配置错误，设备将无法正确判断目标IP是否与自己在同一子网，导致数据包走错路由（应直连的走了网关，或应走网关的尝试直连），造成通信故障。" },
    { text: "云存储的同步功能可以实现本地文件夹与云端文件夹的实时同步。", answer: "正确", 解析: "云存储同步盘功能通过客户端监控本地文件夹变化，自动将新增/修改/删除的文件同步到云端，同时也将云端变更同步到本地，实现本地与云端文件夹的双向实时同步。" },
    { text: "IPv6地址中，双冒号\"::\"可以在一个地址中出现多次。", answer: "错误", 解析: "IPv6地址简化规则中双冒号\"::\"只能使用一次，用于替代连续多组全零段。若使用多次则无法唯一确定被省略的零组数量，导致地址歧义。例如2001::1::2无法确定原始地址。" },
    { text: "在Linux系统中，ifconfig命令默认已安装且所有发行版都包含。", answer: "错误", 解析: "ifconfig属于net-tools工具包，现代Linux发行版（如CentOS 7+、Ubuntu 18+）默认不再预装net-tools，而是使用iproute2工具包中的ip命令替代（如ip addr、ip link）。安装net-tools后才可用ifconfig。" },
    { text: "执行命令shutdown -c可以取消已计划的关机。", answer: "正确", 解析: "Linux中shutdown -c（cancel）命令可以取消之前通过shutdown命令（如shutdown -h +30）计划的关机或重启操作，前提是在计划执行时间之前执行此命令。" },
    { text: "服务器可以随时直接关闭电源而不影响系统。", answer: "错误", 解析: "直接关闭服务器电源可能导致数据丢失（内存缓存未写入磁盘）、文件系统损坏、数据库异常和服务异常中断。应通过shutdown命令或操作系统正常关机流程，确保数据安全写入磁盘后再关闭电源。" },
    { text: "vi中命令模式与插入模式之间可以直接切换。", answer: "错误", 解析: "vi的工作模式切换路径：一般模式↔插入模式（i/a/o进入，Esc退出）、一般模式↔末行模式（: / ?进入，执行后或Esc返回）。插入模式和末行模式之间不能直接切换，必须以一般模式作为中转。" },
    { text: "在Linux系统中，只有文件的所有者和root用户才能修改文件权限。", answer: "正确", 解析: "Linux文件权限管理中，只有文件的所有者（owner）和root超级用户拥有修改文件权限的权限（使用chmod命令）。同组用户和其他用户即使有读写权限，也无权修改文件权限位。" },
    { text: "在vi的一般模式下，输入/word可以向后查找\"word\"，输入?word可以向前查找\"word\"。", answer: "正确", 解析: "vi一般模式下/word从光标位置向文件末尾方向（向后）搜索指定字符串，?word从光标位置向文件开头方向（向前）搜索。按n继续查找下一匹配，按N反向查找。" },
    { text: "对等式网络适用于小型局域网，成本低但无集中管理功能；工作站/服务器网络适用于大中型网络，需要专用服务器。", answer: "正确", 解析: "对等式网络（Peer-to-Peer）无专用服务器，每台计算机地位平等，结构简单成本低，适合家庭和小型办公室。客户机/服务器网络有专用服务器提供集中资源管理和安全控制，适合大中型企业网络。" },
    { text: "TCP/IP四层模型中，网络接口层对应OSI物理层和数据链路层，网络层对应OSI网络层，传输层对应OSI传输层，应用层对应OSI会话层、表示层、应用层。", answer: "正确", 解析: "TCP/IP四层与OSI七层对应关系：网络接口层=物理层+数据链路层；网络层=网络层；传输层=传输层；应用层=会话层+表示层+应用层。题目描述正确。" },
    { text: "在异步传输中，每个字符前加一个起始位，后加一个停止位，字符之间间隔可任意；同步传输以数据块为单位，需要时钟同步。", answer: "正确", 解析: "异步传输以字符为单位，每个字符前后添加起始位（0）和停止位（1），字符间间隔可任意，无需时钟同步，但效率较低。同步传输以数据块（帧）为单位，收发双方需时钟同步，传输效率高。" },
    { text: "在Windows系统中，将文件夹设置为共享后，该文件夹图标会出现一个手形标志。", answer: "正确", 解析: "Windows系统中将文件夹设为共享后，文件夹图标左下角会出现一个手形托举标志（共享图标），直观地表示该文件夹已被共享，网络中的其他用户可以访问。" },
    { text: "路由器不能连接不同网络，基于IP地址进行路由选择，并实现网络层协议转换。", answer: "错误", 解析: "路由器可以连接不同类型的网络（LAN、WAN等），这正是其核心功能。路由器工作在网络层，基于IP地址查询路由表进行路由选择和数据包转发，实现不同网络之间的互联。" },
    { text: "电子邮件服务只能发送文字，不能发送附件。", answer: "错误", 解析: "电子邮件通过MIME（多用途互联网邮件扩展）协议支持发送多种类型的附件，包括图片、文档（Word/PDF）、音视频文件等，也支持HTML格式的富文本邮件，并非只能发送纯文本。" },
    { text: "W3C由Web发明者Tim Berners-Lee领导，致力于制定Web标准。", answer: "正确", 解析: "W3C（万维网联盟）由Web发明者Tim Berners-Lee于1994年创立并领导，致力于制定和维护Web技术标准，包括HTML、CSS、XML、SVG、Web无障碍等核心Web规范。" },
    { text: "FTP服务支持主动模式和被动模式，主动模式中服务器主动连接客户端的数据端口，被动模式中客户端主动连接服务器。", answer: "正确", 解析: "FTP主动模式（PORT）：客户端告知服务器数据端口号，服务器从20端口主动连接客户端。被动模式（PASV）：服务器告知客户端数据端口号，客户端主动连接服务器该端口。被动模式适合客户端在防火墙后的场景。" },
    { text: "在vi中，使用dd不能删除整行，使用ndd（n为数字）可以删除从当前行开始的n行。", answer: "错误", 解析: "vi一般模式下dd命令可以删除光标所在的整行，ndd（如2dd、5dd）可删除从当前行开始的n行。题干前半句\"dd不能删除整行\"是错误的——dd本身就是删除整行的命令。" },
    { text: "UDP协议无连接、不可靠，但开销小、速度快，适合实时音视频传输和DNS查询等场景。", answer: "正确", 解析: "UDP（用户数据报协议）无连接、无确认机制、不保证可靠交付，但头部仅8字节开销小，无连接建立和确认等待时延，速度快，适合实时音视频（VoIP/直播）、DNS查询、在线游戏等对实时性要求高的场景。" },
    { text: "在Linux系统中，使用chmod 777 file命令会使所有用户对该文件拥有读、写、执行权限。", answer: "正确", 解析: "chmod 777中每位数字7=4+2+1对应rwx（读+写+执行），777表示所有者（第1位7）、组用户（第2位7）和其他用户（第3位7）均拥有读、写、执行全部权限，是最高权限设置。" },
    { text: "在打印服务器上可以取消工作站发送来的打印作业。", answer: "正确", 解析: "打印服务器拥有打印队列管理权限，管理员可以取消任何工作站发送来的打印作业（包括正在打印和排队中的作业）。这是网络共享打印中打印服务器的基本管理功能。" },
    { text: "A类IP地址的第一个字节范围是1~126。", answer: "正确", 解析: "A类IP地址第一个字节（网络号）二进制以0开头，范围为1~126（00000001~01111110）。0.0.0.0/8保留表示本网络，127.0.0.0/8保留用于回环测试（127.0.0.1为本地回环地址）。默认子网掩码为255.0.0.0（/8）。" },
    { text: "IETF通过投票方式达成技术标准。", answer: "错误", 解析: "IETF（互联网工程任务组）不通过投票方式达成标准，而是遵循\"粗略共识和可运行代码\"（Rough Consensus and Running Code）原则。通过社区讨论、实践验证和共识达成RFC文档，注重技术实现的可行性而非形式化投票。" },
    { text: "注销操作会关闭当前用户打开的所有程序并返回到登录界面。", answer: "正确", 解析: "注销（Logout/Sign out）操作会结束当前用户会话，关闭该用户所有正在运行的应用程序和后台进程，释放用户占用的系统资源，然后返回到系统登录界面，等待其他用户登录或同一用户重新登录。" },
    { text: "IANA只负责IP地址的分配，不涉及域名管理。", answer: "错误", 解析: "IANA（互联网号码分配机构）负责三大核心任务：①全球IP地址的分配和管理；②域名系统（DNS）根区的管理；③协议参数（如端口号、协议编号）的注册和协调。题干说\"不涉及域名管理\"是错误的。" },
    { text: "4G网络的理论下载速度可达100Mbit/s以上，5G网络的理论峰值速率可达1~120Gbit/s，时延降低至1ms左右。", answer: "正确", 解析: "4G LTE-Advanced理论下行峰值约1Gbit/s，5G（IMT-2020）理论峰值速率可达10~20Gbit/s，时延低至1ms。题干数值范围虽宽泛但整体方向正确，反映了移动通信的代际提升。" },
    { text: "微博用户不能通过关注、转发、评论和点赞等方式进行互动，信息传播速度快。", answer: "错误", 解析: "微博用户正是通过关注、转发、评论和点赞等方式进行社交互动，信息传播速度快是微博的核心特征。题干说\"不能\"与实际完全相反。" },
    { text: "FTTB是指光纤到户。", answer: "错误", 解析: "FTTB（Fiber To The Building）是光纤到楼，光纤铺设到建筑物楼道或地下室，再通过铜缆（如双绞线/VDSL）分配到各户。光纤到户的正确缩写是FTTH（Fiber To The Home），光纤直接铺设到用户家中。" },
    { text: "数字信号比模拟信号更容易受噪声干扰。", answer: "错误", 解析: "数字信号只有有限个离散值（如0和1），即使受到一定噪声干扰，仍可通过整形再生（如中继器）恢复原始信号，抗干扰能力强。模拟信号连续变化，噪声造成的波形失真难以完美恢复。因此模拟信号比数字信号更易受噪声影响。" },
    { text: "APIPA地址（169.254.x.x）是当DHCP客户端无法获取IP时自动分配的，只能与同一子网内其他APIPA地址通信。", answer: "正确", 解析: "APIPA（自动专用IP寻址）地址范围为169.254.0.0/16，当DHCP客户端无法从DHCP服务器获取IP地址时，系统自动分配一个APIPA地址，但只能与同一广播域内也使用APIPA地址的设备通信，无法访问Internet。" },
    { text: "半双工通信允许数据同时沿两个方向传输。", answer: "错误", 解析: "半双工通信允许数据在两个方向传输，但不能同时进行，同一时刻只能有一个方向传输（如对讲机）。允许同时双向传输的是全双工通信（如电话）。题干将半双工与全双工的概念混淆了。" },
    { text: "在vi中，输入:wq表示保存后退出。", answer: "正确", 解析: "vi编辑器在末行模式中输入:wq表示将当前缓冲区修改写入（write）文件并退出（quit）vi编辑器。也可以使用ZZ（在一般模式下）或:x实现同样的保存退出功能。" },
    { text: "清洁用具在网络维护中用于处理设备和器材的灰尘、污垢以及连接器件的氧化问题。", answer: "正确", 解析: "网络维护中常用清洁用具包括无水酒精、棉签、无尘布、吹气球、防静电刷等，用于清理设备灰尘、接口污垢和连接器氧化层，确保接触良好和散热正常，减少故障率。" },
    { text: "局域网中信息的传输速率通常不超过10Mbit/s。", answer: "错误", 解析: "现代局域网传输速率可达100Mbit/s~10Gbit/s，主流为千兆以太网（1000Mbps/1Gbps）和万兆以太网（10Gbps）。10Mbit/s是早期10Base-T以太网的速率，已基本被淘汰。" },
    { text: "双绞线的最大传输距离为200米。", answer: "错误", 解析: "双绞线（UTP/STP）在以太网中的标准最大传输距离为100米（328英尺），而非200米。超过100米信号会严重衰减，需使用中继器、交换机级联或光纤介质来延长传输距离。" },
    { text: "ping命令使用ICMP协议来测试主机之间的连通性。", answer: "正确", 解析: "ping命令通过发送ICMP（Internet控制报文协议）Echo Request报文到目标主机，等待目标返回ICMP Echo Reply报文，从而测试源与目标之间的网络连通性和往返时延（RTT）。" },
    { text: "网络打印机必须通过网络电缆直接连接到网络，不能通过打印服务器连接。", answer: "错误", 解析: "网络打印机既可以直接连接网络（内置网卡/无线网卡），也可以通过打印服务器连接。打印服务器的三种形式：内置（打印机自带）、外置（独立设备）和PC共享方式均可实现网络打印，不限于直接连接。" },
    { text: "对等式网络中，计算机的访问速度比较快。", answer: "错误", 解析: "对等式网络中每台计算机既要提供资源又要使用资源，访问速度取决于各计算机性能和当前负载，不一定快。且无集中管理、安全性差、不适合大规模网络。题干\"访问速度比较快\"不是对等式网络的保证特征。" },
    { text: "搜索引擎只能搜索网页，不能搜索图片和视频。", answer: "错误", 解析: "现代搜索引擎支持多种资源类型搜索，包括网页、图片、视频、新闻、地图、音乐、学术论文等。百度、Google等主流搜索引擎均提供专门的图片搜索和视频搜索功能。" },
    { text: "数据包是网络层的协议数据单元，包含源IP、目的IP和净载荷；数据帧是数据链路层的PDU，包含帧头、数据和帧尾。", answer: "正确", 解析: "网络层PDU为数据包（Packet），包含IP首部（源/目的IP地址等）和载荷。数据链路层PDU为数据帧（Frame），包含帧头（源/目的MAC地址等）、数据字段（网络层数据包）和帧尾（FCS校验序列）。" },
    { text: "集线器（Hub）属于共享式网络设备，所有端口共享带宽。", answer: "正确", 解析: "集线器工作在OSI物理层，是一种共享式网络设备，所有端口属于同一冲突域，共享背板总带宽。同一时刻只能有一个端口发送数据，其他端口处于冲突等待状态，带宽被所有端口平分。" },
    { text: "在Windows系统中，启用共享发现和文件共享后，不能在网络邻居中看到其他计算机；若要访问需要密码，可启用密码保护共享。", answer: "错误", 解析: "启用网络发现和文件共享后，是可以在网络邻居中看到同一网络中的其他计算机的。题干前半句\"不能在网络邻居中看到其他计算机\"说法错误。启用密码保护共享则可为共享资源添加访问密码验证。" },
    { text: "网桥通过学习MAC地址表，可以有选择地转发数据帧，能隔离冲突域，但不能隔离广播域。", answer: "正确", 解析: "网桥（Bridge）通过自学习建立MAC地址表，根据目的MAC地址选择性转发数据帧——只将帧发往目标所在端口，从而隔离冲突域。但广播帧（目的MAC为FF:FF:FF:FF:FF:FF）会转发到除源端口外的所有端口，因此不能隔离广播域。" },
    { text: "测试法只能用于硬件问题的诊断，不能用于软件问题。", answer: "错误", 解析: "测试法既可用于硬件问题诊断（如用测线仪测试网线通断、用光功率计测试光纤），也可用于软件问题排查（如用ping测试连通性、用nslookup诊断DNS、用traceroute追踪路由）。题干说法过于绝对。" },
    { text: "第一代计算机网络是以多个主机互联为中心的分组交换网络。", answer: "错误", 解析: "第一代计算机网络是以单个主机为中心的联机终端系统（如SAGE、SABRE），所有终端连接到一台中心主机，由主机集中处理。以多个主机互联为中心的分组交换网络属于第二代计算机网络（以ARPANET为代表）。" },
    { text: "568A标准和568B标准的线序排列完全不同。", answer: "错误", 解析: "T568A和T568B标准只有第1-2对（白绿/绿）与第3-6对（白橙/橙）两组线对调，其余第4-5对（蓝）和第7-8对（棕）线序位置相同。因此并非\"完全不同\"，只是两对线的颜色互换。" },
    { text: "百度搜索引擎已经接入了DeepSeek大模型，提供AI搜索功能，可以理解自然语言问题并生成答案。", answer: "正确", 解析: "百度搜索引擎已接入DeepSeek等大模型技术，推出AI智能搜索/问答功能，能够理解用户的自然语言问题，直接生成答案摘要并引用来源，提升了搜索效率和信息获取体验。" },
    { text: "在浏览器中下载文件时，尽量不要点击不明来源的弹窗广告下载按钮，应选择官方网站或可信的下载站点。", answer: "正确", 解析: "下载文件时应从官方网站或可信下载站点获取，避免点击不明来源的弹窗广告或虚假下载按钮，以防下载捆绑病毒、木马或恶意软件，保障计算机安全。" },
    { text: "知名端口号0-1023由IANA分配，常见服务如HTTP(8080)、HTTPS(443)、FTP(21)、SSH(22)、Telnet(23)、SMTP(25)、POP3(110)、DNS(53)、DHCP(67/68)。", answer: "错误", 解析: "该题目错误在于：HTTP的默认端口是80，不是8080。8080是HTTP常用的备用端口/代理端口。知名端口中HTTP对应80，HTTPS对应443。题干中括号标注HTTP(8080)是错误的。" },
    { text: "微博是一种微博客（Micro-blog），限制每条内容长度（如140字或更多），适合快速发布信息和进行社会讨论。", answer: "正确", 解析: "微博（Micro-blog）源于微博客概念，早期限制每条内容140字以内，现已放宽字数限制。用户可发布短文、图片和视频，通过关注、转发、评论进行快速信息传播和社会话题讨论。" },
    { text: "在百度网盘中，可以将文件或文件夹分享给好友，生成链接和提取码，并可设置有效期和访问权限（仅查看或可编辑）。", answer: "正确", 解析: "百度网盘的分享功能支持生成分享链接和提取码，可设置有效期（1天/7天/永久等）和访问权限（仅查看、可编辑、可下载等），方便用户灵活安全地与他人共享文件。" },
    { text: "IPv6地址的长度是IPv4的4倍，IPv4地址耗尽问题通过IPv6得到解决。", answer: "正确", 解析: "IPv6地址128位是IPv4地址32位的4倍（128÷32=4），地址空间从约43亿增加到约3.4×10^38（增加了2^96倍），从根本上解决了IPv4地址即将耗尽的问题。" },
    { text: "CentOS默认的Shell是bash，用户登录后执行/bin/bash，可以使用cat /etc/shells查看系统支持的所有Shell。", answer: "正确", 解析: "CentOS等主流Linux发行版默认Shell为bash（Bourne Again Shell），位于/bin/bash。用户登录时自动执行bash。/etc/shells文件列出系统中所有可用的合法Shell程序（如/bin/sh、/bin/zsh、/bin/tcsh等）。" },
    { text: "如果同一子网的两台主机配置了相同的IP地址，系统会提示\"IP地址冲突\"。", answer: "正确", 解析: "当同一局域网中两台设备配置了相同的IP地址时，操作系统会检测到ARP冲突并弹出\"IP地址冲突\"（IP Address Conflict）警告。先使用该IP的设备能正常通信，后配置的设备通常网络会受限或无法正常通信。" },
    { text: "netstat -an命令可以显示所有连接和监听端口，并以数字形式显示地址和端口，不进行域名解析。", answer: "正确", 解析: "netstat -an参数：-a显示所有连接和监听端口，-n以数字形式显示地址和端口号（不进行DNS反向解析，加快显示速度）。组合使用可快速查看系统的网络连接状态。" },
    { text: "百度搜索引擎的高级搜索语法中，site:example.com 关键词表示在指定网站内搜索，intitle:关键词表示搜索标题中包含关键词的网页。", answer: "正确", 解析: "百度/Google等搜索引擎高级语法：site:域名 限定在指定网站内搜索；intitle:关键词 搜索网页标题（title标签）中包含指定关键词的页面。两者都是常用的搜索过滤语法。" },
    { text: "搜索引擎的\"搜索工具\"功能可以按时间、文件类型等进行筛选。", answer: "正确", 解析: "搜索引擎的\"搜索工具\"（或\"高级搜索\"）功能提供多种筛选选项：按发布时间（一天内/一周内/自定义时间范围）、按文件类型（PDF/Word/PPT等）、按站点等维度过滤搜索结果。" },
    { text: "电子邮件（E-mail）不仅支持纯文本，还可以通过MIME协议发送附件（图片、文档、音视频等）及HTML格式邮件。", answer: "正确", 解析: "MIME（多用途互联网邮件扩展）扩展了电子邮件的功能，支持发送非ASCII文本内容，包括HTML格式邮件、多种附件（图片、Office文档、音视频、压缩包等），以及多语言字符编码。" },
    { text: "FTP协议有主动模式和被动模式，主动模式中服务器主动连接客户端的数据端口，被动模式中客户端主动连接服务器的数据端口。", answer: "正确", 解析: "FTP主动模式（PORT/Active）：客户端通过PORT命令告知服务器自己的数据端口，服务器从20端口主动连接客户端。被动模式（PASV/Passive）：服务器告知客户端数据端口，由客户端主动连接，适合防火墙/NAT后的客户端。" },
    { text: "网络共享打印的三种模式中，内置打印服务器（打印机自带网卡）速度最快，外置打印服务器（打印服务器盒子）次之，专用PC作打印服务器最灵活但成本高。", answer: "正确", 解析: "网络共享打印三种实现方式：①内置打印服务器（打印机集成网卡）速度最快；②外置打印服务器（独立硬件盒子）成本适中；③PC作打印服务器功能最灵活（支持复杂队列管理），但占用一台PC且需保持开机，成本最高。" },
    { text: "vi编辑器中，使用:set number不能显示行号，使用:set nonumber可以关闭行号显示。", answer: "错误", 解析: "vi编辑器中使用:set number（或:set nu）可以显示行号，:set nonumber（或:set nonu）可以关闭行号显示。题干说:set number不能显示行号是错误的——该命令就是用来显示行号的。" },
    { text: "ping命令的-t参数在Windows中表示持续ping，在Linux中表示设置TTL值，两者不同。", answer: "正确", 解析: "Windows中ping -t表示持续不断发送ping包直到用户按Ctrl+C停止。Linux中ping -t用于设置TTL（Time To Live）值（如ping -t 64），Linux持续ping默认就是一直发送（无需额外参数）。两者同名参数含义不同。" },
    { text: "客户端不能通过代理服务器访问Internet时，需要在浏览器中设置代理服务器的IP地址和端口号。", answer: "错误", 解析: "当客户端需要通过代理服务器访问Internet时，才需在浏览器中设置代理服务器地址和端口号。若\"不能通过\"代理服务器访问，则设置了代理也无法解决问题。题目逻辑矛盾，正确表达应为\"需要通过代理访问时才需设置\"。" },
    { text: "网络打印机必须通过网络电缆直接连接到网络，不能通过打印服务器连接。", answer: "错误", 解析: "网络打印机既可以直接连接网络（内置网卡或无线网卡），也可以通过打印服务器连接。打印服务器（内置/外置/PC共享）可以管理多台打印机并统一处理打印队列，是网络共享打印的重要实现方式。" },
    { text: "traceroute命令通过发送TTL=1,2,3...的IP包，依次获取沿途路由器的响应，从而显示路径。", answer: "正确", 解析: "traceroute利用IP首部TTL机制：依次发送TTL=1,2,3...的UDP或ICMP探测包，每经一跳路由器TTL减1，当TTL=0时路由器丢弃包并返回ICMP Time Exceeded报文，源主机据此逐一记录沿途各跳路由器的IP和响应时间。" },
    { text: "总线型拓扑中，如果总线两端不安装终端电阻，会造成信号反射，导致网络通信异常。", answer: "正确", 解析: "总线型拓扑中电信号到达总线末端若不吸收会产生反射（信号回弹），与后续传输信号叠加造成干扰，导致冲突检测失效和通信异常。终端电阻（终结器，通常50Ω）安装在总线两端吸收信号能量，防止反射。" },
    { text: "在处理网络故障时，通常只使用一种方法即可解决所有问题。", answer: "错误", 解析: "网络故障排查通常需要综合运用多种方法：观察法（查看指示灯）、测试法（ping/测线仪）、替换法（更换设备/线缆）、分段法（逐段排查）等。单一方法难以解决所有类型的问题，常常需要几种方法的综合运用。" },
    { text: "集线器（Hub）属于共享式网络设备，所有端口共享带宽。", answer: "正确", 解析: "集线器工作在物理层，是一种早期的共享式网络设备，所有端口共享背板带宽，属于同一冲突域。同一时刻只能有一个端口发送数据，端口越多每个端口实际可用带宽越低。" },
    { text: "报文交换采用存储-转发方式，不需要预先建立连接，但时延较大，不适合实时通信。", answer: "正确", 解析: "报文交换以整个报文为单位，无需预先建立端到端连接，各中间节点接收完整报文→存储→选择路由→转发。但存储转发引入较大时延，且需较大缓冲区，不适合实时语音/视频等对延迟敏感的应用。" },
    { text: "代理服务器可以缓存经常访问的网页，提高访问速度，并可以过滤URL和内容，充当防火墙。", answer: "正确", 解析: "代理服务器具备多重功能：①缓存热门网页内容，后续请求直接从缓存返回加速访问；②按规则过滤URL和网页内容（如屏蔽恶意网站）；③隐藏内部网络结构（NAT），充当应用层防火墙保护内网安全。" },
    { text: "局域网中信息的传输速率通常不超过10Mbit/s。", answer: "错误", 解析: "现代局域网传输速率可达100Mbit/s~10Gbit/s，主流为千兆以太网（1Gbps）和万兆以太网（10Gbps）。10Mbit/s是早期以太网速率，已被百兆和千兆全面取代。" },
    { text: "使用kill -9强制终止进程不会丢失数据，是安全的。", answer: "错误", 解析: "kill -9发送SIGKILL信号，操作系统立即强制终止进程，进程无法捕获该信号进行清理（如保存缓冲区数据、关闭文件描述符、释放资源），有丢失未保存数据的风险。应优先使用kill（SIGTERM）让进程有机会正常退出。" },
    { text: "网络维护时，只需要准备硬件工具，不需要准备软件。", answer: "错误", 解析: "网络维护需要同时准备硬件工具（测线仪、压线钳、光功率计、网线、替换设备等）和软件工具（操作系统安装盘/镜像、驱动程序、杀毒软件、网络测试工具如ping/traceroute/nslookup等），二者缺一不可。" },
    { text: "Telnet协议使用加密方式传输数据，因此比SSH更安全。", answer: "错误", 解析: "Telnet以明文方式传输所有数据（包括用户名和密码），安全性极低。SSH（Secure Shell）全程加密传输并提供身份验证，远比Telnet安全。题干说法与实际完全相反。" },
    { text: "在vi的一般模式下，可以输入和修改文本内容。", answer: "错误", 解析: "vi的一般模式（Normal/命令模式）只能执行光标移动、查找、删除、复制粘贴等操作，不能直接输入文本。必须按i（光标前插入）、a（光标后插入）、o（下一行插入）等键切换到插入模式后才能输入和修改文本。" },
    { text: "以资源子网为中心的分组交换网络是计算机网络发展中第二阶段的特征。", answer: "错误", 解析: "计算机网络第二阶段是以通信子网为中心的分组交换网络（以ARPANET为代表）。资源子网和通信子网共同构成两级结构的计算机网络。题干说\"以资源子网为中心\"是错误的，应为\"以通信子网为中心\"。" },
    { text: "在异步传输中，每个字符前加一个起始位，后加一个停止位，字符之间间隔可任意；同步传输以数据块为单位，需要时钟同步。", answer: "正确", 解析: "异步传输以字符为传输单位，每个字符前后加起始位和停止位实现字符同步，字符间间隔任意，无需全局时钟。同步传输以数据块（帧）为单位，发送方和接收方需通过时钟信号或编码实现位同步，传输效率更高。" },
    { text: "无盘工作站自身没有安装外部存储器。", answer: "正确", 解析: "无盘工作站（Diskless Workstation）没有安装硬盘等外部存储器，通过网络从服务器加载操作系统和应用程序，所有数据存储在服务器上。优点是成本低、易于管理和数据安全，但依赖网络和服务器的可靠性。" },
    { text: "防火墙只能通过硬件实现，不能通过软件实现。", answer: "错误", 解析: "防火墙的实现方式包括：纯软件防火墙（如Windows防火墙、iptables）、纯硬件防火墙（专用设备）和软硬件结合防火墙。产品可以通过软件、硬件或二者相结合的方式来实现，题干说法过于绝对。" },
    { text: "使用su命令临时提升为管理员时，需要输入当前普通用户的密码。", answer: "错误", 解析: "su（switch user）命令切换到root用户时，需要输入目标用户（即root）的密码，而非当前普通用户的密码。而sudo命令则需要输入当前用户的密码（并检查sudoers配置）。" },
    { text: "VLSM（可变长子网掩码）允许在同一网络中使用不同的子网掩码，提高IP地址利用率。", answer: "正确", 解析: "VLSM（可变长子网掩码）允许将一个主类网络划分为不同大小的子网，每个子网使用不同长度的子网掩码。相比固定长度子网划分，VLSM可按需分配IP地址，避免浪费，显著提高地址利用率。" },
    { text: "使用rpm -e命令可以升级同名软件包。", answer: "错误", 解析: "rpm -e（erase）命令用于卸载（删除）已安装的软件包。升级软件包应使用rpm -U（upgrade，升级安装，若未安装则安装）或rpm -F（freshen，仅刷新已安装的包）。题干将-e（卸载）和-U（升级）的功能混淆。" },
    { text: "IANA只负责IP地址的分配，不涉及域名管理。", answer: "错误", 解析: "IANA（互联网号码分配机构）负责三大核心任务：①域名管理（DNS根区管理）；②数字资源协调（全球IP地址和AS号码分配）；③协议分配（端口号、协议编号等）。域名管理是其最重要职责之一。" },
    { text: "打印服务器是监管打印队列和打印机的设备。", answer: "正确", 解析: "打印服务器是网络共享打印的核心管理设备，负责接收客户端提交的打印作业，管理打印队列（排队、暂停、取消、优先级），并将打印作业调度和发送给目标打印机执行。" },
    { text: "DTE和DCE通过串行端口连接时，DTE通常是孔头（母头），DCE是针头（公头）。", answer: "错误", 解析: "DTE（数据终端设备，如计算机串口/COM口）通常使用针头（公头/DB-9 Male），DCE（数据通信设备，如Modem）通常使用孔头（母头/DB-9 Female）。题干将两者的连接器性别完全说反了。" },
    { text: "使用Windows自带的Internet连接共享功能时，网关主机需要安装两块网卡。", answer: "正确", 解析: "Windows ICS（Internet连接共享）功能要求网关主机至少安装两块网卡：一块连接内部局域网（对内），一块连接Internet（对外，如连接ADSL Modem或光猫），实现NAT转换和内外网数据转发。" },
    { text: "知名端口号0-1023由IANA分配，常见服务如HTTP(8080)、HTTPS(443)、FTP(21)、SSH(22)、Telnet(23)、SMTP(25)、POP3(110)、DNS(53)、DHCP(67/68)。", answer: "错误", 解析: "该题目错误在于：HTTP的默认知名端口是80，而非8080。8080是HTTP代理或备用端口，不属于IANA分配的知名端口（0-1023）的默认服务端口。HTTPS为443、FTP为21等其余部分正确。" },
  ];
  const fillQuestions = [
    { text: "在10M以太网标准中，10Base-T使用的传输介质是______。", answer: "非屏蔽双绞线（UTP）", 解析: "10Base-T中10代表10Mbps速率，Base代表基带传输，T代表双绞线（Twisted Pair）。使用非屏蔽双绞线（UTP Cat3及以上），最大传输距离100米。" },
    { text: "子网掩码由32位二进制数组成，用连续的\"1\"和\"0\"表示，其中\"1\"对应IP地址的______部分。", answer: "网络", 解析: "子网掩码中二进制1对应IP地址的网络号部分，二进制0对应主机号部分。如255.255.255.0表示前24位为网络号，后8位为主机号。" },
    { text: "1000Base-SX标准使用的光纤是______波长光纤。", answer: "短", 解析: "1000Base-SX使用多模光纤传输短波长（850nm）信号，适用于建筑物内部短距离传输（最长550m），SX即Short Wavelength。" },
    { text: "光纤收发器（光电转换器）通常用于将双绞线的电信号转换为光纤的______信号。", answer: "光", 解析: "光纤收发器（光电转换器）实现电信号与光信号双向转换，发送端将电信号转为光信号通过光纤传输，接收端将光信号转回电信号。" },
    { text: "在EIA/TIA568A标准中，第2脚的颜色是______。", answer: "绿", 解析: "EIA/TIA 568A标准线序为：1白绿、2绿、3白橙、4蓝、5白蓝、6橙、7白棕、8棕。第2脚为绿色。" },
    { text: "调制解调器（Modem）是实现______信号与______信号之间相互转换的设备。", answer: "数字、模拟", 解析: "Modem（调制解调器）实现数字信号和模拟信号的双向转换：发送时将数字信号调制为模拟信号，接收时将模拟信号解调为数字信号。" },
    { text: "无线加密方式中，WPA-PSK/WPA2-PSK采用基于______的认证机制，适合家庭用户和小型企业。", answer: "密码", 解析: "WPA-PSK/WPA2-PSK采用基于预共享密钥（密码）的认证机制，用户输入正确密码即可连接WiFi，无需专门的认证服务器，适合家庭和小型企业使用。" },
    { text: "广域网通常由多个______组成。", answer: "局域网", 解析: "广域网（WAN）覆盖范围广，通常由多个局域网（LAN）通过通信线路和路由器互联而成，Internet就是最大的广域网。" },
    { text: "Internet资源按类型可分为文本、图片、声音、______和动画等。", answer: "视频", 解析: "Internet资源按媒体类型可分为文本、图片、声音、视频和动画等。视频是Internet上最主要的流媒体资源类型之一。" },
    { text: "压接RJ-45水晶头时，应使用______钳将金属片压入线芯，听到\"咔嗒\"声即表示到位。", answer: "压线", 解析: "制作RJ-45水晶头使用压线钳将金属片压入线芯，听到咔嗒声表示压接到位，线芯与金属片已可靠接触。" },
    { text: "环型结构可改进为______结构，以提高可靠性。", answer: "双环", 解析: "环型拓扑单点故障可致全网瘫痪。改进为双环结构后，数据可沿两个方向传输，当某节点或链路故障时可自动切换到备用环，显著提高可靠性。" },
    { text: "IPv6地址的长度是IPv4地址长度的______倍。", answer: "4", 解析: "IPv6地址128位是IPv4地址32位的4倍（128÷32=4），地址数量增加了2^96倍，从根本上解决了IPv4地址耗尽问题。" },
    { text: "信道编码通过添加______位来增强信号抗干扰能力。", answer: "冗余", 解析: "信道编码通过添加冗余位（校验位）来增强信号抗干扰能力，使接收方能检测甚至纠正传输中出现的错误。" },
    { text: "在Windows系统中，添加网络打印机时，如果打印机连接到Internet，需要在\"指定打印机\"窗口中选择______。", answer: "URL", 解析: "添加通过Internet连接的打印机时，需要在指定打印机窗口中选择URL方式，输入打印机的网络地址（如http://打印服务器/打印机名）。" },
    { text: "网关按功能可分为协议网关、应用网关和______。", answer: "安全网关", 解析: "网关按功能可分为协议网关（转换协议）、应用网关（代理特定应用）和安全网关（防火墙/VPN，提供安全过滤和访问控制）。" },
    { text: "计算机网络按分布距离可分为局域网、城域网和______。", answer: "广域网", 解析: "计算机网络按分布距离分为三类：局域网（LAN，几米至10km）、城域网（MAN，10-100km）和广域网（WAN，100km以上）。" },
    { text: "在Linux系统中，使用______命令可以显示网络接口的统计信息。", answer: "ifconfig", 解析: "Linux中ifconfig命令用于显示和配置网络接口参数，包括IP地址、子网掩码、MAC地址、收发数据包等统计信息。较新的发行版推荐使用ip命令替代。" },
    { text: "构成计算机网络必须具备的三个要素是：至少两台计算机互联、通信设备与传输介质、______。", answer: "网络软件、通信协议和网络操作系统", 解析: "计算机网络的三大基本要素是：多台计算机系统互联、通信设备和传输介质、以及网络软件和通信协议（如TCP/IP协议簇和网络操作系统）。" },
    { text: "IP地址由两部分组成：网络部分和______。", answer: "主机部分", 解析: "IP地址由网络号（Network ID）和主机号（Host ID）两部分组成。网络号标识所属网络，主机号标识该网络内的具体设备。" },
    { text: "典型的电路交换系统是______。", answer: "电话系统", 解析: "电路交换在通信前建立专用物理通路，通信期间独占线路资源。传统电话系统是电路交换的典型代表，通话期间独占一条线路。" },
    { text: "ping命令发送ICMP Echo Request报文，如果收到Echo Reply，表示目标主机______。", answer: "可达/连通", 解析: "ping命令通过ICMP回显请求（Echo Request）测试网络连通性，收到回显应答（Echo Reply）表示目标主机可达、网络连通正常。" },
    { text: "数字信号编码中，添加______校验码、循环冗余校验码等可增强抗干扰能力。", answer: "奇偶", 解析: "数字信号编码中常用奇偶校验码和循环冗余校验码（CRC）来增强抗干扰能力，使接收方能检测传输过程中出现的差错。" },
    { text: "星型结构中，中心设备与节点之间的连线长度不应超过______米。", answer: "100", 解析: "星型拓扑中中心设备与节点间的双绞线连线长度通常不超过100米（以太网UTP规范限制）。超过此距离需使用中继器或光纤。" },
    { text: "IEEE802委员会成立于______年。", answer: "1980", 解析: "IEEE802委员会成立于1980年2月，专门负责制定局域网（LAN）和城域网（MAN）的技术标准，如802.3以太网、802.11无线局域网等。" },
    { text: "电子邮件系统中，用于发送邮件的协议是______。", answer: "SMTP", 解析: "SMTP（Simple Mail Transfer Protocol，简单邮件传输协议）默认端口25，是负责将邮件从发件人客户端发送到邮件服务器的标准协议。" },
    { text: "网络协议端口号是TCP/IP协议中标识主机上特定通信进程的______位无符号整数。", answer: "16", 解析: "TCP/UDP端口号是16位无符号整数（2^16=65536），取值范围0-65535。0-1023为知名端口，1024-49151为注册端口，49152-65535为动态/私有端口。" },
    { text: "远程登录服务中，提供加密安全连接的是______协议。", answer: "SSH", 解析: "SSH（Secure Shell，安全外壳协议）默认端口22，通过加密技术提供安全的远程登录会话和数据传输通道，替代了不安全的Telnet。" },
    { text: "中国发出的第一封电子邮件是在______年。", answer: "1987", 解析: "中国第一封电子邮件于1987年9月20日发出，内容为\"越过长城，走向世界\"（Across the Great Wall we can reach every corner in the world）。" },
    { text: "执行命令______可以查看本机的主机名。", answer: "hostname", 解析: "hostname命令用于显示或设置当前系统的主机名。直接执行hostname显示主机名，hostname 新名称可临时修改（永久修改需写入配置文件）。" },
    { text: "总线型拓扑结构中，使用的传输介质通常是______。", answer: "同轴电缆", 解析: "总线型拓扑结构中最常用的传输介质是同轴电缆，所有节点通过T型连接器并联到同一总线上，总线两端需安装终端电阻防止信号反射。" },
    { text: "Internet具有全球信息浏览、检索交互方便快捷、灵活多样的接入方式、集工作娱乐生活为一体和______等特点。", answer: "资源共享", 解析: "Internet的特点包括：全球信息浏览、检索交互方便快捷、灵活多样的接入方式、集工作娱乐生活为一体和资源共享等。" },
    { text: "网卡（NIC）的中文全称是______。", answer: "网络接口卡", 解析: "网卡（NIC，Network Interface Card）的中文全称是网络接口卡，是计算机连接网络的接口设备，负责数据的封装、发送和接收。" },
    { text: "光纤调制解调器俗称______。", answer: "光猫", 解析: "光纤调制解调器（ONU/ONT）俗称\"光猫\"，是光纤接入网络的用户端设备，完成光信号与电信号之间的转换。" },
    { text: "工作站/服务器网络中，至少有一台计算机作为______为其他工作站提供资源。", answer: "服务器", 解析: "工作站/服务器网络中，至少有一台计算机作为服务器（Server），专门为网络中的其他工作站（Client）提供文件共享、打印共享、数据库等服务。" },
    { text: "在OSI参考模型中，应用层为应用软件提供服务，如文件服务器、数据库服务、______等。", answer: "电子邮件", 解析: "OSI应用层直接为应用软件提供网络服务接口，常见服务包括文件服务器（FTP/NFS）、数据库服务、电子邮件（SMTP/POP3）、Web服务（HTTP）等。" },
    { text: "中继器的作用是______、放大和转发信号。", answer: "整形", 解析: "中继器工作在OSI物理层，对衰减和失真的信号进行整形（再生）、放大和转发，从而延长网络传输距离。" },
    { text: "校线器（测线仪）由______部件和______部件两部分组成。", answer: "发送、接收", 解析: "校线器（测线仪）由发送器和接收器两部分组成。发送器接入双绞线一端发送信号，接收器在另一端接收信号，通过LED指示灯判断每根线的通断和线序。" },
    { text: "在Internet上实现共享打印时，需要在服务器上安装并配置______服务。", answer: "打印", 解析: "网络共享打印需要在打印服务器上安装并配置打印服务，允许多个用户通过网络使用同一台打印机，降低硬件成本。" },
    { text: "使用搜索引擎时，将关键词用______括起来可以实现精确匹配。", answer: "双引号", 解析: "搜索引擎中将关键词用双引号括起来（如\"计算机网络\"）可进行精确匹配搜索，只返回包含该完整短语的页面，提高搜索精确度。" },
    { text: "无盘工作站通过网卡上的______与服务器连接实现远程启动。", answer: "自启动芯片", 解析: "无盘工作站没有本地硬盘，通过网卡上集成的自启动芯片（Boot ROM/PXE芯片）在开机时从网络服务器远程加载操作系统，实现远程启动。" },
    { text: "在配置宽带路由器时，PPPoE用户需要输入______和密码。", answer: "用户名", 解析: "配置宽带路由器PPPoE拨号时，WAN口连接类型选择PPPoE后，需要输入ISP提供的用户名（账号）和密码，点击连接即可拨号上网。" },
    { text: "在Windows系统中，安装本地打印机后，需要将打印机______才能让其他用户共享使用。", answer: "共享", 解析: "在Windows中安装本地打印机后，需右键打印机→属性→共享选项卡→勾选\"共享这台打印机\"，设置共享名后其他用户才能访问。" },
    { text: "测试网络连通性最常用的命令是______。", answer: "ping", 解析: "ping是最常用的网络连通性测试命令，使用ICMP协议发送Echo Request报文到目标主机，收到Echo Reply即表示网络可达。" },
    { text: "中国参加ISO的国家机构是______。", answer: "国家标准化管理委员会", 解析: "中国参加ISO的国家机构是国家标准化管理委员会（SAC），代表中国参与国际标准化组织的各项工作和标准制定。" },
    { text: "局域网中，工作站是一台______，可以有自己的操作系统，能独立工作。", answer: "计算机", 解析: "局域网中工作站是一台完整的计算机，有自己的操作系统（如Windows/Linux）、CPU、内存和本地存储，可独立运行应用程序，同时也能访问网络共享资源。" },
    { text: "云存储的英文缩写是______（常见）。", answer: "NAS", 解析: "NAS（Network Attached Storage，网络附加存储）是常见的企业/家庭云存储设备，通过网络提供集中式文件存储和共享服务。" },
    { text: "百度网盘的同步功能需要用户在客户端设置______目录。", answer: "同步", 解析: "使用百度网盘同步功能时，需要在客户端设置同步目录（本地文件夹），该目录中的文件变更会自动与云端双向同步。" },
    { text: "TCP协议是______连接的、可靠的传输层协议。", answer: "面向", 解析: "TCP提供面向连接的可靠传输（通过三次握手建立连接，确认、重传、排序机制保证可靠性）；UDP提供无连接、不可靠的传输服务，但开销小、速度快。" },
    { text: "回环地址______用于测试本地网络环路。", answer: "127.0.0.1", 解析: "127.0.0.1是回环测试地址（Loopback），数据包发送后不经过物理网卡，在TCP/IP协议栈内部返回。用于测试本机TCP/IP协议安装是否正常。" },
    { text: "虚拟桌面整体架构分为4层：终端接入层、接入网络层、桌面管理层和______。", answer: "资源池层", 解析: "虚拟桌面架构（VDI）分为四层：终端接入层（用户设备）、接入网络层（网络连接）、桌面管理层（桌面调度分配）和资源池层（服务器虚拟化资源统一管理调度）。" },
    { text: "IEEE802标准把数据链路层分成了两个子层，即逻辑链路控制层（LLC）和______。", answer: "介质访问控制层（MAC）", 解析: "IEEE802标准将数据链路层分为LLC（逻辑链路控制）和MAC（介质访问控制）两个子层。LLC负责与上层协议交互，MAC负责介质访问控制和物理寻址。" },
    { text: "光纤按传输模式分为单模光纤和______。", answer: "多模光纤", 解析: "光纤按传输模式分为单模光纤（SMF，芯径8-10μm，使用激光源，远距离传输）和多模光纤（MMF，芯径50/62.5μm，使用LED光源，短距离传输）。" },
    { text: "微博作为一种社交媒体，其主要特点是信息______和互动。", answer: "共享", 解析: "微博作为社交媒体平台，主要特点是信息共享（用户发布内容广泛传播）和互动（评论、转发、点赞），具有实时性和裂变式传播特性。" },
    { text: "百度搜索引擎接入了______大模型技术，推出AI搜索功能。", answer: "DeepSeek", 解析: "百度搜索引擎已接入DeepSeek大模型技术，推出了AI搜索功能（AI问答），能理解自然语言问题并直接生成答案摘要。" },
    { text: "IETF通过出版高质量的技术文档（______文档）来影响互联网的设计、运行和管理。", answer: "RFC", 解析: "IETF（互联网工程任务组）通过出版高质量的技术文档——RFC（Request for Comments，征求意见稿）来影响互联网的设计、运行和管理。" },
    { text: "在百度搜索引擎中，要搜索PDF格式的文件，可以在关键词后添加______:pdf。", answer: "filetype", 解析: "搜索引擎中使用filetype:pdf语法可限定只搜索PDF格式文件。类似语法还有filetype:doc、filetype:ppt、filetype:xls等。" },
    { text: "双绞线按是否屏蔽分为STP和______。", answer: "UTP", 解析: "双绞线按是否屏蔽分为：STP（Shielded Twisted Pair，屏蔽双绞线，有金属屏蔽层抗干扰强）和UTP（Unshielded Twisted Pair，非屏蔽双绞线，成本低使用最广泛）。" },
    { text: "私有IP地址中，B类地址范围是______。", answer: "172.16.0.0~172.31.255.255", 解析: "私有IP地址也称为内网地址或局域网专用地址，仅在局域网内部使用，不可在Internet上直接路由。B类私有地址范围为172.16.0.0~172.31.255.255（172.16.0.0/12）。" },
    { text: "在Linux系统中，使用______命令可以查看文件的长格式信息（包括权限、拥有者等）。", answer: "ls -l", 解析: "ls -l命令以长格式列出文件详细信息，包括文件类型和权限（如-rw-r--r--）、链接数、拥有者、所属组、大小、修改日期和文件名。" },
    { text: "在分组交换技术中，有两种主要的方式：虚电路分组交换和______。", answer: "数据报分组交换", 解析: "分组交换技术分为虚电路分组交换（先建立逻辑连接再传输，如X.25、帧中继）和数据报分组交换（每个分组独立路由，如IP网络），前者有序可靠，后者灵活高效。" },
    { text: "TCP/IP协议簇中，______协议负责将IP地址转换为MAC地址。", answer: "ARP", 解析: "ARP（Address Resolution Protocol，地址解析协议）负责将目标IP地址解析为对应的MAC地址，是局域网通信中不可或缺的协议。" },
    { text: "计算机网络的发展可分为两大阶段：面向终端的网络和______的网络。", answer: "分组交换", 解析: "计算机网络的发展第二阶段是以通信子网（分组交换）为中心的网络，采用分组交换技术取代了早期的线路交换，典型代表如ARPANET。" },
    { text: "代理服务器介于浏览器和远端服务器之间，当用户通过代理服务器上网时，浏览器先向______发出请求。", answer: "代理服务器", 解析: "代理服务器作为中间人转发客户端请求：浏览器先将请求发送给代理服务器，代理服务器再转发给远端Web服务器，可用于缓存加速和访问控制。" },
    { text: "解码是编码的逆过程，接收端通过解码操作从接收到的编码信号中还原出______信息。", answer: "原始", 解析: "解码（Decoding）是编码（Encoding）的逆过程，接收端按照与编码器对应的规则将编码信号恢复为原始信息，是数字通信系统中信宿端的关键步骤。" },
    { text: "固定IP一般只有特殊的______才拥有。", answer: "服务器", 解析: "固定IP（静态IP）由管理员手动配置，长期固定不变，通常分配给服务器、网络设备等需要提供稳定服务的节点，确保客户端可通过固定地址随时访问。" },
    { text: "路由器工作在网络层，依据______表进行数据包转发，可以连接不同网络。", answer: "路由", 解析: "路由器工作在网络层（OSI第三层），依据路由表进行数据包转发决策。路由表包含目标网络、下一跳地址、出接口等信息，路由器可连接不同网络并实现网间通信。" },
    { text: "蜂窝状结构以______的位置为中心，其覆盖区域之间有少量重叠。", answer: "基站", 解析: "蜂窝状拓扑以基站（Base Station/AP）为中心，每个蜂窝覆盖一个六边形区域，相邻蜂窝间有少量重叠以保证无缝切换，通过频率复用避免同频干扰。" },
    { text: "在数据通信中，DTE是数据的______与归宿。", answer: "来源", 解析: "DTE（Data Terminal Equipment，数据终端设备）是数据的来源与归宿（源或目的地），如计算机、打印机等终端设备，产生或最终接收数据。" },
    { text: "网盘的核心功能包括数据存储、备份、共享和______。", answer: "协同编辑", 解析: "网盘（云存储）的核心功能包括数据存储、备份、共享和协同编辑。协同编辑允许多用户在线实时共同编辑同一文档（如在线文档、表格），是云存储的关键增值功能。" },
    { text: "在Windows系统中，访问共享文件夹时，按快捷键______可以调出\"运行\"窗口，输入\\\\IP地址访问。", answer: "Win+R", 解析: "Windows中按Win+R键打开\"运行\"对话框，输入\\\\后跟目标计算机的IP地址（如\\\\192.168.1.100），即可访问该计算机上的共享文件夹。" },
    { text: "当需要连接两台计算机（双机互连）时，应使用______双绞线。", answer: "交叉", 解析: "两台计算机直连（同类设备互联）必须使用交叉线，一端按T568A标准、另一端按T568B标准制作，使发送引脚与接收引脚交叉对应（1-3、2-6交叉）。" },
    { text: "有限广播地址是______，代表本网段的所有主机。", answer: "255.255.255.255", 解析: "有限广播地址（Limited Broadcast Address）为255.255.255.255，数据包发送到该地址会被广播到本网段内的所有主机，路由器不会转发该广播到其他网段。" },
    { text: "在Linux系统中，可以使用______命令查看打印机状态。", answer: "lpstat", 解析: "lpstat（line printer status）命令用于显示Linux系统中CUPS打印系统的打印机状态信息，包括打印机名称、是否就绪、打印队列中的作业等。" },
    { text: "局域网是一种结构复杂程度______的计算机网络。", answer: "较低", 解析: "局域网（LAN）覆盖范围小（几米至10km），通常局限于一个建筑物或园区内，结构复杂程度较低，组网简单，管理和维护相对容易。" },
    { text: "ADSL技术中，\"非对称\"的含义是______速率和______速率不同，下行速率高于上行速率。", answer: "上行、下行", 解析: "ADSL（非对称数字用户线路）中\"非对称\"指上行速率（用户到网络）和下行速率（网络到用户）不相同，通常下行速率（最高24Mbps）远高于上行速率（最高1-3.5Mbps），适合普通用户浏览网页、下载文件等场景。" },
    { text: "对等式网络适用于______、任务轻的局域网。", answer: "小型", 解析: "对等式网络（Peer-to-Peer）中各计算机地位平等，无专用服务器，适用于小型（计算机数量少）、任务轻的局域网，组网简单成本低但管理分散。" },
    { text: "即时通信软件的英文缩写是______。", answer: "IM", 解析: "IM（Instant Messaging，即时通信）是允许两人或多人实时收发文字消息、文件、进行音视频通话的通信软件，如微信、QQ、WhatsApp等。" },
    { text: "频分多路复用的典型例子是______。", answer: "有线电视", 解析: "频分多路复用（FDM）将信道总带宽划分为多个互不重叠的子频带，每个信号占用一个子频带同时传输。典型例子是有线电视（CATV），多套节目通过不同频段同时传输。" },
    { text: "内置打印服务器是指打印机本身带有______，可以直接接入网络。", answer: "网卡", 解析: "内置打印服务器指打印机本身集成网卡（有线/无线网络接口），可直接接入网络成为独立网络节点，无需通过计算机共享即可接受网络打印请求。" },
    { text: "宽带同轴电缆的特征阻抗为______Ω。", answer: "75", 解析: "同轴电缆按阻抗分为50Ω（用于数据通信/基带传输，如10Base-2/5）和75Ω（用于宽带传输/有线电视CATV系统）。宽带同轴电缆为75Ω。" },
    { text: "无线局域网的典型工作频段包括2.4GHz、5GHz和______GHz。", answer: "6", 解析: "无线局域网（WLAN）的典型工作频段包括2.4GHz（802.11b/g/n/ax）、5GHz（802.11a/n/ac/ax）和6GHz（Wi-Fi 6E/802.11ax扩展频段），6GHz频段信道更多干扰更少。" },
    { text: "在虚拟桌面技术中，用户能够获得完整______的使用体验。", answer: "桌面", 解析: "虚拟桌面技术（VDI）将完整的桌面操作系统运行在数据中心服务器上，用户通过瘦客户端远程访问，获得与本地桌面一致的完整桌面使用体验，包括桌面环境、应用程序和个性化设置。" },
    { text: "Internet提供的常用服务包括WWW、E-mail、FTP、IM、网盘和______。", answer: "远程登录", 解析: "Internet提供的常用服务包括WWW（网页浏览）、E-mail（电子邮件）、FTP（文件传输）、IM（即时通信）、网盘（云存储）和远程登录（Telnet/SSH）等。" },
    { text: "城域网覆盖距离通常在______之间。", answer: "10~100km", 解析: "城域网（MAN）覆盖一个城市范围（10~100km），将城市内的多个局域网互联，通常采用光纤或高速无线技术，传输速率较高。" },
    { text: "Telnet协议的默认端口号是______。", answer: "23", 解析: "Telnet是TCP/IP协议簇中的远程登录协议，以明文方式传输数据（包括用户名和密码），默认端口号为23。因安全性差已逐渐被SSH（端口22）替代。" },
    { text: "打印队列中的作业按照______顺序被送往打印机。", answer: "先进先出", 解析: "打印队列（Print Queue）按照先进先出（FIFO，First In First Out）顺序将打印作业送往打印机处理，先提交的打印任务先被打印，后续任务排队等待。" },
    { text: "配置网络接口IP地址的ifconfig命令中，netmask参数用于设置______。", answer: "子网掩码", 解析: "在Linux中使用ifconfig配置IP地址时，netmask参数用于设置子网掩码，如ifconfig eth0 192.168.1.100 netmask 255.255.255.0。" },
    { text: "制作双绞线RJ-45接头时，常用的压线工具称为______。", answer: "压线钳", 解析: "制作双绞线RJ-45接头时使用压线钳，将8根线芯按标准线序插入水晶头后，用压线钳将金属片压入线芯，确保线芯与金属片可靠接触。" },
    { text: "无线局域网最常用的标准是______。", answer: "IEEE 802.11", 解析: "无线局域网（WLAN）最常用的标准是IEEE 802.11系列（包括802.11a/b/g/n/ac/ax），也就是通常所说的Wi-Fi，由IEEE 802.11工作组制定。" },
    { text: "局域网中，计算机按作用可分为工作站和______。", answer: "服务器", 解析: "局域网中计算机按作用可分为工作站（Workstation，用户使用的普通计算机）和服务器（Server，为网络提供共享资源和服务的高性能计算机）。" },
    { text: "URL的中文全称是______。", answer: "统一资源定位符", 解析: "URL（Uniform Resource Locator，统一资源定位符）是Internet上标识资源位置的地址，格式为：协议://主机名[:端口]/路径，如https://www.example.com/index.html。" },
    { text: "局域网的特征之一是通信处理一般由______完成。", answer: "网卡", 解析: "局域网中通信处理一般由网卡（NIC）完成，网卡负责数据的封装成帧、MAC寻址、CSMA/CD或CSMA/CA介质访问控制、差错检测等链路层功能。" },
    { text: "DCE的作用是在DTE与传输线路之间进行信号转换、编码、解码以及建立、维持和释放______连接。", answer: "通信", 解析: "DCE（Data Circuit-terminating Equipment，数据电路终接设备）如调制解调器，在DTE与传输线路之间进行信号转换、编解码，并负责建立、维持和释放通信连接。" },
    { text: "同轴电缆根据阻抗不同可分为50Ω（用于数据通信）和75Ω（用于______系统）。", answer: "有线电视", 解析: "同轴电缆按特性阻抗分为50Ω（用于基带数据通信，如以太网10Base-2/5）和75Ω（用于宽带系统，如有线电视CATV），两者不能混用。" },
    { text: "IP地址中的每一个字节都为1的地址（255.255.255.255）是______地址。", answer: "广播", 解析: "IP地址255.255.255.255是有限广播地址（Limited Broadcast），每一个字节均为1（即32位全1），数据包发送到该地址会被广播到本网段内的所有主机。" },
    { text: "在Windows系统中，共享文件夹的权限有读取、更改和______。", answer: "完全控制", 解析: "Windows共享文件夹有三类权限：读取（查看文件名和内容）、更改（读取+创建/修改/删除文件）和完全控制（更改+修改权限设置），权限逐级递增。" },
    { text: "传统的电话通信信道是传输语音一级的______信道，无法直接传输计算机的数字信号。", answer: "模拟", 解析: "传统的电话通信信道是为传输语音信号设计的模拟信道（频带300-3400Hz），无法直接传输计算机的数字信号，需要调制解调器将数字信号转换为模拟信号。" },
    { text: "在Linux系统中，文件权限用字母表示时，r代表______，w代表写入，x代表执行。", answer: "读取", 解析: "Linux文件权限用字母表示：r（read，读取/查看文件内容或目录列表）、w（write，写入/修改）、x（execute，执行文件或进入目录）。三种权限可分别对拥有者、所属组和其他用户设置。" },
    { text: "按分布距离，计算机网络可分为局域网、______和广域网。", answer: "城域网", 解析: "计算机网络按分布距离从小到大分为：局域网（LAN，几米~10km）、城域网（MAN，10~100km）和广域网（WAN，100km以上，跨城市/国家/洲际）。" },
    { text: "局域网中，服务器是网络控制的______。", answer: "核心", 解析: "在工作站/服务器网络中，服务器是网络控制的核心，负责管理网络资源（文件、打印、用户认证等）、控制网络访问权限和处理工作站的服务请求。" },
    { text: "IPv6地址70e3:0000:0000:0000:1e34:59a8:90ab:def0可以简化为______。", answer: "70e3::1e34:59a8:90ab:def0", 解析: "IPv6地址简化规则：每组前导0可省略，连续多组0可用双冒号::代替（只能一次）。此地址中间四组全零可简化为70e3::1e34:59a8:90ab:def0。" },
    { text: "在Internet上下载文件时，常用的P2P下载工具有迅雷、BitComet和______。", answer: "eMule", 解析: "P2P下载的核心特点是下载者越多速度越快——每个下载者同时也在上传已下载的数据给其他用户。除迅雷、BitComet外，eMule（电骡）也是常用的P2P下载工具。" },
    { text: "通信系统主要由信源、发送设备、信道、接收设备和______5个要素组成。", answer: "信宿", 解析: "通信系统由5个基本要素组成：信源（产生信息）、发送设备（编码/调制）、信道（传输介质）、接收设备（解调/解码）和信宿（接收信息的终点）。" },
    { text: "FTP协议的数据传输通道默认使用端口______。", answer: "20", 解析: "FTP（文件传输协议）使用两个端口：控制连接使用端口21（传输命令和响应），数据传输通道默认使用端口20（传输文件数据）。主动模式下服务器从20端口发起数据连接。" },
    { text: "私有IP地址中，A类地址范围是______。", answer: "10.0.0.0~10.255.255.255", 解析: "私有IP地址仅在局域网内部使用，不可在Internet上直接路由。A类私有地址范围为10.0.0.0~10.255.255.255（10.0.0.0/8），可容纳约1677万个主机地址。" },
    { text: "下载Internet资源时，使用浏览器直接下载通常速度较慢，而使用______工具（如迅雷）可以利用P2P技术加速。", answer: "下载", 解析: "专业下载工具（如迅雷、IDM）支持多线程下载、断点续传和P2P加速技术，能从多个源同时获取文件分块，相比浏览器单线程下载速度更快更稳定。" },
    { text: "DNS服务使用的端口号是______。", answer: "53", 解析: "DNS（Domain Name System，域名系统）负责将域名解析为IP地址，同时使用TCP和UDP协议的53端口：UDP 53用于常规域名查询，TCP 53用于区域传输和大响应。" },
    { text: "网络维护的常用方法有分析观察法、故障隔离法、测试法和______。", answer: "替换法", 解析: "网络维护常用方法包括：分析观察法（查看日志和状态）、故障隔离法（逐步缩小故障范围）、测试法（使用测试命令验证）和替换法（用已知良好设备替换可疑故障设备）。" },
    { text: "SMTP协议用于______邮件。", answer: "发送", 解析: "电子邮件系统中SMTP（Simple Mail Transfer Protocol，端口25）用于发送邮件；接收邮件可使用POP3（端口110，下载到本地）或IMAP（端口143，邮件保留在服务器，支持多设备同步）。" },
    { text: "在Linux中，使用______命令可以实时监控CPU、内存和I/O，间隔时间为1秒。", answer: "top", 解析: "top命令是Linux中常用的系统监控工具，默认每3秒刷新一次，可实时显示CPU使用率、内存使用、进程列表和系统负载等动态信息。通过-d参数可设置刷新间隔。" },
    { text: "vi编辑器的3种工作模式是一般模式、插入模式和______。", answer: "末行模式", 解析: "vi编辑器有三种工作模式：一般模式（默认，用于导航和操作命令）、插入模式（按i/a/o等进入，用于文本编辑）和末行模式（按:进入，用于保存:w、退出:q、查找等命令）。" },
    { text: "EIA/TIA最著名的标准是______，它定义了商业建筑电信布线系统的规范。", answer: "EIA/TIA-568", 解析: "EIA/TIA-568是电子工业协会/电信工业协会最著名的综合布线标准，定义了商业建筑电信布线系统的规范，包括568A和568B两种RJ-45线序标准。" },
    { text: "在Linux图形用户界面中，按组合键______可以切换到命令行界面。", answer: "Ctrl+Alt+F2", 解析: "Linux系统使用虚拟控制台（tty），图形界面通常运行在tty1或tty7上。按Ctrl+Alt+F2~F6可切换到纯命令行界面的虚拟控制台，Ctrl+Alt+F1/F7返回图形界面。" },
    { text: "IPv6地址的简化规则中，每组开头的0可以省略，连续多组0可以用______代替（只能一次）。", answer: "::", 解析: "IPv6地址简化规则：①每组十六进制数开头的0可省略；②连续多组全0可用双冒号::代替，但在一个地址中只能使用一次以避免歧义。" },
    { text: "局域网从网络架构方式看，有两种类型：对等式网络和______。", answer: "工作站/服务器网络", 解析: "局域网按架构方式分为对等式网络（Peer-to-Peer，各计算机地位平等）和工作站/服务器网络（Client/Server，有专用服务器提供集中管理和资源共享）。" },
    { text: "当服务器无法通过SSH连接时，可以使用______命令检查22端口是否开放。", answer: "telnet", 解析: "当SSH无法连接时，可使用telnet命令测试目标端口连通性：telnet 目标IP 22。如果端口开放则显示连接成功，如果超时或拒绝则说明端口未开放或被防火墙阻止。" },
    { text: "清理journal日志可以使用______命令。", answer: "journalctl --vacuum", 解析: "Linux系统使用systemd-journald管理日志。journalctl --vacuum-size=或--vacuum-time=命令可清理journal日志，按大小或时间限制清理旧日志释放磁盘空间。" },
    { text: "当httpd配置文件出现语法错误时，可以使用______命令进行测试。", answer: "httpd -t", 解析: "修改Apache httpd配置文件后，在重启服务前应使用httpd -t（或apachectl configtest）命令测试配置文件语法是否正确，避免因配置错误导致服务启动失败。" },
    { text: "通信系统主要由信源、发送设备、信道、接收设备和______5个要素组成。", answer: "信宿", 解析: "通信系统由5个基本要素组成：信源（产生信息）→发送设备（编码调制）→信道（传输介质）→接收设备（解调解码）→信宿（接收信息的终点）。" },
    { text: "在OSI参考模型中，______层是计算机通信体系结构中关键的一层。", answer: "传输", 解析: "OSI传输层（第4层）是计算机通信体系结构中承上启下最关键的一层，负责端到端的可靠数据传输、流量控制和差错恢复，屏蔽下层网络差异为上层提供统一服务。" },
    { text: "某台计算机IP地址为192.168.1.100，子网掩码为255.255.255.0，默认网关为192.168.1.1，DNS为8.8.8.8。用户反馈无法访问www.baidu.com，但能ping通192.168.1.1和8.8.8.8。请写出三种可能的原因中的任意三种。", answer: "DNS配置错误；浏览器设置问题；防火墙阻止HTTP端口", 解析: "能ping通网关和DNS说明网络层连通正常。无法访问网页的可能原因包括：①DNS解析故障（可尝试nslookup验证）；②浏览器代理或缓存设置异常；③防火墙阻止HTTP/HTTPS（80/443端口）；④hosts文件被篡改。" },
    { text: "OSI参考模型的最底层是______层。", answer: "物理", 解析: "OSI参考模型从底层到高层依次为：物理层（第1层，比特流传输）→数据链路层→网络层→传输层→会话层→表示层→应用层（第7层）。物理层是最底层。" },
    { text: "在vi的一般模式下，输入______可以执行存盘操作并退出vi。", answer: ":wq", 解析: "在vi一般模式下输入:wq（write and quit）回车可保存文件并退出。其他常用退出方式：:q!（不保存强制退出）、:x（同:wq，有修改才写入）、ZZ（一般模式下Shift+zz）。" },
    { text: "光纤宽带主要采用______（无源光网络）技术架构。", answer: "PON", 解析: "光纤宽带主要采用PON（Passive Optical Network，无源光网络）技术架构，由OLT（光线路终端）、ODN（光分配网络，无源分光器）和ONU/ONT（光网络单元）组成，无需有源中继设备。" },
    { text: "公有地址由______负责分配。", answer: "IANA", 解析: "公有IP地址由IANA（Internet Assigned Numbers Authority，互联网号码分配机构）统一管理和分配，IANA将地址块分配给各区域互联网注册机构（如APNIC），再由其分配给ISP和用户。" },
    { text: "网卡的MAC地址由______位二进制数组成（通常表示为12位十六进制数）。", answer: "48", 解析: "MAC地址（物理地址/硬件地址）由48位二进制数组成，通常表示为12位十六进制数（如00:1A:2B:3C:4D:5E），前24位为厂商代码（OUI），后24位为设备序列号，全球唯一。" },
    { text: "广域网用户接入速率通常为______。", answer: "100Mbit/s~1Gbit/s", 解析: "当前广域网用户宽带接入速率通常为100Mbit/s~1Gbit/s。随着光纤到户（FTTH）普及和10G PON技术部署，千兆宽带已成为主流接入速率。" },
    { text: "子网掩码又叫网络掩码、______。", answer: "地址掩码", 解析: "子网掩码（Subnet Mask）又叫网络掩码、地址掩码，由32位二进制组成，连续1对应网络号部分，连续0对应主机号部分，用于区分IP地址的网络位和主机位。" },
    { text: "计算机网络中，终端是指一台计算机的外部设备，包括输出设备、输入设备和通信控制器，但无______和内存。", answer: "CPU", 解析: "终端（Terminal）是计算机网络中的人机交互设备，包含输入设备（键盘）、输出设备（显示器）和通信控制器，但没有CPU和内存，本身不具备数据处理能力，依赖主机进行计算。" },
    { text: "修改全局环境配置文件/etc/profile后，需要执行______命令使配置生效。", answer: "source /etc/profile", 解析: "修改/etc/profile后，新配置不会自动生效。执行source /etc/profile（或. /etc/profile）可使配置立即在当前Shell会话中生效，新登录的会话会自动读取该文件。" },
    { text: "Linux系统中，管理员root登录命令行界面后的提示符是______。", answer: "#", 解析: "Linux命令行提示符中，超级用户root的提示符以#结尾（如[root@hostname ~]#），普通用户的提示符以$结尾（如[user@hostname ~]$），用于快速区分当前用户权限。" },
    { text: "局域网英文缩写为______。", answer: "LAN", 解析: "局域网英文全称为Local Area Network，缩写为LAN，指覆盖范围在几米至10公里以内的计算机网络，通常局限于一个建筑物、办公室或校园内。" },
    { text: "CentOS默认的Shell是______。", answer: "bash", 解析: "CentOS/RHEL等Linux发行版默认Shell为bash（Bourne Again SHell），是Unix Shell的增强版本，兼容sh并增加了命令历史、命令补全、脚本编程等强大功能。" },
    { text: "执行命令______可以查看当前登录的用户信息。", answer: "who", 解析: "who命令用于显示当前登录到系统的所有用户信息，包括用户名、登录终端（tty）、登录时间和来源IP地址。类似命令还有w（更详细信息）和whoami（仅显示当前用户名）。" },
    { text: "使用______命令可以检查Linux系统中httpd服务的运行状态。", answer: "systemctl status httpd", 解析: "在使用systemd的Linux系统中，systemctl status httpd命令可查看Apache HTTP服务的运行状态（active/inactive）、进程ID、内存使用及最近的日志信息。" },
    { text: "网络维护中常用的测试命令包括ifconfig、ping、netstat和______。", answer: "traceroute", 解析: "网络维护常用测试命令包括：ifconfig/ip（查看接口配置）、ping（连通性测试）、netstat/ss（查看网络连接和端口）和traceroute（追踪路由路径，排查网络延迟和路由问题）。" },
    { text: "检查磁盘健康状态的命令是______。", answer: "fsck", 解析: "fsck（File System Check）是Linux中检查和修复文件系统的命令。在系统启动失败或磁盘异常时使用fsck扫描和修复文件系统错误，需在文件系统未挂载或只读模式下运行。" },
    { text: "IPv6地址中，连续多组0可以用______代替。", answer: "::", 解析: "IPv6地址简化规则中，连续多组全零字段可以用双冒号::代替，但整个地址中只能使用一次，以避免歧义。如0:0:0:0:0:0:0:1可简化为::1（回环地址）。" },
    { text: "若把IP地址比作主机的\"地址\"，端口号就相当于主机内不同服务的______。", answer: "门牌号", 解析: "类比：IP地址如同大楼的地址（找到哪栋楼），端口号则如同大楼内不同房间的门牌号（找到具体服务）。一台主机通过不同端口号区分同时运行的多个网络服务进程。" },
    { text: "IP协议是TCP/IP协议簇中最为核心的协议，位于TCP/IP体系中的______层。", answer: "网络", 解析: "IP协议（Internet Protocol）是TCP/IP协议簇中最核心的协议，位于TCP/IP体系中的网络层（网际层/Internet层），负责数据包的路由寻址和跨网络传输。" },
    { text: "子网划分时，向主机位借n位，可以划分出______个子网，每个子网的主机数为2^(主机位数)-2。", answer: "2^n", 解析: "子网划分时从主机位借n位作为子网位，可创建2^n个子网。每个子网可用主机数为2^(剩余主机位数)-2（减去网络地址和广播地址各一个）。" },
    { text: "在Windows系统中，要实现文件夹共享，必须在网络和共享中心中启用______发现和文件共享。", answer: "网络", 解析: "Windows文件夹共享的前提是在\"网络和共享中心\"→\"更改高级共享设置\"中启用网络发现（使计算机可被其他设备看到）和文件和打印机共享。" },
    { text: "在vi的一般模式下，按______键复制当前行，按______键粘贴。", answer: "yy、p", 解析: "vi一般模式下：yy（yank）复制当前行到缓冲区，p（paste）在光标后粘贴；dd删除当前行（剪切）；数字+yy可复制多行（如3yy复制3行）。" },
    { text: "网络打印机按实现方式分为文件服务器实现、外置打印服务器实现和______实现。", answer: "内置打印服务器", 解析: "网络打印机三种实现方式：①文件服务器实现（打印机连在服务器上共享）；②外置打印服务器实现（独立硬件连接打印机和网络）；③内置打印服务器实现（打印机本身集成网卡直接联网）。" },
    { text: "SMTP协议用于______邮件。", answer: "发送", 解析: "电子邮件系统中SMTP（Simple Mail Transfer Protocol，端口25/465/587）用于发送邮件和邮件服务器之间的邮件中继传输。收邮件使用POP3（端口110）或IMAP（端口143）。" },
    { text: "在Linux系统中，网卡ens33的配置文件路径是______。", answer: "/etc/sysconfig/network-scripts/ifcfg-ens33", 解析: "CentOS/RHEL系列系统中，网卡配置文件位于/etc/sysconfig/network-scripts/目录，命名格式为ifcfg-接口名（如ifcfg-ens33）。通过修改该文件可配置IP地址、子网掩码、网关等参数。" },
    { text: "在Windows系统中，使用______命令可以查看本机的IP地址配置。", answer: "ipconfig", 解析: "Windows中使用ipconfig命令查看IP配置（IP地址、子网掩码、默认网关）。ipconfig /all可查看更详细信息（MAC地址、DNS服务器、DHCP状态等）。对应Linux中的ifconfig或ip addr。" },
    { text: "在处理光纤故障时，需要准备红光笔、光功率计以及______套件。", answer: "光纤清洁", 解析: "光纤故障排查常用工具：红光笔（查找断点和识别光纤）、光功率计（测量光功率损耗）和光纤清洁套件（清洁光纤端面，避免灰尘导致光信号衰减），光时域反射仪（OTDR）用于精确定位故障点。" },
    { text: "访问Internet资源的工具中，浏览器用于访问______服务。", answer: "WWW", 解析: "浏览器（如Chrome、Firefox、Edge）用于访问WWW（World Wide Web，万维网）服务，通过HTTP/HTTPS协议获取网页、图片、视频等超媒体资源。" },
    { text: "私有IP地址中，A类地址范围是10.0.0.0~10.255.255.255，B类范围是______，C类范围是192.168.0.0~192.168.255.255。", answer: "172.16.0.0~172.31.255.255", 解析: "三大私有IP地址范围：A类10.0.0.0/8、B类172.16.0.0/12（172.16.0.0~172.31.255.255）、C类192.168.0.0/16。私网地址仅在局域网内使用，需NAT转换才能访问Internet。" },
    { text: "DTE的中文名称是数据终端设备，DCE的中文名称是______。", answer: "数据电路终接设备", 解析: "DCE（Data Circuit-terminating Equipment）的中文名称为数据电路终接设备，如调制解调器，在DTE（数据终端设备）与通信线路之间完成信号转换和连接控制。" },
    { text: "系统启动失败时，若/boot/vmlinuz文件丢失，可以使用命令______重新安装内核。", answer: "yum reinstall kernel", 解析: "当/boot/vmlinuz内核文件丢失导致系统无法启动时，可进入救援模式（Rescue Mode）挂载系统后执行yum reinstall kernel重新安装内核包，恢复vmlinuz和initramfs文件。" },
    { text: "在Windows系统中，tracert命令对应Linux中的______命令，用于追踪路由路径。", answer: "traceroute", 解析: "tracert（Windows）和traceroute（Linux）通过逐跳发送TTL递增的探测包追踪数据包从源到目的经过的每一跳路由器地址和延迟，用于网络路径分析和故障定位。" },
    { text: "检查DNS解析是否正常，可以使用______命令（Windows/Linux）或dig命令。", answer: "nslookup", 解析: "nslookup（Windows/Linux通用）和dig（Linux专用）是DNS诊断工具，用于查询域名解析结果、验证DNS服务器配置是否正确、排查域名无法访问的解析问题。" },
    { text: "计算机网络按分布距离，可分为______、城域网和广域网。", answer: "局域网", 解析: "计算机网络按分布距离从小到大分为三类：局域网（LAN，几米~10km）、城域网（MAN，10~100km）和广域网（WAN，100km以上）。" },
    { text: "环型结构可改进为______结构，以提高可靠性。", answer: "双环", 解析: "单环拓扑中任意节点或链路故障可致全网瘫痪。改进为双环结构后数据可在两个方向传输，故障时自动切换到备用环（自愈环），显著提高网络可靠性。" },
    { text: "制作双绞线RJ-45接头时，EIA/TIA568B线序的第1脚是______，第2脚是橙，第3脚是白绿。", answer: "白橙", 解析: "EIA/TIA 568B标准线序为：1白橙、2橙、3白绿、4蓝、5白蓝、6绿、7白棕、8棕。568A与568B的区别是1-3和2-6线对互换（白绿/绿与白橙/橙互换）。" },
    { text: "代理服务器介于浏览器和远端服务器之间，当用户通过代理服务器上网时，浏览器先向______发出请求。", answer: "代理服务器", 解析: "使用代理服务器上网时，浏览器不直接访问目标网站，而是先将HTTP请求发送给代理服务器，由代理服务器代为转发并返回结果，可隐藏用户真实IP、实现访问控制和缓存加速。" },
    { text: "Linux系统中，管理员root登录命令行界面后的提示符是______。", answer: "#", 解析: "Linux终端提示符中，root用户以#号结尾（如[root@server ~]#），普通用户以$号结尾（如[user@server ~]$），便于快速区分当前操作权限。" },
    { text: "有限广播地址是______，代表本网段的所有主机。", answer: "255.255.255.255", 解析: "有限广播地址255.255.255.255（32位全1）代表当前所在网段的所有主机，数据包不会被路由器转发到其他网段。与之对应的是直接广播地址（如192.168.1.255）。" },
    { text: "制作双绞线RJ-45接头时，常用的压线工具称为______。", answer: "压线钳", 解析: "制作双绞线RJ-45水晶头使用压线钳，具备剥线、剪线、压接三种功能。将8根线芯按标准线序排列插入水晶头后，用压线钳一次性将金属片压入线芯。" },
    { text: "IPv6地址70e3:0000:0000:0000:1e34:59a8:90ab:def0可以简化为______。", answer: "70e3::1e34:59a8:90ab:def0", 解析: "按IPv6简化规则：每组前导0可省略，连续多组全零用双冒号::代替（仅一次）。此地址中间四组全零可简化为70e3::1e34:59a8:90ab:def0。" },
    { text: "广域网用户接入速率通常为______。", answer: "100~1000Mbit/s|100~1000Mbps", 解析: "当前广域网用户宽带接入速率通常为100Mbps~1000Mbps（1Gbps）。随着光纤到户（FTTH）和10G PON技术普及，千兆宽带已成为主流。" },
    { text: "在Linux系统中，使用______命令可以显示网络接口的统计信息。", answer: "netstat -i", 解析: "netstat -i命令显示网络接口的统计信息表格，包括接口名、MTU、收发数据包数、错误包数、丢包数等。ifconfig和ip -s link也可显示接口统计信息。" },
    { text: "公有地址由______负责分配。", answer: "Inter NIC|NIC", 解析: "公有IP地址由ICANN（互联网名称与数字地址分配机构）通过IANA管理，NIC（Network Information Center，网络信息中心）/InterNIC负责具体地址分配和域名注册。" },
    { text: "局域网中，工作站是一台______，可以有自己的操作系统，能独立工作。", answer: "PC机|独立的计算机", 解析: "局域网中的工作站是一台完整的PC机/独立计算机，配备CPU、内存、硬盘和操作系统，可脱离网络独立运行应用程序，也能访问网络中的共享资源。" },
    { text: "在OSI参考模型中，______层是计算机通信体系结构中关键的一层。", answer: "传输", 解析: "OSI传输层（第4层）是计算机通信体系中承上启下最关键的一层，负责端到端可靠传输、流量控制和差错恢复，为上层屏蔽网络细节提供可靠的数据传输服务。" },
    { text: "在Windows系统中，使用______命令可以显示本机的MAC地址。", answer: "ipconfig/all|ipconfig /all", 解析: "Windows中ipconfig /all命令显示所有网络接口的详细配置信息，包括MAC地址（物理地址）、IP地址、子网掩码、DNS服务器、DHCP状态等。" },
    { text: "Telnet协议的默认端口号是______。", answer: "23", 解析: "Telnet是远程登录协议，以明文传输用户名密码和所有数据，默认端口号为23。因安全性极差，现已被加密的SSH协议（端口22）广泛替代。" },
    { text: "1000Base-SX标准使用的光纤是______波长光纤。", answer: "短", 解析: "1000Base-SX使用多模光纤传输短波长（850nm）光信号，SX即Short Wavelength。适用于建筑物内部短距离（最长220-550m）的高速千兆以太网传输。" },
    { text: "中国发出的第一封电子邮件是在______年。", answer: "1987", 解析: "1987年9月20日，钱天白教授从北京向德国卡尔斯鲁厄大学发出了中国第一封电子邮件，内容为\"Across the Great Wall we can reach every corner in the world\"（越过长城，走向世界）。" },
    { text: "虚拟桌面技术的四层架构包括终端接入层、接入网络层、桌面管理层和______。", answer: "资源池层", 解析: "虚拟桌面基础架构（VDI）分为四层：终端接入层（瘦客户端/PC）、接入网络层（网络传输）、桌面管理层（连接代理、桌面分配调度）和资源池层（服务器虚拟化资源的统一管理）。" },
    { text: "IP协议是TCP/IP协议簇中最为核心的协议，位于TCP/IP体系中的______层。", answer: "网络|网络层", 解析: "IP协议是TCP/IP协议簇的核心，位于TCP/IP体系中的网络层（网际层），负责数据包的无连接路由转发和跨网络传输，向上为TCP/UDP提供服务。" },
    { text: "网络打印机按实现方式分为文件服务器实现、外置打印服务器实现和______实现。", answer: "内置打印服务器", 解析: "网络打印机三种实现方式：文件服务器实现（打印机连在服务器通过共享提供）、外置打印服务器实现（独立硬件设备连接打印机和网络）、内置打印服务器实现（打印机自带网卡直接接入网络）。" },
    { text: "无盘工作站网络的稳定性和______都非常好。", answer: "安全性", 解析: "无盘工作站没有本地硬盘，操作系统和所有数据存储在服务器上，具有稳定性和安全性都非常好的优点——统一管理、不易感染病毒、数据集中备份方便。" },
    { text: "在电路交换中，数据传送前需要经历三个阶段：线路建立、数据传送和______。", answer: "线路拆除", 解析: "电路交换的三个阶段：线路建立（通过拨号/信令建立端到端物理连接）→数据传送（占用专用线路持续传输）→线路拆除（通信结束后释放线路资源）。典型如传统电话系统。" },
    { text: "使用______命令可以修改用户密码。", answer: "passwd", 解析: "passwd命令用于修改用户密码。普通用户执行passwd修改自己的密码（需验证旧密码），root用户执行passwd 用户名可修改任意用户密码（无需旧密码）。" },
    { text: "子网掩码由32位二进制数组成，用连续的\"1\"和\"0\"表示，其中\"1\"对应IP地址的______部分。", answer: "网络", 解析: "子网掩码中二进制1对应IP地址的网络号部分（包括子网号），0对应主机号部分。通过子网掩码与IP地址按位\"与\"运算可得出网络地址。" },
    { text: "回环测试地址127.0.0.1用于测试本机TCP/IP协议栈，数据包______（会/不会）发送到网络上。", answer: "不会", 解析: "回环地址127.0.0.1的数据包仅在本地TCP/IP协议栈内部循环返回，不经过物理网卡也不会发送到实际网络上，用于验证本机TCP/IP协议是否正确安装。" },
  ];

  function renderQuestions() {
    var container = document.getElementById('questionsContainer');
    var html = '';
    var c = 1, t = 1, f = 1;

    html += '<div class="section-title" data-section="choice"><h2>一、选择题</h2><span class="count">' + choiceQuestions.length + ' 题</span></div>';
    choiceQuestions.forEach(function(q, i) {
      html += '<div class="q-card" data-type="choice" data-q="c' + i + '" data-answer="' + q.answer.replace(/"/g, '&quot;') + '"><div class="q-header"><span class="q-num">' + (c++) + '</span><span class="q-text">' + q.text + '</span></div>';
      html += '<div class="opts-group">' + q.options.map(function(o) { return '<label><input type="radio" name="c' + i + '" value="' + o.replace(/"/g, '&quot;') + '"> ' + o + '</label>'; }).join('') + '</div>';
      html += '<div class="ans-area"><span class="ans-toggle" onclick="var n=this.nextElementSibling;n.classList.toggle(\'show\');this.textContent=n.classList.contains(\'show\')?\'隐藏答案\':\'查看答案\'">查看答案</span><div class="ans-content">' + q.answer + (q.解析 ? '<div class="ans-jiexi">' + q.解析 + '</div>' : '<div class="ans-jiexi ai-jiexi">该解析由AI生成，请注意核实。正确答案为"' + q.answer + '"。</div>') + '</div></div></div>';
    });

    html += '<div class="section-title" data-section="tf"><h2>二、判断题</h2><span class="count">' + tfQuestions.length + ' 题</span></div>';
    tfQuestions.forEach(function(q, i) {
      html += '<div class="q-card" data-type="tf" data-q="t' + i + '" data-answer="' + q.answer + '"><div class="q-header"><span class="q-num">' + (t++) + '</span><span class="q-text">' + q.text + '</span></div>';
      html += '<div class="tf-opts"><label><input type="radio" name="t' + i + '" value="正确"> 正确</label><label><input type="radio" name="t' + i + '" value="错误"> 错误</label></div>';
      html += '<div class="ans-area"><span class="ans-toggle" onclick="var n=this.nextElementSibling;n.classList.toggle(\'show\');this.textContent=n.classList.contains(\'show\')?\'隐藏答案\':\'查看答案\'">查看答案</span><div class="ans-content">' + q.answer + (q.解析 ? '<div class="ans-jiexi">' + q.解析 + '</div>' : '<div class="ans-jiexi ai-jiexi">该解析由AI生成，请注意核实。该说法' + (q.answer === '正确' ? '正确' : '错误') + '。</div>') + '</div></div></div>';
    });

    html += '<div class="section-title" data-section="fill"><h2>三、填空题</h2><span class="count">' + fillQuestions.length + ' 题</span></div>';
    fillQuestions.forEach(function(q, i) {
      html += '<div class="q-card" data-type="fill" data-q="f' + i + '" data-answer="' + q.answer.replace(/"/g, '&quot;') + '"><div class="q-header"><span class="q-num">' + (f++) + '</span><span class="q-text">' + q.text + '</span></div>';
      html += '<input class="fill-inp" placeholder="输入答案…">';
      html += '<div class="ans-area"><span class="ans-toggle" onclick="var n=this.nextElementSibling;n.classList.toggle(\'show\');this.textContent=n.classList.contains(\'show\')?\'隐藏答案\':\'查看答案\'">查看答案</span><div class="ans-content">' + q.answer + (q.解析 ? '<div class="ans-jiexi">' + q.解析 + '</div>' : '<div class="ans-jiexi ai-jiexi">该解析由AI生成，请注意核实。正确答案为"' + q.answer + '"。</div>') + '</div></div></div>';
    });

    container.innerHTML = html;
    document.getElementById('stats-bar').innerHTML =
      '<span class="stat-chip active" data-filter="all" onclick="filterQuestions(\'all\')">总计 <strong>' + (choiceQuestions.length + tfQuestions.length + fillQuestions.length) + '</strong> 题</span>' +
      '<span class="stat-chip" data-filter="choice" onclick="filterQuestions(\'choice\')">选择题 <strong>' + choiceQuestions.length + '</strong></span>' +
      '<span class="stat-chip" data-filter="tf" onclick="filterQuestions(\'tf\')">判断题 <strong>' + tfQuestions.length + '</strong></span>' +
      '<span class="stat-chip" data-filter="fill" onclick="filterQuestions(\'fill\')">填空题 <strong>' + fillQuestions.length + '</strong></span>';
  }

  window.toggleAllAnswers = function() {
    var all = document.querySelectorAll('.ans-content');
    var show = ![].every.call(all, function(a) { return a.classList.contains('show'); });
    all.forEach(function(a) { a.classList.toggle('show', show); });
    document.querySelectorAll('.ans-toggle').forEach(function(s) { s.textContent = show ? '隐藏答案' : '查看答案'; });
  };

  window.filterQuestions = function(type) {
    document.body.setAttribute('data-exam-filter', type);
    var chips = document.querySelectorAll('.stat-chip');
    chips.forEach(function(c) { c.classList.remove('active'); });
    var activeChip = document.querySelector('[data-filter="' + type + '"]');
    if (activeChip) activeChip.classList.add('active');

    var cards = document.querySelectorAll('.q-card');
    var sections = document.querySelectorAll('.section-title');
    if (type === 'all') {
      cards.forEach(function(c) { c.style.display = ''; });
      sections.forEach(function(s) { s.style.display = ''; });
    } else {
      sections.forEach(function(s) { s.style.display = (s.getAttribute('data-section') === type) ? '' : 'none'; });
      cards.forEach(function(c) {
        c.style.display = (c.getAttribute('data-type') === type) ? '' : 'none';
      });
    }
    if (document.body.classList.contains('exam-mode')) updateProgress();
  };

  window.updateProgress = function() {
    var filter = document.body.getAttribute('data-exam-filter') || 'all';
    var cards = document.querySelectorAll('.q-card');
    var done = 0, left = 0;
    cards.forEach(function(card) {
      if (card.style.display !== 'none' && card.getAttribute('data-type') !== 'fill') {
        left++;
        if (card.querySelector('input[type="radio"]:checked')) done++;
      }
    });
    document.getElementById('progDone').textContent = done;
    document.getElementById('progLeft').textContent = left;
  };

  var examMode = false;
  window.toggleExamMode = function() {
    examMode = !examMode;
    var btn = document.getElementById('exam-btn');
    if (examMode) {
      document.body.classList.add('exam-mode');
      document.body.setAttribute('data-exam-filter', 'all');
      btn.textContent = '退出考试';
      btn.style.color = '#18d1ff';
      btn.style.borderColor = '#18d1ff';
      document.querySelectorAll('.ans-content.show').forEach(function(a) { a.classList.remove('show'); });
      document.querySelectorAll('.ans-toggle').forEach(function(s) { s.textContent = '查看答案'; });
      document.querySelectorAll('.q-card').forEach(function(c) { c.classList.remove('correct', 'wrong'); });
      document.getElementById('exam-score').style.display = 'none';
      document.getElementById('exam-score').innerHTML = '';
      document.querySelectorAll('input[type="radio"]').forEach(function(r) { r.checked = false; });
      document.body.classList.remove('review-wrong');
      // activate "all" chip
      var chips = document.querySelectorAll('.stat-chip');
      chips.forEach(function(c) { c.classList.remove('active'); });
      var allChip = document.querySelector('[data-filter="all"]');
      if (allChip) allChip.classList.add('active');
      // show all cards
      document.querySelectorAll('.q-card').forEach(function(c) { c.style.display = ''; });
      document.querySelectorAll('.section-title').forEach(function(s) { s.style.display = ''; });
      // add radio change listener
      document.addEventListener('change', updateProgress);
      updateProgress();
    } else {
      document.body.classList.remove('exam-mode');
      document.body.classList.remove('review-wrong');
      btn.textContent = '考试模式';
      btn.style.color = '';
      btn.style.borderColor = '';
      document.querySelectorAll('.q-card').forEach(function(c) { c.classList.remove('correct', 'wrong'); });
      document.getElementById('exam-score').style.display = 'none';
      document.getElementById('exam-score').innerHTML = '';
      document.removeEventListener('change', updateProgress);
      document.querySelectorAll('.q-card').forEach(function(c) { c.style.display = ''; });
      document.querySelectorAll('.section-title').forEach(function(s) { s.style.display = ''; });
      // reset stat chips
      var chips = document.querySelectorAll('.stat-chip');
      chips.forEach(function(c) { c.classList.remove('active'); });
      var allChip = document.querySelector('[data-filter="all"]');
      if (allChip) allChip.classList.add('active');
    }
  };

  window.submitExam = function() {
    var total = 0, correct = 0, fillCount = 0;
    var cards = document.querySelectorAll('.q-card');
    var visibleCards = [];
    cards.forEach(function(card) {
      if (card.style.display === 'none') return;
      var type = card.getAttribute('data-type');
      var answer = card.getAttribute('data-answer');
      if (type === 'fill') { fillCount++; return; }
      total++;
      visibleCards.push(card);
      var checked = card.querySelector('input[type="radio"]:checked');
      if (checked && checked.value === answer) {
        correct++;
        card.classList.add('correct');
      } else {
        card.classList.add('wrong');
      }
    });
    // show score (excludes fills)
    var scoreHtml = '得分: ' + correct + ' / ' + total;
    if (total > 0) scoreHtml += ' (' + Math.round(correct / total * 100) + '%)';
    if (fillCount > 0) scoreHtml += '（不含填空题 ' + fillCount + ' 道）';
    scoreHtml += ' <button class="toolbar-btn" onclick="showReview()" style="font-size:0.65rem;padding:0.2rem 0.7rem;">只看错题和填空题</button>';
    var scoreEl = document.getElementById('exam-score');
    scoreEl.innerHTML = scoreHtml;
    scoreEl.style.display = 'block';
    document.removeEventListener('change', updateProgress);
    window.scrollTo({ top: document.getElementById('exam-submit').offsetTop - 100, behavior: 'smooth' });
  };

  window.showReview = function() {
    document.body.classList.add('review-wrong');
    // show all cards first, then hide correct ones
    document.querySelectorAll('.q-card').forEach(function(c) { c.style.display = ''; });
    document.querySelectorAll('.section-title').forEach(function(s) { s.style.display = ''; });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  renderQuestions();
  document.addEventListener('DOMContentLoaded', renderQuestions);

  /* ========== LOADER ========== */
  var scr = document.getElementById('loader');
  if (scr) {
    var isFromIndex = false;
    try { isFromIndex = !!sessionStorage.getItem('fromIndex'); } catch(e) {}
    try { sessionStorage.removeItem('fromIndex'); } catch(e) {}
    if (isFromIndex) {
      scr.classList.add('from-index');
      setTimeout(function(){
        scr.classList.add('done');
        setTimeout(function(){
          var pc = document.getElementById('page-content');
          if (pc) pc.classList.add('visible');
        }, 800);
      }, 600);
    } else {
      var bar = document.getElementById('loaderFill');
      var txt = document.getElementById('loaderPct');
      var p = 0;
      var t = setInterval(function(){
        p += Math.random() * 7 + 3;
        if (p >= 100) { p = 100; clearInterval(t); }
        if (bar) bar.style.width = p + '%';
        if (txt) txt.textContent = Math.floor(p) + '%';
        if (p === 100) setTimeout(function(){
          scr.classList.add('done');
          setTimeout(function(){
            var pc = document.getElementById('page-content');
            if (pc) pc.classList.add('visible');
          }, 800);
        }, 300);
      }, 50);
    }
  }

  /* ========== NAV SCROLL ========== */
  var nav = document.getElementById('nav');
  window.addEventListener('scroll', function(){ nav.classList.toggle('scrolled', window.scrollY > 50); });
</script>
</div>
</body>
