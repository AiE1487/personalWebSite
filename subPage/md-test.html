*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {

body {

#page-content { opacity: 0; transition: opacity 0.5s ease; }

/* ========== LOADING SCREEN ========== */
#loader {

  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#loader.done { opacity: 0; visibility: hidden; pointer-events: none; }
@keyframes slideUpIn { from { transform: translateY(100vh); } to { transform: translateY(0); } }
#loader.from-index { animation: slideUpIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
.loader-logo { text-align: center; }

.loader-icon img { width: 100%; height: 100%; object-fit: contain; }
.loader-logo .zh {
  font-size: 1.6rem; font-weight: 700; letter-spacing: 0.25em;
  color: #c4c2c2; line-height: 1.2;
}
.loader-logo .en {
  font-size: 0.5rem; letter-spacing: 0.5em; color: #666;
  margin-top: 0.5rem; text-transform: uppercase;
}
.loader-logo .line {
  width: 4rem; height: 1px; background: #555; margin: 0.8rem auto;
}
.loader-track {
  position: absolute; bottom: 4.5rem; left: 50%;

}
.loader-bar { width: 100%; height: 3px; background: #444; }
.loader-fill { height: 100%; background: #18d1ff; width: 0%; transition: width 0.05s linear; }
.loader-info { display: flex; justify-content: space-between; margin-top: 0.6rem; font-size: 0.55rem; letter-spacing: 0.08em; color: #777; }
.loader-info .cyan { color: #18d1ff; }
.loader-copy {

  font-size: 0.55rem; letter-spacing: 0.12em; color: #555;
}

/* ========== TOP NAVIGATION ========== */
#nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;

  transition: background 0.4s ease, box-shadow 0.4s ease;

#nav.scrolled { background: rgba(20,20,20,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.04); }

.nav-right { display: flex; align-items: center; gap: 1.5rem; }

.nav-link:hover { color: #18d1ff; }

.nav-link.back:hover { background: rgba(24,209,255,0.1); }

/* ========== LOADER ========== */
(function(){
  var scr = document.getElementById('loader');
  if (sessionStorage.getItem('fromIndex')) {
    sessionStorage.removeItem('fromIndex');
    scr.classList.add('from-index');
    setTimeout(function(){ scr.classList.add('done'); setTimeout(function(){ document.getElementById('page-content').classList.add('visible'); }, 800); }, 600);
    return;
  }
  var bar = document.getElementById('loaderFill');
  var txt = document.getElementById('loaderPct');
  var p = 0;
  var t = setInterval(function(){
    p += Math.random() * 7 + 3;
    if (p >= 100) { p = 100; clearInterval(t); }
    bar.style.width = p + '%';
    txt.textContent = Math.floor(p) + '%';
    if (p === 100) { setTimeout(function(){ scr.classList.add('done'); setTimeout(function(){ document.getElementById('page-content').classList.add('visible'); }, 800); }, 300); }
  }, 50);
})();

/* ========== SIMPLE MARKDOWN → HTML RENDERER ========== */
function renderMarkdown(src) {
  var html = src;

  // Footnotes — collect [^id]: text definitions, then replace [^id] refs
  var footnotes = {};
  html = html.replace(/^\[\^(\w+)\]: (.+)$/gm, function(m, id, text){
    footnotes[id] = text;
    return '';
  });
  // Replace inline footnote references
  html = html.replace(/\[\^(\w+)\]/g, function(m, id){
    return '<sup class="fn-ref" id="fnref:' + id + '"><a href="#fn:' + id + '">[' + id + ']</a></sup>';
  });

  // Math — block math $$...$$ and inline math $...$ (before code/inline processing)
  html = html.replace(/\$\$\n([\s\S]*?)\n\$\$/g, function(m, formula){
    return '<div class="math-block">' + escapeHtml(formula.trim()) + '</div>';
  });
  html = html.replace(/\$(.+?)\$/g, function(m, formula){
    return '<span class="math-inline">' + escapeHtml(formula) + '</span>';
  });

  // Fenced code blocks (must be before inline code)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code){
    return '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>';
  });
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headings
  html = html.replace(/^###### (.+)$/gm, '<h6>$1</h6>');
  html = html.replace(/^##### (.+)$/gm, '<h5>$1</h5>');
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Horizontal rules
  html = html.replace(/^(\*{3,}|-{3,}|_{3,})$/gm, '<hr>');
  // Bold + Italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Strikethrough
  html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');
  // Images
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  // Blockquotes — group consecutive > lines into single blockquote
  var bqLines = html.split('\n');
  var bqOut = [];
  var bqBuf = [];
  for (var i = 0; i < bqLines.length; i++) {
    var match = bqLines[i].match(/^>(?: (.+))?$/);
    if (match) {
      bqBuf.push(match[1] || '');
    } else {
      if (bqBuf.length) {
        bqOut.push('<blockquote>' + bqBuf.map(function(l){ return '<p>' + l + '</p>'; }).join('') + '</blockquote>');
        bqBuf = [];
      }
      bqOut.push(bqLines[i]);
    }
  }
  if (bqBuf.length) {
    bqOut.push('<blockquote>' + bqBuf.map(function(l){ return '<p>' + l + '</p>'; }).join('') + '</blockquote>');
  }
  html = bqOut.join('\n');
  // Ordered lists — group consecutive numbered lines into <ol>
  var olLines = html.split('\n');
  var olOut = []; var olBuf = [];
  for (var i = 0; i < olLines.length; i++) {
    var olMatch = olLines[i].match(/^\d+\. (.+)$/);
    if (olMatch) {
      olBuf.push('<li>' + olMatch[1] + '</li>');
    } else {
      if (olBuf.length) { olOut.push('<ol>' + olBuf.join('\n') + '</ol>'); olBuf = []; }
      olOut.push(olLines[i]);
    }
  }
  if (olBuf.length) olOut.push('<ol>' + olBuf.join('\n') + '</ol>');
  html = olOut.join('\n');

  // Unordered lists — group consecutive -/* lines into <ul>
  var ulLines = html.split('\n');
  var ulOut = []; var ulBuf = [];
  for (var j = 0; j < ulLines.length; j++) {
    var ulMatch = ulLines[j].match(/^[\-\*] (.+)$/);
    if (ulMatch) {
      ulBuf.push('<li>' + ulMatch[1] + '</li>');
    } else {
      if (ulBuf.length) { ulOut.push('<ul>' + ulBuf.join('\n') + '</ul>'); ulBuf = []; }
      ulOut.push(ulLines[j]);
    }
  }
  if (ulBuf.length) ulOut.push('<ul>' + ulBuf.join('\n') + '</ul>');
  html = ulOut.join('\n');
  // Checkbox lists
  html = html.replace(/<li>\[x\] (.+?)<\/li>/g, '<li><input type="checkbox" checked disabled> $1</li>');
  html = html.replace(/<li>\[ \] (.+?)<\/li>/g, '<li><input type="checkbox" disabled> $1</li>');
  // Tables
  html = html.replace(/^\|(.+)\|$/gm, function(m){
    var cells = m.split('|').filter(function(c){ return c.trim() !== ''; });
    return '<tr>' + cells.map(function(c){ return (/^[\s\-:]+$/.test(c.trim())) ? '' : '<td>' + c.trim() + '</td>'; }).join('') + '</tr>';
  });
  // Hard line break: two trailing spaces → <br>
  html = html.replace(/  \n/g, '<br>\n');

  // Wrap paragraphs
  var lines = html.split('\n');
  var out = [];
  var inTable = false;
  lines.forEach(function(line){
    if (line.indexOf('<tr>') === 0) {
      if (!inTable) { out.push('<table>'); inTable = true; }
      if (line.indexOf('<td>') === -1) { inTable = false; out.push('</table>'); }
      else { out.push(line); return; }
    } else if (inTable) {
      if (line.indexOf('<tr>') === -1) { out.push('</table>'); inTable = false; }
    }
    out.push(line);
  });
  if (inTable) out.push('</table>');
  html = out.join('\n');
  // Paragraphs for remaining text
  html = html.replace(/^(?!<[a-z/])(.+)$/gm, function(m){
    if (m.trim() === '') return '';
    return '<p>' + m + '</p>';
  });
  // Append footnote definitions
  var fnIds = Object.keys(footnotes);
  if (fnIds.length) {
    html += '<hr><div class="footnotes"><h2>脚注 Footnotes</h2><ol>';
    fnIds.forEach(function(id){
      html += '<li id="fn:' + id + '">' + footnotes[id] + ' <a href="#fnref:' + id + '" class="fn-back">↩</a></li>';
    });
    html += '</ol></div>';
  }
  return html;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* ========== DISPLAY ========== */
document.getElementById('render').innerHTML = renderMarkdown(mdSource);
document.getElementById('raw').textContent = mdSource;

/* ========== TOGGLE VIEWS ========== */
function showRender() {
  document.getElementById('render').style.display = 'block';
  document.getElementById('raw').style.display = 'none';
  document.getElementById('btnRender').classList.add('active');
  document.getElementById('btnRaw').classList.remove('active');
}
function showRaw() {
  document.getElementById('render').style.display = 'none';
  document.getElementById('raw').style.display = 'block';
  document.getElementById('btnRaw').classList.add('active');
  document.getElementById('btnRender').classList.remove('active');
}

/* ========== COPY ========== */
function copyMarkdown() {
  navigator.clipboard.writeText(mdSource).then(function(){
    var msg = document.getElementById('copyMsg');
    msg.classList.add('show');
    setTimeout(function(){ msg.classList.remove('show'); }, 1800);
  });
}
