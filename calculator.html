<!DOCTYPE html>
<html lang="zh-cn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<link rel="icon" type="image/png" href="airesIcon.png">
<title>科学计算器 — AIRES PRIVATE</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; font-size: 16px; color-scheme: dark; scroll-behavior: smooth; }
body {
  background: #141414; color: #c4c2c2;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  width: 100%; min-height: 100vh; overflow-x: hidden; line-height: 1.7;
}
#page-content { opacity: 0; transition: opacity 0.5s ease; }
#page-content.visible { opacity: 1; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: #141414; }
::-webkit-scrollbar-thumb { background: #18d1ff; border-radius: 2px; }

#loader { position: fixed; inset: 0; z-index: 99999; background: #2a2a2a; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease, visibility 0.8s ease; }
#loader.done { opacity: 0; visibility: hidden; pointer-events: none; }
@keyframes slideUpIn { from { transform: translateY(100vh); } to { transform: translateY(0); } }
#loader.from-index { animation: slideUpIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
.loader-logo { text-align: center; }
.loader-icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; opacity: 0.85; }
.loader-icon img { width: 100%; height: 100%; object-fit: contain; }
.loader-logo .zh { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.25em; color: #c4c2c2; line-height: 1.2; }
.loader-logo .en { font-size: 0.5rem; letter-spacing: 0.5em; color: #666; margin-top: 0.5rem; text-transform: uppercase; }
.loader-logo .line { width: 4rem; height: 1px; background: #555; margin: 0.8rem auto; }
.loader-track { position: absolute; bottom: 4.5rem; left: 50%; transform: translateX(-50%); width: 55%; max-width: 520px; }
.loader-bar { width: 100%; height: 3px; background: #444; }
.loader-fill { height: 100%; background: #18d1ff; width: 0%; transition: width 0.05s linear; }
.loader-info { display: flex; justify-content: space-between; margin-top: 0.6rem; font-size: 0.55rem; letter-spacing: 0.08em; color: #777; }
.loader-info .cyan { color: #18d1ff; }
.loader-copy { position: absolute; bottom: 1.5rem; left: 2rem; font-size: 0.55rem; letter-spacing: 0.12em; color: #555; }

#nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; height: 60px; transition: background 0.4s ease; }
#nav.scrolled { background: rgba(20,20,20,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.04); }
.nav-left { display: flex; align-items: center; gap: 0.5rem; }
.nav-brand-icon { width: 24px; height: 24px; }
.nav-brand-icon img { width: 100%; height: 100%; object-fit: contain; }
.nav-brand { text-decoration: none; display: flex; align-items: center; }
.nav-brand-text { font-size: 1rem; font-weight: 700; letter-spacing: 0.2em; color: #fff; }
.nav-right { display: flex; align-items: center; }
.nav-back { font-size: 0.55rem; letter-spacing: 0.12em; color: #18d1ff; text-decoration: none; text-transform: uppercase; border: 1px solid rgba(24,209,255,0.25); padding: 0.3rem 0.8rem; transition: background 0.3s ease; }
.nav-back:hover { background: rgba(24,209,255,0.1); }

#main { max-width: 420px; margin: 0 auto; padding: 100px 2rem 4rem; }
#main h1 { font-size: 1.5rem; font-weight: 700; color: #fff; letter-spacing: 0.06em; margin-bottom: 1.5rem; text-align: center; }

.calc-display {
  background: #1e1e1e;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  padding: 1.2rem 1rem;
  margin-bottom: 1rem;
  text-align: right;
}
.calc-display .expr {
  font-size: 0.75rem;
  color: #666;
  min-height: 1.2em;
  word-break: break-all;
}
.calc-display .result {
  font-size: 2rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.04em;
  min-height: 1.3em;
  word-break: break-all;
}

.calc-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.calc-btn {
  padding: 0.9rem 0;
  font-size: 1rem;
  font-weight: 600;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px;
  background: #1e1e1e;
  color: #c4c2c2;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
}
.calc-btn:hover { background: rgba(24,209,255,0.1); border-color: rgba(24,209,255,0.3); }
.calc-btn:active { transform: scale(0.95); }
.calc-btn.op { color: #18d1ff; }
.calc-btn.eq { background: #18d1ff; color: #141414; border-color: #18d1ff; }
.calc-btn.eq:hover { background: #3ddbff; }
.calc-btn.clr { color: #ff6b6b; }
.calc-btn.fn { color: #888; font-size: 0.85rem; }
.calc-btn.wide { grid-column: span 2; }

#footer { border-top: 1px solid rgba(255,255,255,0.06); padding: 1.5rem 2rem; max-width: 420px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; font-size: 0.55rem; letter-spacing: 0.08em; color: #555; }
.footer-links { display: flex; gap: 1.5rem; }
.footer-links a { color: #555; text-decoration: none; transition: color 0.3s ease; }
.footer-links a:hover { color: #18d1ff; }

@media (max-width: 768px) {
  #nav { padding: 0 1.5rem; }
  #main { padding: 80px 1rem 3rem; }
}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">
    <div class="loader-icon"><img src="airesIcon.png" alt="AIRES"></div>
    <div class="zh">科学计算器</div>
    <div class="en">CALCULATOR</div>
    <div class="line"></div>
  </div>
  <div class="loader-track">
    <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
    <div class="loader-info">
      <span class="cyan">LOADING TOOL</span>
      <span id="loaderPct">0%</span>
    </div>
  </div>
  <div class="loader-copy">&copy; 2026 AIRES PRIVATE</div>
</div>

<div id="page-content">

<nav id="nav">
  <div class="nav-left">
    <a href="index.html" class="nav-brand"><span class="nav-brand-icon"><img src="airesIcon.png" alt="AIRES"></span></a>
    <span class="nav-brand-text">CALCULATOR</span>
  </div>
  <div class="nav-right">
    <a href="index.html" class="nav-back">← BACK</a>
  </div>
</nav>

<div id="main">
  <h1>科学计算器</h1>
  <div class="calc-display">
    <div class="expr" id="expr"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="calc-grid">
    <button class="calc-btn clr" onclick="calc.clear()">AC</button>
    <button class="calc-btn fn" onclick="calc.input('(')">(</button>
    <button class="calc-btn fn" onclick="calc.input(')')">)</button>
    <button class="calc-btn op" onclick="calc.input('/')">÷</button>

    <button class="calc-btn fn" onclick="calc.input('sin(')">sin</button>
    <button class="calc-btn" onclick="calc.input('7')">7</button>
    <button class="calc-btn" onclick="calc.input('8')">8</button>
    <button class="calc-btn" onclick="calc.input('9')">9</button>
    <button class="calc-btn op" onclick="calc.input('*')">×</button>

    <button class="calc-btn fn" onclick="calc.input('cos(')">cos</button>
    <button class="calc-btn" onclick="calc.input('4')">4</button>
    <button class="calc-btn" onclick="calc.input('5')">5</button>
    <button class="calc-btn" onclick="calc.input('6')">6</button>
    <button class="calc-btn op" onclick="calc.input('-')">−</button>

    <button class="calc-btn fn" onclick="calc.input('sqrt(')">√</button>
    <button class="calc-btn" onclick="calc.input('1')">1</button>
    <button class="calc-btn" onclick="calc.input('2')">2</button>
    <button class="calc-btn" onclick="calc.input('3')">3</button>
    <button class="calc-btn op" onclick="calc.input('+')">+</button>

    <button class="calc-btn fn" onclick="calc.input('PI')">π</button>
    <button class="calc-btn fn" onclick="calc.input('**')">^</button>
    <button class="calc-btn" onclick="calc.input('0')">0</button>
    <button class="calc-btn fn" onclick="calc.input('.')">.</button>
    <button class="calc-btn eq" onclick="calc.compute()">=</button>
  </div>
</div>

<footer id="footer">
  <span>&copy; 2026 AIRES PRIVATE WEB SITE</span>
  <div class="footer-links">
    <a href="index.html">HOME</a>
  </div>
</footer>

<script>
// Calculator engine
var calc = {
  expr: '',
  input: function(v) {
    this.expr += v;
    document.getElementById('expr').textContent = this.expr;
  },
  clear: function() {
    this.expr = '';
    document.getElementById('expr').textContent = '';
    document.getElementById('result').textContent = '0';
  },
  compute: function() {
    try {
      var e = this.expr
        .replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-')
        .replace(/PI/g, 'Math.PI').replace(/sin\(/g, 'Math.sin(')
        .replace(/cos\(/g, 'Math.cos(').replace(/sqrt\(/g, 'Math.sqrt(')
        .replace(/\^/g, '**');
      var r = eval(e);
      if (r === Infinity || isNaN(r)) throw new Error();
      document.getElementById('result').textContent = Number(r.toFixed(10));
    } catch(x) {
      document.getElementById('result').textContent = 'Error';
    }
  }
};
// Keyboard support
document.addEventListener('keydown', function(e) {
  var k = e.key;
  if (/[0-9]/.test(k)) calc.input(k);
  else if (k === '.') calc.input('.');
  else if (k === '+') calc.input('+');
  else if (k === '-') calc.input('-');
  else if (k === '*') calc.input('*');
  else if (k === '/') { e.preventDefault(); calc.input('/'); }
  else if (k === '(') calc.input('(');
  else if (k === ')') calc.input(')');
  else if (k === 'Enter' || k === '=') calc.compute();
  else if (k === 'Escape' || k === 'c') calc.clear();
  else if (k === 'Backspace') {
    calc.expr = calc.expr.slice(0, -1);
    document.getElementById('expr').textContent = calc.expr;
  }
});

(function(){
  var scr = document.getElementById('loader');
  if (sessionStorage.getItem('fromIndex')) {
    sessionStorage.removeItem('fromIndex');
    scr.classList.add('from-index');
    setTimeout(function(){ scr.classList.add('done'); setTimeout(function(){ document.getElementById('page-content').classList.add('visible'); }, 800); }, 600);
    return;
  }
  var bar = document.getElementById('loaderFill');
  var txt = document.getElementById('loaderPct');
  var p = 0;
  var t = setInterval(function(){
    p += Math.random() * 7 + 3;
    if (p >= 100) { p = 100; clearInterval(t); }
    bar.style.width = p + '%';
    txt.textContent = Math.floor(p) + '%';
    if (p === 100) setTimeout(function(){ scr.classList.add('done'); setTimeout(function(){ document.getElementById('page-content').classList.add('visible'); }, 800); }, 300);
  }, 50);
})();
var nav = document.getElementById('nav');
window.addEventListener('scroll', function(){ nav.classList.toggle('scrolled', window.scrollY > 50); });
</script>
</div>
</body>
</html>
