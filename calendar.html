<!DOCTYPE html>
<html lang="zh-cn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<link rel="icon" type="image/png" href="airesIcon.png">
<title>日历视图 — AIRES PRIVATE</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; font-size: 16px; color-scheme: dark; scroll-behavior: smooth; }
body {
  background: #141414; color: #c4c2c2;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  width: 100%; min-height: 100vh; overflow-x: hidden; line-height: 1.7;
}
#page-content { opacity: 0; transition: opacity 0.5s ease; }
#page-content.visible { opacity: 1; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: #141414; }
::-webkit-scrollbar-thumb { background: #18d1ff; border-radius: 2px; }

#loader { position: fixed; inset: 0; z-index: 99999; background: #2a2a2a; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease, visibility 0.8s ease; }
#loader.done { opacity: 0; visibility: hidden; pointer-events: none; }
@keyframes slideUpIn { from { transform: translateY(100vh); } to { transform: translateY(0); } }
#loader.from-index { animation: slideUpIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
.loader-logo { text-align: center; }
.loader-icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; opacity: 0.85; }
.loader-icon img { width: 100%; height: 100%; object-fit: contain; }
.loader-logo .zh { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.25em; color: #c4c2c2; line-height: 1.2; }
.loader-logo .en { font-size: 0.5rem; letter-spacing: 0.5em; color: #666; margin-top: 0.5rem; text-transform: uppercase; }
.loader-logo .line { width: 4rem; height: 1px; background: #555; margin: 0.8rem auto; }
.loader-track { position: absolute; bottom: 4.5rem; left: 50%; transform: translateX(-50%); width: 55%; max-width: 520px; }
.loader-bar { width: 100%; height: 3px; background: #444; }
.loader-fill { height: 100%; background: #18d1ff; width: 0%; transition: width 0.05s linear; }
.loader-info { display: flex; justify-content: space-between; margin-top: 0.6rem; font-size: 0.55rem; letter-spacing: 0.08em; color: #777; }
.loader-info .cyan { color: #18d1ff; }
.loader-copy { position: absolute; bottom: 1.5rem; left: 2rem; font-size: 0.55rem; letter-spacing: 0.12em; color: #555; }

#nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; height: 60px; transition: background 0.4s ease; }
#nav.scrolled { background: rgba(20,20,20,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.04); }
.nav-left { display: flex; align-items: center; gap: 0.5rem; }
.nav-brand-icon { width: 24px; height: 24px; }
.nav-brand-icon img { width: 100%; height: 100%; object-fit: contain; }
.nav-brand { text-decoration: none; display: flex; align-items: center; }
.nav-brand-text { font-size: 1rem; font-weight: 700; letter-spacing: 0.2em; color: #fff; }
.nav-right { display: flex; align-items: center; }
.nav-back { font-size: 0.55rem; letter-spacing: 0.12em; color: #18d1ff; text-decoration: none; text-transform: uppercase; border: 1px solid rgba(24,209,255,0.25); padding: 0.3rem 0.8rem; transition: background 0.3s ease; }
.nav-back:hover { background: rgba(24,209,255,0.1); }

#main { max-width: 500px; margin: 0 auto; padding: 100px 2rem 4rem; text-align: center; }

.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.cal-nav { background: none; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: #888; font-size: 0.85rem; padding: 0.4rem 0.8rem; cursor: pointer; transition: all 0.3s ease; font-family: inherit; }
.cal-nav:hover { border-color: #18d1ff; color: #18d1ff; }
.cal-month-year { font-size: 1.3rem; font-weight: 700; color: #fff; letter-spacing: 0.06em; }
.cal-info { font-size: 0.6rem; letter-spacing: 0.08em; color: #555; margin-bottom: 1rem; }

.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 4px; }
.cal-weekdays span { font-size: 0.6rem; letter-spacing: 0.08em; color: #555; padding: 0.5rem 0; text-transform: uppercase; }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-day {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; color: #c4c2c2; border-radius: 3px;
  background: #1e1e1e; cursor: default;
  transition: all 0.2s ease;
}
.cal-day:hover { background: rgba(24,209,255,0.08); }
.cal-day.other { color: #333; }
.cal-day.today { border: 1px solid #18d1ff; color: #18d1ff; font-weight: 700; }
.cal-day.holiday { color: #ff6b6b; font-weight: 600; position: relative; }
.cal-day.holiday::after { content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #ff6b6b; border-radius: 50%; }
.cal-day.today.holiday { border-color: #ff6b6b; color: #ff6b6b; }
.cal-holidays { margin-top: 1.5rem; text-align: left; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 1rem; }
.cal-holidays .holiday-title { font-size: 0.6rem; letter-spacing: 0.1em; color: #555; text-transform: uppercase; margin-bottom: 0.5rem; text-align: center; }
.cal-holidays .holiday-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0; font-size: 0.75rem; color: #888; border-bottom: 1px solid rgba(255,255,255,0.02); }
.cal-holidays .holiday-item:last-child { border-bottom: none; }
.cal-holidays .holiday-date { font-family: 'Courier New', monospace; font-size: 0.65rem; color: #ff6b6b; min-width: 3em; }
.cal-holidays .holiday-name { color: #c4c2c2; }
.cal-holidays .empty { text-align: center; color: #444; font-size: 0.7rem; }

#footer { border-top: 1px solid rgba(255,255,255,0.06); padding: 1.5rem 2rem; max-width: 500px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; font-size: 0.55rem; letter-spacing: 0.08em; color: #555; }
.footer-links { display: flex; gap: 1.5rem; }
.footer-links a { color: #555; text-decoration: none; transition: color 0.3s ease; }
.footer-links a:hover { color: #18d1ff; }

@media (max-width: 768px) {
  #nav { padding: 0 1.5rem; }
  #main { padding: 80px 1rem 3rem; }
}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">
    <div class="loader-icon"><img src="airesIcon.png" alt="AIRES"></div>
    <div class="zh">日历视图</div>
    <div class="en">CALENDAR</div>
    <div class="line"></div>
  </div>
  <div class="loader-track">
    <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
    <div class="loader-info">
      <span class="cyan">LOADING TOOL</span>
      <span id="loaderPct">0%</span>
    </div>
  </div>
  <div class="loader-copy">&copy; 2026 AIRES PRIVATE</div>
</div>

<div id="page-content">

<nav id="nav">
  <div class="nav-left">
    <a href="index.html" class="nav-brand"><span class="nav-brand-icon"><img src="airesIcon.png" alt="AIRES"></span></a>
    <span class="nav-brand-text">CALENDAR</span>
  </div>
  <div class="nav-right">
    <a href="index.html" class="nav-back">← BACK</a>
  </div>
</nav>

<div id="main">
  <div class="cal-header">
    <button class="cal-nav" onclick="cal.prevMonth()">←</button>
    <div class="cal-month-year" id="calMonthYear"></div>
    <button class="cal-nav" onclick="cal.nextMonth()">→</button>
  </div>
  <div class="cal-info" id="calInfo"></div>
  <div class="cal-weekdays">
    <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="cal-holidays" id="calHolidays">
    <div class="holiday-title">本月节假日</div>
    <div id="holidayList"></div>
  </div>
</div>

<footer id="footer">
  <span>&copy; 2026 AIRES PRIVATE WEB SITE</span>
  <div class="footer-links">
    <a href="index.html">HOME</a>
  </div>
</footer>

<script>
var cal = {
  date: new Date(),
  holidays: {},  // { 'YYYY-MM-DD': 'Holiday Name' }
  months: ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'],

  isLeapYear: function(y) {
    return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
  },

  daysInMonth: function(y, m) {
    return new Date(y, m + 1, 0).getDate();
  },

  fetchHolidays: function(y) {
    var self = this;
    // Try multiple APIs for redundancy
    var url = 'https://date.nager.at/api/v3/PublicHolidays/' + y + '/CN';
    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var map = {};
        data.forEach(function(h) {
          map[h.date] = h.localName || h.name;
        });
        self.holidays = map;
        self.render();
      })
      .catch(function() {
        // Fallback: use fixed-date holidays
        self.holidays = self.fallbackHolidays(y);
        self.render();
      });
  },

  fallbackHolidays: function(y) {
    var h = {};
    h[y + '-01-01'] = '元旦';
    h[y + '-05-01'] = '劳动节';
    h[y + '-10-01'] = '国庆节';
    return h;
  },

  getHolidayKey: function(y, m, d) {
    return y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
  },

  render: function() {
    var y = this.date.getFullYear();
    var m = this.date.getMonth();
    var dim = this.daysInMonth(y, m);
    var isLeap = this.isLeapYear(y);

    document.getElementById('calMonthYear').textContent = y + ' ' + this.months[m];

    var info = dim + ' 天';
    if (m === 1 && isLeap) info += ' · 闰年';
    document.getElementById('calInfo').textContent = info;

    var today = new Date();
    var firstDay = new Date(y, m, 1).getDay();
    var daysInPrev = new Date(y, m, 0).getDate();
    var self = this;
    var monthHolidays = [];

    var html = '';
    for (var i = firstDay - 1; i >= 0; i--) {
      html += '<div class="cal-day other">' + (daysInPrev - i) + '</div>';
    }
    for (var d = 1; d <= dim; d++) {
      var cls = 'cal-day';
      if (y === today.getFullYear() && m === today.getMonth() && d === today.getDate()) {
        cls += ' today';
      }
      var key = self.getHolidayKey(y, m, d);
      if (self.holidays[key]) {
        cls += ' holiday';
        monthHolidays.push({ date: (m+1) + '/' + d, name: self.holidays[key] });
      }
      html += '<div class="' + cls + '" title="' + (self.holidays[key] || '') + '">' + d + '</div>';
    }
    var totalCells = firstDay + dim;
    var remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (var n = 1; n <= remaining; n++) {
      html += '<div class="cal-day other">' + n + '</div>';
    }

    document.getElementById('calGrid').innerHTML = html;

    // Render holiday list
    var listHtml = '';
    if (monthHolidays.length > 0) {
      monthHolidays.forEach(function(h) {
        listHtml += '<div class="holiday-item"><span class="holiday-date">' + h.date + '</span><span class="holiday-name">' + h.name + '</span></div>';
      });
    } else {
      listHtml = '<div class="empty">本月无节假日</div>';
    }
    document.getElementById('holidayList').innerHTML = listHtml;
  },

  prevMonth: function() { this.date.setMonth(this.date.getMonth() - 1); this.render(); },
  nextMonth: function() { this.date.setMonth(this.date.getMonth() + 1); this.render(); }
};

// Fetch holidays for current year, then render
cal.fetchHolidays(cal.date.getFullYear());


(function(){
  var scr = document.getElementById('loader');
  if (sessionStorage.getItem('fromIndex')) {
    sessionStorage.removeItem('fromIndex');
    scr.classList.add('from-index');
    setTimeout(function(){ scr.classList.add('done'); setTimeout(function(){ document.getElementById('page-content').classList.add('visible'); }, 800); }, 600);
    return;
  }
  var bar = document.getElementById('loaderFill');
  var txt = document.getElementById('loaderPct');
  var p = 0;
  var t = setInterval(function(){
    p += Math.random() * 7 + 3;
    if (p >= 100) { p = 100; clearInterval(t); }
    bar.style.width = p + '%';
    txt.textContent = Math.floor(p) + '%';
    if (p === 100) setTimeout(function(){ scr.classList.add('done'); setTimeout(function(){ document.getElementById('page-content').classList.add('visible'); }, 800); }, 300);
  }, 50);
})();
var nav = document.getElementById('nav');
window.addEventListener('scroll', function(){ nav.classList.toggle('scrolled', window.scrollY > 50); });
</script>
</div>
</body>
</html>
