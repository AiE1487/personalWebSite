<!DOCTYPE html>
<html lang="zh-cn">
<head>
<meta charset="UTF-8">

<title>哈希验证工具 — AIRES PRIVATE</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; font-size: 16px; color-scheme: dark; scroll-behavior: smooth; }
body {
  background: #141414; color: #c4c2c2;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  width: 100%; min-height: 100vh; overflow-x: hidden; line-height: 1.7;
}
#page-content { opacity: 0; transition: opacity 0.5s ease; }
#page-content.visible { opacity: 1; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: #141414; }
::-webkit-scrollbar-thumb { background: #18d1ff; border-radius: 2px; }

#loader { position: fixed; inset: 0; z-index: 99999; background: #2a2a2a; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease, visibility 0.8s ease; }
#loader.done { opacity: 0; visibility: hidden; pointer-events: none; }
@keyframes slideUpIn { from { transform: translateY(100vh); } to { transform: translateY(0); } }
#loader.from-index { animation: slideUpIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
.loader-logo { text-align: center; }
.loader-icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; opacity: 0.85; }
.loader-icon img { width: 100%; height: 100%; object-fit: contain; }
.loader-logo .zh { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.25em; color: #c4c2c2; line-height: 1.2; }
.loader-logo .en { font-size: 0.5rem; letter-spacing: 0.5em; color: #666; margin-top: 0.5rem; text-transform: uppercase; }
.loader-logo .line { width: 4rem; height: 1px; background: #555; margin: 0.8rem auto; }
.loader-track { position: absolute; bottom: 4.5rem; left: 50%; transform: translateX(-50%); width: 55%; max-width: 520px; }
.loader-bar { width: 100%; height: 3px; background: #444; }
.loader-fill { height: 100%; background: #18d1ff; width: 0%; transition: width 0.05s linear; }
.loader-info { display: flex; justify-content: space-between; margin-top: 0.6rem; font-size: 0.55rem; letter-spacing: 0.08em; color: #777; }
.loader-info .cyan { color: #18d1ff; }
.loader-copy { position: absolute; bottom: 1.5rem; left: 2rem; font-size: 0.55rem; letter-spacing: 0.12em; color: #555; }

#nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; height: 60px; transition: background 0.4s ease; }
#nav.scrolled { background: rgba(20,20,20,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.04); }
.nav-left { display: flex; align-items: center; gap: 0.5rem; }
.nav-brand-icon { width: 24px; height: 24px; }
.nav-brand-icon img { width: 100%; height: 100%; object-fit: contain; }
.nav-brand { text-decoration: none; display: flex; align-items: center; }
.nav-brand-text { font-size: 1rem; font-weight: 700; letter-spacing: 0.2em; color: #fff; }
.nav-right { display: flex; align-items: center; }
.nav-back { font-size: 0.55rem; letter-spacing: 0.12em; color: #18d1ff; text-decoration: none; text-transform: uppercase; border: 1px solid rgba(24,209,255,0.25); padding: 0.3rem 0.8rem; transition: background 0.3s ease; }
.nav-back:hover { background: rgba(24,209,255,0.1); }

#main { max-width: 600px; margin: 0 auto; padding: 100px 2rem 4rem; }
#main h1 { font-size: 1.5rem; font-weight: 700; color: #fff; letter-spacing: 0.06em; margin-bottom: 0.3rem; text-align: center; }
#main .subtitle { font-size: 0.55rem; letter-spacing: 0.1em; color: #666; text-transform: uppercase; text-align: center; margin-bottom: 2rem; }

.tool-section { margin-bottom: 1.5rem; }
.tool-section label { display: block; font-size: 0.65rem; letter-spacing: 0.08em; color: #888; margin-bottom: 0.4rem; text-transform: uppercase; }
.tool-section textarea, .tool-section input {
  width: 100%; padding: 0.7rem 0.9rem;
  background: #1e1e1e; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px; color: #c4c2c2; font-size: 0.85rem;
  font-family: 'Courier New', monospace; resize: vertical;
  transition: border-color 0.3s ease;
}
.tool-section textarea:focus, .tool-section input:focus {
  outline: none; border-color: rgba(24,209,255,0.4);
}
.tool-section textarea { min-height: 80px; }

.hash-type-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.hash-type-btn {
  padding: 0.4rem 0.9rem; font-size: 0.7rem; letter-spacing: 0.06em;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 3px;
  background: #1e1e1e; color: #888; cursor: pointer;
  transition: all 0.3s ease; font-family: 'Courier New', monospace;
}
.hash-type-btn:hover { border-color: rgba(24,209,255,0.3); color: #18d1ff; }
.hash-type-btn.active { border-color: #18d1ff; color: #18d1ff; background: rgba(24,209,255,0.06); }

.hash-result {
  background: #1e1e1e; border: 1px solid rgba(24,209,255,0.12);
  border-radius: 4px; padding: 0.8rem 1rem; min-height: 3em;
  font-family: 'Courier New', monospace; font-size: 0.85rem;
  color: #18d1ff; word-break: break-all; letter-spacing: 0.04em;
}
.hash-result.empty { color: #444; }

#footer { border-top: 1px solid rgba(255,255,255,0.06); padding: 1.5rem 2rem; max-width: 600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; font-size: 0.55rem; letter-spacing: 0.08em; color: #555; }
.footer-links { display: flex; gap: 1.5rem; }
.footer-links a { color: #555; text-decoration: none; transition: color 0.3s ease; }
.footer-links a:hover { color: #18d1ff; }

@media (max-width: 768px) {
  #nav { padding: 0 1.5rem; }
  #main { padding: 80px 1rem 3rem; }
}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">
    <div class="loader-icon"><img src="airesIcon.png" alt="AIRES"></div>
    <div class="zh">哈希验证工具</div>
    <div class="en">HASH VERIFY</div>
    <div class="line"></div>
  </div>
  <div class="loader-track">
    <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
    <div class="loader-info">
      <span class="cyan">LOADING TOOL</span>
      <span id="loaderPct">0%</span>
    </div>
  </div>
  <div class="loader-copy">&copy; 2026 AIRES PRIVATE</div>
</div>

<div id="page-content">

<nav id="nav">
  <div class="nav-left">
    <a href="index.html" class="nav-brand"><span class="nav-brand-icon"><img src="airesIcon.png" alt="AIRES"></span></a>
    <span class="nav-brand-text">HASH VERIFY</span>
  </div>
  <div class="nav-right">
    <a href="index.html" class="nav-back">← BACK</a>
  </div>
</nav>

<div id="main">
  <h1>哈希验证工具</h1>
  <div class="subtitle">MD5 · SHA-1 · SHA-256 · SHA-512</div>

  <div class="hash-type-row" id="hashTypes">
    <button class="hash-type-btn active" data-algo="SHA-256">SHA-256</button>
    <button class="hash-type-btn" data-algo="SHA-512">SHA-512</button>
    <button class="hash-type-btn" data-algo="SHA-1">SHA-1</button>
    <button class="hash-type-btn" data-algo="MD5">MD5</button>
  </div>

  <div class="tool-section">
    <label>输入文本</label>
    <textarea id="inputText" placeholder="输入需要计算哈希值的文本..."></textarea>
  </div>

  <div class="tool-section">
    <label>哈希结果</label>
    <div class="hash-result empty" id="hashResult">—</div>
  </div>
</div>

<footer id="footer">
  <span>&copy; 2026 AIRES PRIVATE WEB SITE</span>
  <div class="footer-links">
    <a href="index.html">HOME</a>
  </div>

<script>
var currentAlgo = 'SHA-256';

// Hash type buttons
document.getElementById('hashTypes').addEventListener('click', function(e) {
  if (e.target.classList.contains('hash-type-btn')) {
    document.querySelectorAll('.hash-type-btn').forEach(function(b){ b.classList.remove('active'); });
    e.target.classList.add('active');
    currentAlgo = e.target.getAttribute('data-algo');
    computeHash();
  }
});

// Live hash computation
document.getElementById('inputText').addEventListener('input', computeHash);

function computeHash() {
  var text = document.getElementById('inputText').value;
  var resultEl = document.getElementById('hashResult');
  if (!text) { resultEl.textContent = '—'; resultEl.classList.add('empty'); return; }

  var encoder = new TextEncoder();
  var data = encoder.encode(text);

  if (currentAlgo === 'MD5') {
    // MD5 implementation (SubtleCrypto doesn't support MD5 natively)
    resultEl.textContent = md5(text);
    resultEl.classList.remove('empty');
  } else {
    crypto.subtle.digest(currentAlgo, data).then(function(hashBuffer) {
      var hashArray = Array.from(new Uint8Array(hashBuffer));
      var hashHex = hashArray.map(function(b){ return b.toString(16).padStart(2, '0'); }).join('');
      resultEl.textContent = hashHex;
      resultEl.classList.remove('empty');
    });
  }
}

// MD5 implementation (RFC 1321)
function md5(string) {
  function rotateLeft(lValue, iShiftBits) { return (lValue << iShiftBits) | (lValue >>> (32 - iShiftBits)); }
  function addUnsigned(lX, lY) { var lX4,lY4,lX8,lY8,lResult; lX8 = (lX & 0x80000000); lY8 = (lY & 0x80000000); lX4 = (lX & 0x40000000); lY4 = (lY & 0x40000000); lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF); if (lX4 & lY4) return lResult ^ 0x80000000 ^ lX8 ^ lY8; if (lX4 | lY4) { if (lResult & 0x40000000) return lResult ^ 0xC0000000 ^ lX8 ^ lY8; else return lResult ^ 0x40000000 ^ lX8 ^ lY8; } else return lResult ^ lX8 ^ lY8; }
  function F(x,y,z) { return (x & y) | ((~x) & z); }
  function G(x,y,z) { return (x & z) | (y & (~z)); }
  function H(x,y,z) { return (x ^ y ^ z); }
  function I(x,y,z) { return (y ^ (x | (~z))); }
  function FF(a,b,c,d,x,s,ac) { a = addUnsigned(a, addUnsigned(addUnsigned(F(b,c,d), x), ac)); return addUnsigned(rotateLeft(a, s), b); }
  function GG(a,b,c,d,x,s,ac) { a = addUnsigned(a, addUnsigned(addUnsigned(G(b,c,d), x), ac)); return addUnsigned(rotateLeft(a, s), b); }
  function HH(a,b,c,d,x,s,ac) { a = addUnsigned(a, addUnsigned(addUnsigned(H(b,c,d), x), ac)); return addUnsigned(rotateLeft(a, s), b); }
  function II(a,b,c,d,x,s,ac) { a = addUnsigned(a, addUnsigned(addUnsigned(I(b,c,d), x), ac)); return addUnsigned(rotateLeft(a, s), b); }
  function convertToWordArray(string) { var lWordCount, lMessageLength = string.length, lNumberOfWords_temp1 = lMessageLength + 8, lNumberOfWords_temp2 = (lNumberOfWords_temp1 - (lNumberOfWords_temp1 % 64)) / 64, lNumberOfWords = (lNumberOfWords_temp2 + 1) * 16, lWordArray = Array(lNumberOfWords - 1), lBytePosition = 0, lByteCount = 0; while (lByteCount < lMessageLength) { lWordCount = (lByteCount - (lByteCount % 4)) / 4; lBytePosition = (lByteCount % 4) * 8; lWordArray[lWordCount] = (lWordArray[lWordCount] | (string.charCodeAt(lByteCount) << lBytePosition)); lByteCount++; } lWordCount = (lByteCount - (lByteCount % 4)) / 4; lBytePosition = (lByteCount % 4) * 8; lWordArray[lWordCount] = lWordArray[lWordCount] | (0x80 << lBytePosition); lWordArray[lNumberOfWords - 2] = lMessageLength << 3; lWordArray[lNumberOfWords - 1] = lMessageLength >>> 29; return lWordArray; }
  function wordToHex(lValue) { var wordToHexValue = "", wordToHexValue_temp = "", lByte, lCount; for (lCount = 0; lCount <= 3; lCount++) { lByte = (lValue >>> (lCount * 8)) & 255; wordToHexValue_temp = "0" + lByte.toString(16); wordToHexValue = wordToHexValue + wordToHexValue_temp.substr(wordToHexValue_temp.length - 2, 2); } return wordToHexValue; }

  var x = Array(), k, AA, BB, CC, DD, a, b, c, d, S11=7, S12=12, S13=17, S14=22, S21=5, S22=9, S23=14, S24=20, S31=4, S32=11, S33=16, S34=23, S41=6, S42=10, S43=15, S44=21;
  string = unescape(encodeURIComponent(string));
  x = convertToWordArray(string);
  a = 0x67452301; b = 0xEFCDAB89; c = 0x98BADCFE; d = 0x10325476;
  for (k = 0; k < x.length; k += 16) {
    AA = a; BB = b; CC = c; DD = d;
    a = FF(a,b,c,d,x[k+0], S11,0xD76AA478); d = FF(d,a,b,c,x[k+1], S12,0xE8C7B756); c = FF(c,d,a,b,x[k+2], S13,0x242070DB); b = FF(b,c,d,a,x[k+3], S14,0xC1BDCEEE);
    a = FF(a,b,c,d,x[k+4], S11,0xF57C0FAF); d = FF(d,a,b,c,x[k+5], S12,0x4787C62A); c = FF(c,d,a,b,x[k+6], S13,0xA8304613); b = FF(b,c,d,a,x[k+7], S14,0xFD469501);
    a = FF(a,b,c,d,x[k+8], S11,0x698098D8); d = FF(d,a,b,c,x[k+9], S12,0x8B44F7AF); c = FF(c,d,a,b,x[k+10],S13,0xFFFF5BB1); b = FF(b,c,d,a,x[k+11],S14,0x895CD7BE);
    a = FF(a,b,c,d,x[k+12],S11,0x6B901122); d = FF(d,a,b,c,x[k+13],S12,0xFD987193); c = FF(c,d,a,b,x[k+14],S13,0xA679438E); b = FF(b,c,d,a,x[k+15],S14,0x49B40821);
    a = GG(a,b,c,d,x[k+1], S21,0xF61E2562); d = GG(d,a,b,c,x[k+6], S22,0xC040B340); c = GG(c,d,a,b,x[k+11],S23,0x265E5A51); b = GG(b,c,d,a,x[k+0], S24,0xE9B6C7AA);
    a = GG(a,b,c,d,x[k+5], S21,0xD62F105D); d = GG(d,a,b,c,x[k+10],S22,0x2441453);  c = GG(c,d,a,b,x[k+15],S23,0xD8A1E681); b = GG(b,c,d,a,x[k+4], S24,0xE7D3FBC8);
    a = GG(a,b,c,d,x[k+9], S21,0x21E1CDE6); d = GG(d,a,b,c,x[k+14],S22,0xC33707D6); c = GG(c,d,a,b,x[k+3], S23,0xF4D50D87); b = GG(b,c,d,a,x[k+8], S24,0x455A14ED);
    a = GG(a,b,c,d,x[k+13],S21,0xA9E3E905); d = GG(d,a,b,c,x[k+2], S22,0xFCEFA3F8); c = GG(c,d,a,b,x[k+7], S23,0x676F02D9); b = GG(b,c,d,a,x[k+12],S24,0x8D2A4C8A);
    a = HH(a,b,c,d,x[k+5], S31,0xFFFA3942); d = HH(d,a,b,c,x[k+8], S32,0x8771F681); c = HH(c,d,a,b,x[k+11],S33,0x6D9D6122); b = HH(b,c,d,a,x[k+14],S34,0xFDE5380C);
    a = HH(a,b,c,d,x[k+1], S31,0xA4BEEA44); d = HH(d,a,b,c,x[k+4], S32,0x4BDECFA9); c = HH(c,d,a,b,x[k+7], S33,0xF6BB4B60); b = HH(b,c,d,a,x[k+10],S34,0xBEBFBC70);
    a = HH(a,b,c,d,x[k+13],S31,0x289B7EC6); d = HH(d,a,b,c,x[k+0], S32,0xEAA127FA); c = HH(c,d,a,b,x[k+3], S33,0xD4EF3085); b = HH(b,c,d,a,x[k+6], S34,0x4881D05);
    a = HH(a,b,c,d,x[k+9], S31,0xD9D4D039); d = HH(d,a,b,c,x[k+12],S32,0xE6DB99E5); c = HH(c,d,a,b,x[k+15],S33,0x1FA27CF8); b = HH(b,c,d,a,x[k+2], S34,0xC4AC5665);
    a = II(a,b,c,d,x[k+0], S41,0xF4292244); d = II(d,a,b,c,x[k+7], S42,0x432AFF97); c = II(c,d,a,b,x[k+14],S43,0xAB9423A7); b = II(b,c,d,a,x[k+5], S44,0xFC93A039);
    a = II(a,b,c,d,x[k+12],S41,0x655B59C3); d = II(d,a,b,c,x[k+3], S42,0x8F0CCC92); c = II(c,d,a,b,x[k+10],S43,0xFFEFF47D); b = II(b,c,d,a,x[k+1], S44,0x85845DD1);
    a = II(a,b,c,d,x[k+8], S41,0x6FA87E4F); d = II(d,a,b,c,x[k+15],S42,0xFE2CE6E0); c = II(c,d,a,b,x[k+6], S43,0xA3014314); b = II(b,c,d,a,x[k+13],S44,0x4E0811A1);
    a = II(a,b,c,d,x[k+4], S41,0xF7537E82); d = II(d,a,b,c,x[k+11],S42,0xBD3AF235); c = II(c,d,a,b,x[k+2], S43,0x2AD7D2BB); b = II(b,c,d,a,x[k+9], S44,0xEB86D391);
    a = addUnsigned(a, AA); b = addUnsigned(b, BB); c = addUnsigned(c, CC); d = addUnsigned(d, DD);
  }
  return (wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d)).toLowerCase();
}

(function(){
  var scr = document.getElementById('loader');
  if (sessionStorage.getItem('fromIndex')) {
    sessionStorage.removeItem('fromIndex');
    scr.classList.add('from-index');
    setTimeout(function(){ scr.classList.add('done'); setTimeout(function(){ document.getElementById('page-content').classList.add('visible'); }, 800); }, 600);
    return;
  }
  var bar = document.getElementById('loaderFill');
  var txt = document.getElementById('loaderPct');
  var p = 0;
  var t = setInterval(function(){
    p += Math.random() * 7 + 3;
    if (p >= 100) { p = 100; clearInterval(t); }
    bar.style.width = p + '%';
    txt.textContent = Math.floor(p) + '%';
    if (p === 100) setTimeout(function(){ scr.classList.add('done'); setTimeout(function(){ document.getElementById('page-content').classList.add('visible'); }, 800); }, 300);
  }, 50);
})();
var nav = document.getElementById('nav');
window.addEventListener('scroll', function(){ nav.classList.toggle('scrolled', window.scrollY > 50); });
</script>
